<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reaction → Troll Energy</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
padding:24px;
background:#0f1117;
color:#e6edf3;
}

.container{
max-width:800px;
margin:auto;
}

a{
color:#8ab4ff;
text-decoration:none;
}

h1{
font-size:48px;
line-height:1.08;
margin:28px 0 16px 0;
word-break:break-word;
}

p{
font-size:18px;
line-height:1.5;
color:#d0d7de;
margin:0 0 24px 0;
}

textarea{
width:100%;
height:140px;
padding:16px;
background:#161b22;
border:1px solid #333;
border-radius:16px;
color:white;
font-size:16px;
line-height:1.5;
box-sizing:border-box;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:16px;
}

button{
padding:12px 18px;
background:#238636;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:24px;
white-space:pre-wrap;
background:#161b22;
padding:20px;
border-radius:16px;
line-height:1.5;
font-size:16px;
min-height:64px;
box-sizing:border-box;
}

.footer{
margin-top:40px;
font-size:13px;
line-height:1.7;
color:#8b949e;
}

@media (max-width: 640px){
body{
padding:20px;
}
h1{
font-size:34px;
line-height:1.12;
}
p{
font-size:16px;
}
textarea{
height:132px;
font-size:16px;
}
button{
font-size:15px;
padding:11px 16px;
}
}
</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back</a>

<h1>Reaction → Troll Energy</h1>

<p>Turn hostile reactions into energy for ideas.</p>

<textarea id="input" placeholder="Example: Someone replied in a hostile way and I want to turn that energy into something useful"></textarea>

<div class="buttons">
<button onclick="generate()">Generate</button>
<button onclick="example()">Try example</button>
<button onclick="clearAll()">Clear</button>
<button onclick="copyResult()">Copy result</button>
</div>

<div id="result" class="result"></div>

<div class="footer">
No login<br>
No tracking<br>
No personal data<br>
Runs entirely in your browser
</div>

</div>

<script>
function example(){
document.getElementById("input").value =
"Someone replied in a rude way and I want to turn that energy into something useful.";
}

function clearAll(){
document.getElementById("input").value = "";
document.getElementById("result").textContent = "";
}

function copyResult(){
const text = document.getElementById("result").textContent;
if(!text) return;
navigator.clipboard.writeText(text).then(() => {
alert("Copied!");
});
}

function generate(){
const ideas = [
"The hostile tone may reveal the exact pressure point in the topic.",
"The rude reply can become a post about why people react defensively.",
"Troll energy can be turned into a sharper hook.",
"The attack may reveal the belief your idea is threatening.",
"A bad reply can become a list of hidden objections.",
"The emotional heat can be turned into a stronger angle.",
"The troll may be giving you a better title than your own draft.",
"Hostility often points to the sentence that actually matters.",
"The reply can become a debate format instead of a fight.",
"What annoyed them may be the most alive part of your idea."
];

let output = "Troll Energy\n\n";

ideas.forEach(i => {
output += "• " + i + "\n";
});

output += "\nNext Mutations\n";
output += "Hook\nDebate\nThread\nAbsurd Angle";

document.getElementById("result").textContent = output;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Idea → Post Angles | REFRAME Studio</title>

<meta name="description" content="Turn a small idea into 3 possible post angles." />

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#ffffff;
color:#111;
max-width:720px;
margin:auto;
padding:24px;
}

h1{
font-size:30px;
margin-bottom:4px;
}

.brand{
font-size:14px;
color:#666;
margin-bottom:18px;
}

textarea{
width:100%;
height:120px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:10px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:12px;
}

button{
padding:10px 14px;
font-size:15px;
background:#1E3A5F;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button.secondary{
background:#f2f2f2;
color:#111;
border:1px solid #ddd;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:10px;
font-size:13px;
color:#444;
}

.result{
margin-top:20px;
border:1px solid #e5e5e5;
border-radius:12px;
padding:18px;
background:#fafafa;
display:none;
}

.angle{
margin-bottom:14px;
line-height:1.5;
}

.footer{
margin-top:40px;
font-size:12px;
color:#666;
line-height:1.6;
}

</style>
</head>

<body>

<h1>Idea → Post Angles</h1>

<div class="brand">
by REFRAME Studio
</div>

<textarea id="idea" placeholder="Type a small idea here"></textarea>

<div class="row">

<button id="expandBtn">Generate Angles</button>

<button id="exampleBtn" class="secondary">
Example
</button>

<button id="copyBtn" class="secondary">
Copy Angles
</button>

<button id="clearBtn" class="secondary">
Clear
</button>

</div>

<div id="status" class="status"></div>

<div id="result" class="result">

<div class="angle" id="angle1"></div>
<div class="angle" id="angle2"></div>
<div class="angle" id="angle3"></div>

</div>

<footer class="footer">

<strong>Built by REFRAME Studio</strong>

<br><br>

Turn a small idea into possible post angles.  
#Reframed

<br><br>

Open-source style tools. Simple. Private. Fast.

<br><br>

No login. No tracking. No personal data collected.  
Runs entirely in your browser.

</footer>

<script>

const ideaInput=document.getElementById("idea")
const expandBtn=document.getElementById("expandBtn")
const exampleBtn=document.getElementById("exampleBtn")
const copyBtn=document.getElementById("copyBtn")
const clearBtn=document.getElementById("clearBtn")

const result=document.getElementById("result")
const status=document.getElementById("status")

const angle1=document.getElementById("angle1")
const angle2=document.getElementById("angle2")
const angle3=document.getElementById("angle3")

function isJapanese(text){
return /[ぁ-んァ-ン一-龯]/.test(text)
}

function expandIdea(){

const idea=ideaInput.value.trim()

if(!idea){
status.textContent="Write an idea first"
return
}

const jp=isJapanese(idea)

if(jp){

angle1.textContent="1. なぜ「"+idea+"」は多くの人が見落としている問題なのか"

angle2.textContent="2. 「"+idea+"」が起きる本当の理由"

angle3.textContent="3. 「"+idea+"」をシンプルに解決する考え方"

}else{

angle1.textContent="1. Why "+idea+" matters more than people think"

angle2.textContent="2. The hidden problem behind "+idea

angle3.textContent="3. A simple way to rethink "+idea

}

result.style.display="block"

status.textContent="3 post angles generated"

}

function example(){

ideaInput.value="AI thread chaos"

status.textContent="Example inserted"

}

async function copy(){

if(result.style.display==="none"){
status.textContent="Nothing to copy"
return
}

const text=
`Idea → Post Angles

${angle1.textContent}
${angle2.textContent}
${angle3.textContent}

#Reframed`

await navigator.clipboard.writeText(text)

status.textContent="Copied"

}

function clear(){

ideaInput.value=""
result.style.display="none"
status.textContent="Cleared"

}

expandBtn.addEventListener("click",expandIdea)
exampleBtn.addEventListener("click",example)
copyBtn.addEventListener("click",copy)
clearBtn.addEventListener("click",clear)

ideaInput.addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()

expandIdea()

}

})

status.textContent="Loaded"

</script>

</body>
</html>

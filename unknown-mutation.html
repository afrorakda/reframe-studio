<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>deeper</title>
  <style>
    :root{
      --bg:#04101f;
      --bg2:#081833;
      --panel:rgba(16,31,58,.78);
      --panel-deep:rgba(7,16,32,.58);
      --line:rgba(173,207,255,.12);
      --line-2:rgba(173,207,255,.08);
      --text:#eaf2ff;
      --muted:#95a8c5;
      --soft:#c7d8f7;
      --shadow:0 20px 60px rgba(0,0,0,.34);
      --radius:22px;
      --radius-sm:16px;
      --max:720px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(87,137,228,.16), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(118,180,255,.08), transparent 24%),
        linear-gradient(180deg,var(--bg2),var(--bg));
      letter-spacing:.01em;
    }

    .wrap{
      width:min(var(--max),calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 28px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      overflow:hidden;
    }

    .top{
      padding:18px 18px 8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .back{
      color:var(--muted);
      text-decoration:none;
      font-size:.82rem;
      opacity:.9;
      padding:6px 2px;
    }

    .back:hover{color:var(--soft)}

    .tiny{
      color:var(--muted);
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:lowercase;
    }

    .core{
      padding:6px 18px 18px;
    }

    .doors{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      width:100%;
      min-height:54px;
      border-radius:16px;
      background:rgba(113,154,225,.11);
      border:1px solid var(--line);
      color:var(--text);
      font:inherit;
      font-weight:600;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      padding:14px 14px;
    }

    button:hover{
      background:rgba(113,154,225,.15);
      border-color:rgba(173,207,255,.22);
    }

    button:active{transform:scale(.985)}

    .node{
      margin-top:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel-deep);
      padding:16px 14px 14px;
      min-height:148px;
    }

    .current-tag{
      color:var(--muted);
      font-size:.74rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .current-line{
      font-size:1.02rem;
      line-height:1.55;
      color:var(--text);
      min-height:4.6em;
      white-space:pre-wrap;
    }

    .next{
      margin-top:14px;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:10px;
    }

    .next button{
      min-height:46px;
      font-size:.92rem;
      font-weight:500;
      background:rgba(255,255,255,.03);
    }

    .echoes{
      margin-top:14px;
      border-top:1px solid var(--line-2);
      padding-top:12px;
      display:grid;
      gap:8px;
    }

    .echo{
      color:var(--muted);
      font-size:.88rem;
      line-height:1.45;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(255,255,255,.02);
      border:1px solid rgba(255,255,255,.03);
    }

    .meta{
      padding:0 18px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .quiet{
      color:var(--muted);
      font-size:.8rem;
      min-height:1.2em;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .ghost{
      background:transparent;
      border:1px solid var(--line-2);
      min-height:40px;
      padding:10px 12px;
      font-size:.82rem;
      color:var(--muted);
    }

    footer{
      padding:10px 18px 0;
      color:var(--muted);
      font-size:.8rem;
      text-align:center;
    }

    @media (max-width:480px){
      .next{grid-template-columns:repeat(2,minmax(0,1fr))}
      .next button:last-child{grid-column:1 / -1}
    }

    @media (min-width:700px){
      .wrap{padding-top:28px}
      .top{padding:20px 22px 8px}
      .core{padding:6px 22px 18px}
      .meta{padding:0 22px 14px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <a class="back" href="./index.html">surface</a>
        <div class="tiny">deeper</div>
      </div>

      <div class="core">
        <div class="doors" id="entryDoors">
          <button data-node="misread">Misread</button>
          <button data-node="opposite">Opposite</button>
          <button data-node="metaphor">Metaphor</button>
          <button data-node="question">Question</button>
        </div>

        <div class="node" id="nodeBox" style="display:none;">
          <div class="current-tag" id="currentTag">MISREAD</div>
          <div class="current-line" id="currentLine"></div>

          <div class="next" id="nextDoors"></div>

          <div class="echoes" id="echoes" style="display:none;"></div>
        </div>
      </div>

      <div class="meta">
        <div class="quiet" id="quiet"></div>
        <div class="actions">
          <button class="ghost" id="driftBtn" type="button">Drift</button>
          <button class="ghost" id="resetBtn" type="button">Again</button>
        </div>
      </div>
    </section>

    <footer>No login. No tracking. Browser only.</footer>
  </main>

  <script>
    const currentTag = document.getElementById('currentTag');
    const currentLine = document.getElementById('currentLine');
    const nextDoors = document.getElementById('nextDoors');
    const nodeBox = document.getElementById('nodeBox');
    const entryDoors = document.getElementById('entryDoors');
    const echoes = document.getElementById('echoes');
    const quiet = document.getElementById('quiet');
    const driftBtn = document.getElementById('driftBtn');
    const resetBtn = document.getElementById('resetBtn');

    const graph = {
      misread: ["opposite","question","metaphor"],
      opposite: ["misread","metaphor","question"],
      metaphor: ["question","misread","opposite"],
      question: ["metaphor","opposite","misread"]
    };

    const labels = {
      misread: "MISREAD",
      opposite: "OPPOSITE",
      metaphor: "METAPHOR",
      question: "QUESTION"
    };

    const pools = {
      misread: [
        "Maybe it was not resistance.\nMaybe it was hunger wearing a rude face.",
        "It may not be confusion.\nIt may be a refusal to admit contact.",
        "Perhaps they did understand enough.\nJust not enough to stay comfortable.",
        "What looked like dismissal may have been self-protection arriving first.",
        "Maybe the problem was not the thought.\nMaybe it was the bruise it found.",
        "That reply may not be judgment.\nIt may be flinch translated badly.",
        "Some rejection is only interest trying not to kneel.",
        "The sentence may say no.\nThe attention behind it says something else."
      ],
      opposite: [
        "What if the weak point is the doorway.",
        "What if the wrong turn is the shape of the path.",
        "What if the cheap comment is the expensive clue.",
        "What if coherence is not what this wants first.",
        "What if losing the thread is how the thread begins.",
        "What if friction is the more honest welcome.",
        "What if the failed reading still touched the real thing.",
        "What if distance is only another form of orbit."
      ],
      metaphor: [
        "A blunt reply is a stone thrown into black water.\nThe splash knows more than the hand.",
        "Some thoughts do not open like doors.\nThey open like weather.",
        "You do not enter every idea by walking.\nSome are fog first.",
        "A careless sentence can still leave a glowing footprint.",
        "The maze does not hate you.\nIt simply refuses a straight face.",
        "Some language is not a map.\nIt is a tide.",
        "The wound is not the tunnel.\nIt is only where the wall touched you.",
        "Not every signal arrives as light.\nSome arrive as pressure."
      ],
      question: [
        "What did that line protect them from noticing?",
        "Where did the reply become smaller than the reaction?",
        "What part still glows after the wording is removed?",
        "If the insult is stripped away, what pressure remains?",
        "What would still be true if nobody explained it?",
        "At which point did irritation turn into evidence?",
        "What was touched before the answer appeared?",
        "If the path made no sense, why keep walking?"
      ]
    };

    const whispers = [
      "",
      "No save.",
      "Not every step repeats.",
      "Some doors only look the same.",
      "A useful line may arrive late.",
      "The path does not explain itself.",
      "You can stop anywhere.",
      "The next turn may not remember this one."
    ];

    let historyStack = [];
    let currentNode = null;

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function nextChoices(node){
      const base = graph[node] || ["misread","opposite","metaphor"];
      return shuffle(base).slice(0,3);
    }

    function renderEchoes(){
      if(historyStack.length <= 1){
        echoes.style.display = "none";
        echoes.innerHTML = "";
        return;
      }

      const recent = historyStack.slice(-3, -1).reverse();
      echoes.style.display = "grid";
      echoes.innerHTML = recent.map(item => (
        `<div class="echo">${escapeHtml(item.line.replace(/\n/g, " "))}</div>`
      )).join("");
    }

    function enterNode(node){
      currentNode = node;
      const line = pick(pools[node]);
      historyStack.push({ node, line });

      currentTag.textContent = labels[node];
      currentLine.textContent = line;
      quiet.textContent = pick(whispers);

      nodeBox.style.display = "block";

      const choices = nextChoices(node);
      nextDoors.innerHTML = choices.map(choice => (
        `<button type="button" data-node="${choice}">${labels[choice].charAt(0) + labels[choice].slice(1).toLowerCase()}</button>`
      )).join("");

      renderEchoes();
    }

    function resetAll(){
      historyStack = [];
      currentNode = null;
      nodeBox.style.display = "none";
      nextDoors.innerHTML = "";
      echoes.innerHTML = "";
      echoes.style.display = "none";
      quiet.textContent = "";
    }

    function drift(){
      const nodes = ["misread","opposite","metaphor","question"];
      if(!currentNode){
        enterNode(pick(nodes));
        return;
      }
      const choices = graph[currentNode] || nodes;
      enterNode(pick(choices));
    }

    function escapeHtml(str){
      return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    entryDoors.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-node]");
      if(!btn) return;
      enterNode(btn.dataset.node);
    });

    nextDoors.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-node]");
      if(!btn) return;
      enterNode(btn.dataset.node);
    });

    driftBtn.addEventListener("click", drift);
    resetBtn.addEventListener("click", resetAll);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Unknown</title>

<style>
:root{
  --bg:#04101f;
  --bg2:#081833;
  --panel:rgba(16,31,58,.78);
  --line:rgba(173,207,255,.12);
  --text:#eaf2ff;
  --muted:#95a8c5;
  --shadow:0 20px 60px rgba(0,0,0,.34);
  --radius:22px;
  --max:720px;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at 50% -10%, rgba(87,137,228,.16), transparent 30%),
    linear-gradient(180deg,var(--bg2),var(--bg));
}

.wrap{
  width:min(var(--max),calc(100% - 24px));
  margin:auto;
  padding:24px 0;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.header{
  padding:18px;
  font-size:.85rem;
  color:var(--muted);
}

textarea{
  width:100%;
  min-height:120px;
  border:none;
  outline:none;
  padding:14px;
  border-radius:16px;
  background:rgba(6,14,28,.7);
  color:var(--text);
  margin:0 18px 12px;
}

.card{
  margin:12px 18px 18px;
  padding:18px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(6,14,28,.5);
  cursor:pointer;
  transition:.15s;
}

.card:hover{
  background:rgba(113,154,225,.1);
}

.card-line{
  line-height:1.6;
  font-size:1.05rem;
}

.footer{
  text-align:center;
  font-size:.75rem;
  color:var(--muted);
  padding-bottom:14px;
}
</style>
</head>

<body>
<div class="wrap">
  <div class="panel">

    <div class="header">unknown</div>

    <textarea id="input" placeholder="Drop a line."></textarea>

    <div class="card" id="card">
      <div class="card-line" id="text">...</div>
    </div>

    <div class="footer">tap → continue</div>

  </div>
</div>

<script src="./fragment-engine.js"></script>
<script src="./mutation-engine.js"></script>
<script src="./random-next.js"></script>

<script>
const inputEl = document.getElementById("input");
const textEl = document.getElementById("text");
const cardEl = document.getElementById("card");

const MODES = ["shift","misread","opposite","metaphor","question"];

let CURRENT = null;

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function generate(){
  const input = window.REFRAME_FRAGMENT_ENGINE.normalizeText(inputEl.value);

  if(!input){
    textEl.textContent = "...";
    return;
  }

  const mode = pick(MODES);

  const results = window.REFRAME_MUTATION_ENGINE.generate(input, mode);

  CURRENT = results[0];

  textEl.textContent = CURRENT.text;
}

cardEl.onclick = function(){
  if(!CURRENT) return;

  const nextCandidates = [
    "shift.html",
    "misread.html",
    "opposite.html",
    "metaphor.html",
    "question.html"
  ];

  const url = window.REFRAME_RANDOM_NEXT.buildNextUrl(
    nextCandidates,
    CURRENT.text
  );

  window.location.href = url;
};

inputEl.addEventListener("input", generate);

(async function init(){
  const carried = window.REFRAME_FRAGMENT_ENGINE.getCarriedInput();
  if(carried){
    inputEl.value = carried;
  }

  await window.REFRAME_FRAGMENT_ENGINE.loadPool();

  generate();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unknown Mutation</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --panel-2:#182038;
      --card:#0d1324;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{padding:28px 14px 44px}
    .wrap{max-width:820px;margin:0 auto}

    .back{
      display:inline-block;
      margin-bottom:18px;
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:4px 2px;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .back:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(114,103,255,.5);
      color:#c7c8ff;
      font-size:15px;
      margin-bottom:18px;
      background:rgba(96,89,235,.08);
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,.result-box{
      margin-top:26px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    textarea{
      width:100%;
      min-height:220px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{color:var(--muted)}

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button,.mini-btn{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    button:hover,.mini-btn:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active,.mini-btn:active{transform:translateY(1px)}

    .result-box{min-height:260px;display:flex;flex-direction:column;justify-content:flex-start}
    .result-box.empty{justify-content:center}
    .empty-text{color:var(--muted);font-size:17px}
    .cards{display:grid;gap:16px}

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .card-text{
      color:var(--soft);
      font-size:18px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .card-actions{
      margin-top:16px;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .mini-btn{
      min-height:52px;
      border-radius:16px;
      font-size:14px;
      padding:12px;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{color:#808bb0;font-size:12px}

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:2px 0;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .quiet-link:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    @media (max-width:640px){
      body{padding:18px 10px 32px}
      .shell{padding:18px;border-radius:24px}
      .title{font-size:28px}
      .input-box,.result-box{padding:16px;border-radius:20px}
      textarea{min-height:190px;font-size:16px}
      button{min-height:66px;font-size:16px;border-radius:18px}
      .card{border-radius:20px;padding:16px}
      .card-text{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./bad-reply-content.html">← Back</a>

    <main class="shell">
      <div class="eyebrow">Thinking OS layer</div>
      <h1 class="title">Unknown Mutation</h1>
      <p class="sub">Drop one thought.</p>

      <section class="input-box">
        <textarea id="input" placeholder="People say my ideas are too abstract."></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Mutate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">3 mutations appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="quiet-link" id="nextLink" href="./thought-collision.html">next</a>
      </div>
    </main>
  </div>

  <script src="./random-next.js"></script>
  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const nextLink = document.getElementById('nextLink');

    const exampleInput = 'People say my ideas are too abstract.';

    const starters = [
      'Maybe',
      'Sometimes',
      'What if',
      'Or maybe',
      'It could be that',
      'There is a chance that'
    ];

    const shifts = [
      'the idea is early',
      'the shape is still rough',
      'the room wanted safety',
      'the point came too late',
      'the middle went missing',
      'the thought stayed open too long',
      'they wanted the easy version',
      'they wanted a smaller shape',
      'the fear spoke first',
      'the old frame pushed back',
      'the path was thin',
      'the words arrived before the idea settled',
      'they wanted something they could hold fast',
      'the reply came before the reading did',
      'the pushback was about control'
    ];

    const opposites = [
      'easy first, alive later',
      'quick yes, slow roots',
      'clean shape, weak signal',
      'rough start, deeper hold',
      'safe answer, closed door',
      'fast read, thin meaning',
      'small point, lost depth',
      'simple line, missing middle',
      'quick calm, late change',
      'clear now, shallow later'
    ];

    const questions = [
      'What is this reply trying to protect?',
      'What if this reaction is about fear, not truth?',
      'What part of the thought was still forming?',
      'What did they want to stay simple?',
      'What if the room was not ready yet?',
      'What part felt risky to them?',
      'What did they want to control?',
      'What old shape did this idea disturb?',
      'What if the reply came too early?',
      'What if the pushback is the signal?'
    ];

    const turns = [
      'Turn that into a post.',
      'Use that as the first line.',
      'Write from that wound.',
      'Start there and keep going.',
      'Let that be the angle.',
      'That may be the real hook.',
      'Stay with that a little longer.',
      'That may be where it opens.',
      'That may be the deeper path.',
      'Write from that tension.'
    ];

    function cleanText(text){
      return String(text || '').trim();
    }

    function sentenceSeed(text){
      return cleanText(text).replace(/\s+/g, ' ');
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function pickThreeDifferent(arr){
      const pool = [...arr];
      const out = [];
      while(out.length < 3 && pool.length){
        const idx = Math.floor(Math.random() * pool.length);
        out.push(pool.splice(idx, 1)[0]);
      }
      return out;
    }

    function buildMutations(source){
      const s = sentenceSeed(source);
      const selectedShifts = pickThreeDifferent(shifts);
      const selectedOpposites = pickThreeDifferent(opposites);
      const selectedQuestions = pickThreeDifferent(questions);
      const selectedTurns = pickThreeDifferent(turns);

      return [
        `${pick(starters)} ${selectedShifts[0]}.\n${selectedTurns[0]}`,
        `${pick(starters)} this is really about ${selectedShifts[1]}.\n${selectedQuestions[1]}`,
        `${pick(starters)} the pattern is ${selectedOpposites[2]}.\n${selectedTurns[2]}`
      ].map((text) => {
        if (Math.random() < 0.55) {
          return `"${s}"\n\n${text}`;
        }
        return text;
      });
    }

    function renderMutations(items){
      result.className = 'result-box';
      result.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      items.forEach((text, i) => {
        const card = document.createElement('article');
        card.className = 'card';

        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = `${i + 1}. mutation`;

        const body = document.createElement('div');
        body.className = 'card-text';
        body.textContent = text;

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const copyCard = document.createElement('button');
        copyCard.className = 'mini-btn';
        copyCard.textContent = 'Copy card';
        copyCard.addEventListener('click', async () => {
          try{
            await navigator.clipboard.writeText(text);
            const old = copyCard.textContent;
            copyCard.textContent = 'Copied';
            setTimeout(() => copyCard.textContent = old, 1000);
          }catch{}
        });

        actions.appendChild(copyCard);
        card.appendChild(label);
        card.appendChild(body);
        card.appendChild(actions);
        wrap.appendChild(card);
      });

      result.appendChild(wrap);
    }

    function setEmpty(){
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">3 mutations appear here.</div>';
    }

    function generate(){
      const value = cleanText(input.value);
      if (!value) return;
      renderMutations(buildMutations(value));
      updateNextLink();
    }

    function clearAll(){
      input.value = '';
      setEmpty();
      updateNextLink();
    }

    function copyResult(){
      const items = Array.from(result.querySelectorAll('.card-text'));
      if (!items.length) return;

      const text = items.map((item, i) => {
        return `${i + 1}. mutation\n${item.textContent}`;
      }).join('\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => copyBtn.textContent = old, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => copyBtn.textContent = old, 1200);
      });
    }

    function updateNextLink(){
      if (!window.REFRAME_RANDOM_NEXT) {
        nextLink.href = './thought-collision.html';
        return;
      }

      nextLink.href = window.REFRAME_RANDOM_NEXT.buildNextUrl(
        ['thought-collision.html'],
        input.value
      );
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
      updateNextLink();
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) input.value = q;

    updateNextLink();
    setEmpty();
  </script>
</body>
</html>

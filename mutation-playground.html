<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation Playground</title>

<style>

body{
background:#0f1115;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#171a21;
border:1px solid #2a3140;
border-radius:16px;
padding:16px;
margin-bottom:16px;
}

textarea{
width:100%;
min-height:120px;
background:#0f1115;
border:1px solid #333c4d;
border-radius:12px;
color:#e8ecf1;
padding:12px;
font-size:15px;
}

button{
background:#2b6cff;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.route{
background:#0f1115;
border:1px solid #33405a;
border-radius:12px;
padding:12px;
margin-top:10px;
}

.pill{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#222938;
border:1px solid #33405a;
margin:4px;
}

.tool{
display:block;
padding:10px;
margin-top:6px;
border-radius:10px;
border:1px solid #33405a;
background:#0f1115;
text-decoration:none;
color:#e8ecf1;
}

</style>
</head>

<body>

<div class="container">

<h1>Mutation Playground</h1>

<div class="card">

<textarea id="input">I feel stuck and cannot decide what to build next.</textarea>

<button onclick="runPlayground()">Run mutation playground</button>

</div>

<div class="card">

<h3>Routes</h3>

<div id="routes"></div>

</div>

</div>

<script>

const mutations=[
"structure",
"contrast",
"sequence",
"experiment",
"reframe",
"question",
"tool idea"
];

const toolMap={
structure:["problem-to-root-cause.html","problem-to-constraints.html"],
contrast:["problem-to-options.html"],
sequence:["next-step-finder.html"],
experiment:["tool-factory.html"],
reframe:["stuck-to-tool.html"],
question:["thought-map.html"],
"tool idea":["idea-to-tool-spec.html"]
};

function randomMutation(){
return mutations[Math.floor(Math.random()*mutations.length)];
}

function createRoute(input){

let m1=randomMutation();
let m2=randomMutation();

let tools=toolMap[m2] || [];

return{
path:[m1,m2],
tools:tools
};

}

function runPlayground(){

let input=document.getElementById("input").value;

let routes=[];

for(let i=0;i<3;i++){
routes.push(createRoute(input));
}

render(routes,input);

}

function render(routes,input){

let html="";

routes.forEach((r,i)=>{

html+="<div class='route'>";

html+="<strong>Route "+(i+1)+"</strong><br>";

r.path.forEach(p=>{
html+="<span class='pill'>"+p+"</span>";
});

html+="<div style='margin-top:10px;'>";

r.tools.forEach(t=>{
html+="<a class='tool' href='./"+t+"'>"+t+"</a>";
});

html+="</div>";

html+="</div>";

});

document.getElementById("routes").innerHTML=html;

}

</script>

</body>
</html>

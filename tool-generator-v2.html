<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tool Generator v2</title>
  <meta name="description" content="Turn a rough REFRAME Studio tool idea into a complete ready-to-paste HTML file." />
  <style>
    :root{
      --bg:#071225;
      --panel:#0f1c36;
      --panel-2:#0b1630;
      --line:rgba(255,255,255,.10);
      --text:#edf3ff;
      --muted:#a2b0cb;
      --accent:#8295ff;
      --accent-2:#6f86ff;
      --button-text:#0d1530;
      --radius:24px;
      --shadow:0 18px 42px rgba(0,0,0,.30);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(88,125,255,.16), transparent 28%),
        radial-gradient(circle at 82% 14%, rgba(72,224,196,.10), transparent 24%),
        linear-gradient(180deg,#071225 0%,#06101f 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .app{
      min-height:100%;
      padding:calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));
      max-width:900px;
      margin:0 auto;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:var(--text);
      font-size:14px;
      font-weight:600;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      margin-bottom:16px;
    }

    .card{
      background:linear-gradient(180deg, rgba(19,31,60,.94) 0%, rgba(11,20,40,.98) 100%);
      border:1px solid var(--line);
      border-radius:30px;
      box-shadow:var(--shadow);
      padding:22px 16px;
    }

    h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.05;
      letter-spacing:-0.03em;
    }

    .desc{
      margin:0 0 22px;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
    }

    .label{
      display:block;
      margin:0 0 10px;
      color:#cbd7f0;
      font-size:13px;
      font-weight:700;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    textarea,
    pre.result{
      width:100%;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background:#071236;
      color:var(--text);
      padding:16px;
      font:inherit;
      font-size:16px;
      line-height:1.6;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
    }

    textarea{
      min-height:280px;
      resize:vertical;
      outline:none;
    }

    textarea:focus{
      border-color:rgba(138,160,255,.45);
      box-shadow:0 0 0 4px rgba(130,149,255,.12);
    }

    textarea::placeholder{
      color:#92a2c6;
      white-space:pre-line;
    }

    .actions{
      display:grid;
      gap:12px;
      margin:16px 0 18px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:20px;
      min-height:58px;
      padding:14px 18px;
      font:inherit;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(180deg,var(--accent) 0%,var(--accent-2) 100%);
      color:var(--button-text);
    }

    .secondary{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }

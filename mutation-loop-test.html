<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation Loop Test</title>

<style>
body{
background:#0f1115;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
margin-bottom:8px;
}

.sub{
color:#9aa4b2;
margin-bottom:24px;
}

.card{
background:#171a21;
border:1px solid #2a3140;
border-radius:14px;
padding:16px;
margin-bottom:18px;
}

textarea{
width:100%;
min-height:120px;
background:#0f1115;
border:1px solid #333c4d;
border-radius:10px;
color:#e8ecf1;
padding:12px;
font-size:14px;
}

select{
background:#0f1115;
border:1px solid #333c4d;
color:#e8ecf1;
border-radius:10px;
padding:8px;
}

button{
background:#2b6cff;
border:none;
padding:10px 14px;
border-radius:10px;
color:white;
cursor:pointer;
margin-right:6px;
margin-top:10px;
}

button.secondary{
background:#2a3140;
}

.pill{
display:inline-block;
padding:5px 10px;
border-radius:999px;
background:#222938;
border:1px solid #33405a;
font-size:13px;
margin:4px 4px 0 0;
}

.step{
background:#0f1115;
border:1px solid #2a3140;
border-radius:12px;
padding:12px;
margin-top:12px;
}

.small{
font-size:13px;
color:#9aa4b2;
}
</style>

</head>

<body>

<div class="container">

<h1>Mutation Loop Test</h1>
<p class="sub">Observe how mutation drifts through zones.</p>

<div class="card">

<label>Input</label>

<textarea id="input">
I feel stuck and cannot decide what to build next.
</textarea>

<br><br>

Mode
<select id="mode">
<option value="stable">Stable</option>
<option value="drift">Drift</option>
<option value="chaos">Chaos</option>
</select>

Steps
<select id="steps">
<option>2</option>
<option selected>3</option>
<option>4</option>
<option>5</option>
</select>

Results
<select id="limit">
<option selected>3</option>
<option>4</option>
<option>5</option>
</select>

<br>

<button onclick="run()">Run loop</button>
<button class="secondary" onclick="example1()">Example 1</button>
<button class="secondary" onclick="example2()">Example 2</button>
<button class="secondary" onclick="clearAll()">Clear</button>

</div>

<div class="card">
<h3>Loop Summary</h3>
<div id="summary"></div>
</div>

<div class="card">
<h3>Path</h3>
<div id="path"></div>
</div>

<div class="card">
<h3>Steps</h3>
<div id="stepsView"></div>
</div>

</div>


<script src="./mutation-map.js"></script>
<script src="./router-v2.js"></script>
<script src="./drift-engine.js"></script>
<script src="./drift-memory.js"></script>
<script src="./mutation-loop.js"></script>

<script>

function example1(){
document.getElementById("input").value =
"I feel stuck and cannot decide what to build next."
}

function example2(){
document.getElementById("input").value =
"アイデアはあるのにツールの形にできない。"
}

function clearAll(){
document.getElementById("summary").innerHTML=""
document.getElementById("path").innerHTML=""
document.getElementById("stepsView").innerHTML=""
}

function pill(text){
return "<span class='pill'>"+text+"</span>"
}

function run(){

const text =
document.getElementById("input").value

const steps =
Number(document.getElementById("steps").value)

const mode =
document.getElementById("mode").value

const limit =
Number(document.getElementById("limit").value)

const result =
window.REFRAME_MUTATION_LOOP.runLoop(text,{
mode:mode,
steps:steps,
limit:limit
})

const summary =
window.REFRAME_MUTATION_LOOP.summarizeLoop(result)

const path =
window.REFRAME_MUTATION_LOOP.getLoopPath(result)

renderSummary(summary)
renderPath(path)
renderSteps(result.steps)

}

function renderSummary(summary){

let html = "<p>"+summary.text+"</p>"

summary.path.forEach(p=>{
html += pill(p)
})

document.getElementById("summary").innerHTML = html

}

function renderPath(path){

let html = ""

path.forEach(p=>{
html += pill("Step "+p.stepNumber+": "+p.zoneTitle)
})

document.getElementById("path").innerHTML = html

}

function renderSteps(steps){

let html = ""

steps.forEach(step=>{

let nearby =
(step.nearbyZones||[])
.map(z=>pill(z.title))
.join("")

let openings =
(step.nextOpenings||[])
.map(o=>pill(o))
.join("")

let tags =
(step.outputState?.tags||[])
.map(t=>pill(t))
.join("")

html += `
<div class="step">

<b>${step.primaryZone?.title || "None"}</b>

<div class="small">
${step.summary}
</div>

<div class="small">Next openings</div>
${openings}

<div class="small">Output state</div>
${tags}

<div class="small">Nearby zones</div>
${nearby}

</div>
`

})

document.getElementById("stepsView").innerHTML = html

}

</script>

</body>
</html>

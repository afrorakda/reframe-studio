<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criticism → Lesson | REFRAME Studio</title>

<script src="router.js"></script>

<style>

body{
font-family: system-ui, sans-serif;
background:#0f1115;
color:white;
margin:0;
padding:40px;
max-width:900px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:10px;
}

.subtitle{
color:#9aa3b2;
margin-bottom:30px;
}

textarea{
width:100%;
height:160px;
padding:14px;
font-size:16px;
border-radius:10px;
border:1px solid #333;
background:#171a21;
color:white;
}

button{
margin-top:10px;
margin-right:10px;
padding:10px 14px;
border-radius:8px;
border:none;
background:#7c5cff;
color:white;
cursor:pointer;
}

button.secondary{
background:#2b2f3a;
}

.result{
margin-top:30px;
padding:18px;
background:#171a21;
border-radius:12px;
}

.next{
margin-top:30px;
}

.next-card{
display:block;
margin-top:12px;
padding:14px;
background:#1b1f28;
border-radius:10px;
text-decoration:none;
color:white;
border:1px solid #2e3442;
}

.next-card:hover{
border-color:#7c5cff;
}

.small{
color:#8891a5;
font-size:14px;
margin-bottom:4px;
}

.toplink{
margin-bottom:30px;
display:inline-block;
color:#8b94a8;
text-decoration:none;
}

</style>
</head>

<body>

<a class="toplink" href="reframe-studio.html">← Back to REFRAME Studio</a>

<h1>Criticism → Lesson</h1>

<div class="subtitle">
Turn criticism into a useful lesson.
</div>

<textarea id="input" placeholder="Paste criticism here..."></textarea>

<br>

<button id="generate">Generate lesson</button>
<button class="secondary" id="example">Try example</button>

<div class="result" id="result" style="display:none"></div>

<div class="next" id="next" style="display:none">

<h3>Next mutation</h3>

<div id="next-tools"></div>

</div>

<script>

const router = window.REFRAME_ROUTER;

router.prefillInput("#input");

const input = document.getElementById("input");
const result = document.getElementById("result");
const nextTools = document.getElementById("next-tools");
const nextBlock = document.getElementById("next");

document.getElementById("example").onclick = () => {
input.value = "People say my ideas are too abstract and difficult to understand.";
};

function transformCriticismToLesson(text){

return "This criticism may point to a gap between your intention and the audience’s entry point. The lesson is not to simplify the idea, but to create a clearer doorway so others can enter the thought before judging it.";

}

document.getElementById("generate").onclick = () => {

const text = router.normalizeText(input.value);

if(!text){
alert("Please enter criticism first.");
return;
}

const lesson = transformCriticismToLesson(text);

result.style.display = "block";
result.innerText = lesson;

nextBlock.style.display = "block";

router.renderNextMutations(nextTools,{
text:lesson,
outputType:"lesson",
currentTool:"criticism-to-lesson",
mode:router.getParams().mode
});

};

</script>

</body>
</html>

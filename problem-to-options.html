<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problem → Options — REFRAME Studio</title>

<style>
:root{
--bg:#0b0f18;
--panel:#121826;
--line:#293246;
--text:#f6f8fb;
--muted:#9aa7bd;
--cyan:#22c7e8;
--green:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,system-ui;
background:linear-gradient(180deg,#0b0f18,#090d15);
color:var(--text);
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.back{
display:inline-block;
margin-bottom:18px;
color:#b7c8ff;
text-decoration:none;
}

.card{
background:var(--panel);
border:1px solid var(--line);
border-radius:20px;
padding:24px;
}

h1{
margin:0 0 10px;
font-size:44px;
}

p{
color:var(--muted);
}

textarea{
width:100%;
min-height:180px;
margin-top:16px;
padding:16px;
border-radius:12px;
border:1px solid var(--line);
background:#0b1322;
color:white;
font-size:16px;
}

.buttons{
margin-top:18px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:14px 18px;
border-radius:12px;
border:1px solid var(--line);
background:#172033;
color:white;
cursor:pointer;
}

button.primary{
background:linear-gradient(180deg,#33d17a,#22c55e);
border:none;
font-weight:600;
}

button.example{
background:linear-gradient(180deg,#22d0f0,#0faaca);
border:none;
}

.result{
margin-top:20px;
padding:18px;
border-radius:14px;
border:1px solid var(--line);
background:#0d1424;
white-space:pre-wrap;
}

footer{
margin-top:30px;
text-align:center;
color:var(--muted);
font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="./index.html">← Back to REFRAME Studio</a>

<div class="card">

<h1>Problem → Options</h1>

<p>
Turn one problem into multiple possible directions.
Don't search for the perfect answer. Generate options.
</p>

<textarea id="input" placeholder="Example: I want to start a project but I don't know what to build."></textarea>

<div class="buttons">

<button class="primary" onclick="generate()">Generate options</button>

<button class="example" onclick="example()">Try example</button>

<button onclick="clearAll()">Clear</button>

<button onclick="copy()">Copy result</button>

</div>

<div class="result" id="result">
Options will appear here.
</div>

</div>

<footer>
REFRAME Studio — No login / No tracking / Runs entirely in your browser
</footer>

</div>

<script>

function example(){
document.getElementById("input").value =
"I want to start a project but I don't know what to build.";
generate();
}

function clearAll(){
document.getElementById("input").value="";
document.getElementById("result").textContent="Options will appear here.";
}

function copy(){
const text=document.getElementById("result").textContent;
navigator.clipboard.writeText(text);
}

function generate(){

const text=document.getElementById("input").value.trim();

if(!text){
document.getElementById("result").textContent="Please enter a problem.";
return;
}

const options=[
"Break the problem into smaller questions you can test.",
"Create a very small experiment instead of a full solution.",
"Ask who already solved a similar problem.",
"Try the opposite approach from what you first imagined.",
"Ignore the problem temporarily and explore adjacent ideas."
];

document.getElementById("result").textContent =
options.map((o,i)=>`${i+1}. ${o}`).join("\n\n");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hate → Content</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f5f7fb;
margin:0;
padding:20px;
color:#1a1a1a;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:24px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

textarea{
width:100%;
min-height:120px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

.buttons{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
border:none;
border-radius:8px;
padding:10px 14px;
font-size:15px;
cursor:pointer;
}

.generate{background:#2563eb;color:white}
.example{background:#e5e7eb}
.clear{background:#f3f4f6}
.copy{background:#e5e7eb}

.result{
margin-top:20px;
padding:14px;
background:#fafafa;
border-radius:10px;
border:1px solid #eee;
white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Hate → Content</h1>

<p>Turn negative comments into post ideas.</p>

<textarea id="input"
placeholder="Paste a negative comment

Example:
Your ideas are stupid and nobody cares."></textarea>

<div class="buttons">

<button class="generate" onclick="generate()">Generate</button>

<button class="example" onclick="example()">Try example</button>

<button class="clear" onclick="clearInput()">Clear</button>

<button class="copy" onclick="copyResult()">Copy result</button>

</div>

<div id="result" class="result">
Result will appear here.
</div>

</div>

</div>

<script>

function example(){

document.getElementById("input").value="Your ideas are stupid and nobody cares."

generate()

}

function clearInput(){

document.getElementById("input").value=""
document.getElementById("result").innerText="Result will appear here."

}

function generate(){

const text=document.getElementById("input").value.trim()

if(!text) return

const output=`Content ideas

1. Why criticism online becomes personal

2. The psychology behind internet trolling

3. What negative comments reveal about audience fears`

document.getElementById("result").innerText=output

}

function copyResult(){

const text=document.getElementById("result").innerText
navigator.clipboard.writeText(text)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation Engine</title>

<style>

body{
background:#0f1115;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:#171a21;
border:1px solid #2a3140;
border-radius:16px;
padding:16px;
margin-bottom:16px;
}

textarea{
width:100%;
min-height:120px;
background:#0f1115;
border:1px solid #333c4d;
border-radius:12px;
color:#e8ecf1;
padding:12px;
font-size:15px;
}

button{
background:#2b6cff;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.pill{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#222938;
border:1px solid #33405a;
margin:4px;
}

</style>
</head>

<body>

<div class="container">

<h1>Mutation Engine</h1>

<div class="card">

<textarea id="input">I feel stuck and cannot decide what to build next.</textarea>

<button onclick="runMutation()">Run mutation</button>

</div>

<div class="card">

<h3>Mutation Path</h3>

<div id="path">No mutation yet.</div>

</div>

<div class="card">

<h3>Mutation Results</h3>

<div id="results"></div>

</div>

</div>

<script>

const mutations=[
"constraint",
"contrast",
"sequence",
"experiment",
"reframe",
"tool idea",
"question",
"structure"
];

function randomMutation(){

return mutations[Math.floor(Math.random()*mutations.length)];

}

function runMutation(){

const input=document.getElementById("input").value;

let path=[];
let results=[];

let current=input;

for(let i=0;i<4;i++){

let m=randomMutation();

path.push(m);

results.push(current+" → "+m);

current=m;

}

render(path,results);

}

function render(path,results){

let p=path.map(x=>"<span class='pill'>"+x+"</span>").join("");

document.getElementById("path").innerHTML=p;

let r=results.map(x=>"<div>"+x+"</div>").join("");

document.getElementById("results").innerHTML=r;

}

</script>

</body>
</html>

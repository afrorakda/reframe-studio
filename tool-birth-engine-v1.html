<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Birth Engine v1</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
margin:0;
background:#0b132b;
color:#e6edf7;
line-height:1.5;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

p{
color:#a9b4d0;
}

.box{
background:#111a36;
padding:20px;
border-radius:12px;
margin-top:20px;
}

textarea{
width:100%;
min-height:120px;
background:#0f1833;
border:1px solid #2a3560;
border-radius:8px;
padding:10px;
color:white;
}

button{
margin-top:10px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#4f6cff;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
background:#0f1833;
padding:15px;
border-radius:8px;
white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back to REFRAME Studio</a>

<h1>Thought → Mutation → Tool</h1>

<p>
Turn a thought fragment into tool directions,
tool specs and HTML prompts.
</p>

<div class="box">

<textarea id="input" placeholder="Example:
People react to my posts but I can't turn those reactions into new ideas."></textarea>

<br>

<button onclick="generate()">Generate Tool Idea</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

function generate(){

let text=document.getElementById("input").value;

if(!text){
alert("Enter a thought fragment");
return;
}

let toolName="Mutation Tool";
let direction="Turn the thought into a new thinking tool.";

if(text.includes("react")){
toolName="Reaction → Idea Tool";
direction="Convert reactions into content ideas.";
}

if(text.includes("confuse")){
toolName="Confusion → Question Tool";
direction="Turn confusion into powerful questions.";
}

if(text.includes("fail")){
toolName="Failure → Lesson Tool";
direction="Extract lessons from failure.";
}

let output=
"TOOL NAME:\n"+toolName+
"\n\nDIRECTION:\n"+direction+
"\n\nSOURCE:\n"+text;

document.getElementById("result").textContent=output;

}

</script>

</body>
</html>

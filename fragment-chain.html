<body>

<a href="./index.html">← Back to REFRAME Studio</a>

<h1>Fragment Chain</h1>

<p>
Watch how one fragment mutates step by step.
</p>

<textarea id="fragmentInput"
placeholder="People say my ideas are too abstract."></textarea>

<br>

<button onclick="startChain()">Start Chain</button>
<button class="secondary" onclick="tryExample()">Try example</button>
<button class="secondary" onclick="addMutation()">Next Mutation</button>
<button class="secondary" onclick="clearChain()">Clear</button>

<div id="chainArea"></div>

<script src="./mutation-map.js"></script>

<script>

let chain = []

function tryExample(){

const example = "People say my ideas are too abstract."

document.getElementById("fragmentInput").value = example

}

function startChain(){

const text = document.getElementById("fragmentInput").value.trim()

if(!text) return

chain = []

const route = buildFragmentRoute(text)

chain.push({
type:route.detectedType.label,
text:text
})

renderChain()

}

function addMutation(){

if(chain.length===0) return

const last = chain[chain.length-1]

const options = [
"Reframe the idea",
"Turn criticism into lesson",
"Find a stronger angle",
"Ask a deeper question"
]

const next = options[Math.floor(Math.random()*options.length)]

chain.push({
type:"Mutation",
text:next
})

renderChain()

}

function clearChain(){

chain=[]

document.getElementById("chainArea").innerHTML=""

}

function renderChain(){

const area = document.getElementById("chainArea")

area.innerHTML=""

chain.forEach((step,i)=>{

const div=document.createElement("div")

div.className="mutation"

div.innerHTML="<strong>"+step.type+"</strong><br>"+step.text

area.appendChild(div)

})

}

</script>

</body>

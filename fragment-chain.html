<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragment Chain by REFRAME Studio</title>

<style>
body{
background:#08121c;
color:#eaf3ff;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
padding:20px;
}

.container{
max-width:760px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:4px;
}

.subtitle{
color:#9db4c9;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
border-radius:12px;
border:1px solid #2c4158;
background:#0d1b29;
color:white;
padding:12px;
font-size:16px;
}

button{
margin-top:10px;
margin-right:8px;
padding:10px 14px;
border-radius:20px;
border:none;
background:#3b82f6;
color:white;
font-weight:600;
cursor:pointer;
}

button.secondary{
background:#233447;
}

.result{
margin-top:25px;
}

.chain{
border-left:2px solid #3b82f6;
padding-left:14px;
margin-top:14px;
}

.step{
margin-bottom:16px;
}

.label{
font-size:12px;
color:#8aa4bc;
text-transform:uppercase;
letter-spacing:.08em;
margin-bottom:4px;
}

.box{
background:#0f1e2d;
border:1px solid #2b4158;
padding:10px;
border-radius:10px;
}

.footer{
margin-top:40px;
font-size:12px;
color:#7f95aa;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<a href="./index.html" style="color:#9db4c9">← Back to REFRAME Studio</a>

<h1>Fragment Chain</h1>
<div class="subtitle">
Create a chain of thoughts. One fragment mutates into the next.
</div>

<textarea id="fragmentInput" placeholder="People say my ideas are too abstract."></textarea>

<br>

<button onclick="startChain()">Start Chain</button>
<button class="secondary" onclick="addMutation()">Next Mutation</button>
<button class="secondary" onclick="clearChain()">Clear</button>

<div class="result" id="resultArea"></div>

<div class="footer">
No login. No tracking. No personal data. Runs entirely in your browser.
</div>

</div>

<script>

let chain = [];

function startChain(){

const text=document.getElementById("fragmentInput").value.trim();

if(!text)return;

chain=[text];

render();

}

function addMutation(){

if(chain.length===0)return;

const last=chain[chain.length-1];

const mutations=[
"What question hides inside this?",
"What angle makes this interesting?",
"What lesson appears here?",
"What if the opposite were true?",
"What action could start movement?",
"What idea is hidden here?"
];

const m=mutations[Math.floor(Math.random()*mutations.length)];

const next=last+" → "+m;

chain.push(next);

render();

}

function clearChain(){

chain=[];
document.getElementById("resultArea").innerHTML="";

}

function render(){

let html="<div class='chain'>";

chain.forEach((item,i)=>{

html+=`
<div class="step">
<div class="label">Step ${i+1}</div>
<div class="box">${item}</div>
</div>
`;

});

html+="</div>";

document.getElementById("resultArea").innerHTML=html;

}

</script>

</body>
</html>

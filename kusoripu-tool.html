<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kusoripu → Idea | REFRAME Studio</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:#0b1020;
color:#fff;
margin:0;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
}

h1{
font-size:36px;
margin-bottom:10px;
}

textarea{
width:100%;
height:140px;
padding:12px;
border-radius:10px;
border:none;
font-size:16px;
background:#11182f;
color:#fff;
}

button{
width:100%;
padding:16px;
margin-top:12px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
}

.generate{
background:#ff6ac1;
color:#fff;
}

.secondary{
background:#1b2448;
color:#fff;
}

.result{
margin-top:24px;
background:#0e1633;
padding:20px;
border-radius:14px;
}

.section{
margin-bottom:20px;
}

.label{
font-size:12px;
letter-spacing:1px;
color:#8fa0ff;
margin-bottom:6px;
}

.idea{
font-size:22px;
font-weight:600;
}

.tweet{
white-space:pre-line;
line-height:1.6;
}

.angle{
color:#a8b2ff;
}

.footer{
margin-top:30px;
font-size:12px;
color:#777;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Turn bad replies into ideas.</h1>

<textarea id="input" placeholder="Paste a bad reply here..."></textarea>

<button class="generate" onclick="generate()">Generate</button>
<button class="secondary" onclick="another()">Another angle</button>
<button class="secondary" onclick="example()">Try example</button>
<button class="secondary" onclick="clearBox()">Clear</button>

<div class="result" id="result">
Your idea seed will appear here.
</div>

<div class="footer">
No login / No tracking / In browser
</div>

</div>

<script>

let index=0;
let lastText="";

var patternSets={

clarity:[

{
idea:"When people say an idea is 'too abstract', it often means it hasn't been translated yet.",
tweet:
"\"This is too abstract.\"\n\nThat might not mean the idea is weak.\nIt might mean the idea hasn't been translated yet.\n\nNew ideas almost always look abstract at first.",
angle:
"Treat the criticism as a translation problem, not an intelligence problem."
},

{
idea:"“Too abstract” is often a signal that the bridge to the audience is missing.",
tweet:
"When someone says\n\"This is too abstract\"\n\nwhat they may actually mean is\n\n\"I can't see where this connects to my world yet.\"",
angle:
"Focus on building the bridge between concept and real experience."
},

{
idea:"New concepts usually feel abstract before they become obvious.",
tweet:
"Every useful idea goes through the same phase:\n\n1. Too abstract\n2. Maybe interesting\n3. Obviously true\n\nMost criticism happens at stage one.",
angle:
"Frame abstraction as the first stage of adoption."
}

],

value:[

{
idea:"“Who needs this?” is often the beginning of finding the real audience.",
tweet:
"When someone asks\n\"Who needs this?\"\n\nthat question is actually useful.\n\nIt forces you to find the one person\nwho really does.",
angle:
"Use dismissal as a way to sharpen the target audience."
},

{
idea:"Ideas look useless until the pain they solve becomes visible.",
tweet:
"Most ideas look unnecessary\nuntil the problem they solve becomes clear.\n\nOften the idea isn't wrong.\nThe pain just hasn't been described yet.",
angle:
"Explain the pain before explaining the idea."
},

{
idea:"If everyone needs it, nobody understands it.",
tweet:
"When an idea tries to serve everyone\nit usually connects with no one.\n\nSometimes the real progress\nis discovering who the idea is actually for.",
angle:
"Turn broad ideas into precise audiences."
}

],

attack:[

{
idea:"Harsh replies often hide confusion rather than disagreement.",
tweet:
"The harsher the reply\n\nsometimes the less clear the criticism actually is.\n\nStrong language\ncan hide weak arguments.",
angle:
"Look past the emotion and search for the real confusion."
},

{
idea:"Emotional reactions often point to an unseen friction.",
tweet:
"When people react emotionally\nit's often not about the exact words.\n\nIt's about the friction\nthat the idea creates in their mental model.",
angle:
"Treat emotional replies as signals of mental friction."
}

],

friction:[

{
idea:"Negative reactions often reveal where the message broke.",
tweet:
"A rude reply can be annoying.\n\nBut it also shows\nwhere the message stopped making sense.\n\nThat point is often the next idea.",
angle:
"Look for the exact place where understanding collapsed."
},

{
idea:"Friction often appears before clarity.",
tweet:
"Good ideas rarely arrive smoothly.\n\nThey usually arrive\nwith friction, confusion,\nand a few bad replies.\n\nThat friction is part of the process.",
angle:
"Treat resistance as part of idea formation."
}

]

};

function detectPattern(text){

text=text.toLowerCase();

if(text.includes("abstract")||text.includes("vague")) return "clarity";

if(text.includes("who needs")||text.includes("nobody")||text.includes("useless")) return "value";

if(text.includes("stupid")||text.includes("idiot")||text.includes("dumb")) return "attack";

return "friction";
}

function render(data,input){

document.getElementById("result").innerHTML=

`<div class="section">
<div class="label">IDEA</div>
<div class="idea">${data.idea}</div>
</div>

<div class="section">
<div class="label">TWEET</div>
<div class="tweet">${data.tweet}</div>
</div>

<div class="section">
<div class="label">ANGLE</div>
<div class="angle">${data.angle}</div>
</div>

<div class="section">
<div class="label">FROM</div>
<div>${input}</div>
</div>`;
}

function generate(){

let text=document.getElementById("input").value.trim();

if(!text)return;

lastText=text;
index=0;

let type=detectPattern(text);

render(patternSets[type][index],text);

}

function another(){

let text=document.getElementById("input").value.trim();

if(!text)return;

if(text!==lastText){
generate();
return;
}

let type=detectPattern(text);

index++;

if(index>=patternSets[type].length) index=0;

render(patternSets[type][index],text);

}

function example(){

document.getElementById("input").value="Your idea is too abstract. Nobody needs this.";

generate();

}

function clearBox(){

document.getElementById("input").value="";
document.getElementById("result").innerHTML="Your idea seed will appear here.";

}

</script>

</body>
</html>

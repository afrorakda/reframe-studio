<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad reply → Content</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --card:#0d1324;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --button:#243055;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{
      padding:28px 14px 44px;
    }

    .wrap{
      max-width:820px;
      margin:0 auto;
    }

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,
    .result-box{
      margin-top:26px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    textarea{
      width:100%;
      min-height:250px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{
      color:var(--muted);
    }

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active{
      transform:translateY(1px);
    }

    .result-box{
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .result-box.empty{
      min-height:120px;
      justify-content:center;
    }

    .empty-text{
      color:var(--muted);
      font-size:17px;
    }

    .cards{
      display:grid;
      gap:16px;
    }

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(110,126,182,.18);
    }

    .block:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{
      color:#808bb0;
      font-size:12px;
    }

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:2px 0;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .quiet-link:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    @media (max-width:640px){
      body{
        padding:18px 10px 32px;
      }

      .shell{
        padding:18px;
        border-radius:24px;
      }

      .title{
        font-size:28px;
      }

      .input-box,
      .result-box{
        padding:16px;
        border-radius:20px;
      }

      textarea{
        min-height:200px;
        font-size:16px;
      }

      button{
        min-height:66px;
        font-size:16px;
        border-radius:18px;
      }

      .card{
        border-radius:20px;
        padding:16px;
      }

      .block-text{
        font-size:16px;
      }

      .result-box.empty{
        min-height:96px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1 class="title">Bad reply → Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="input-box">
        <textarea id="input" placeholder="Paste replies, criticism, or friction.

Example:
stop
boring
too abstract
what are you even saying
nobody gets this"></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Generate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">Results appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="quiet-link" href="./unknown-mutation.html">deeper</a>
      </div>
    </main>
  </div>

  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleInput = [
      'stop',
      'boring',
      'too abstract',
      'what are you even saying',
      'nobody gets this'
    ].join('\n');

    const singleLineWhy = [
      'They may want a faster point.',
      'They may want a safer shape.',
      'They may want simpler words.',
      'They may want the middle step.',
      'They may want something easier to hold.'
    ];

    const singleLineUse = [
      'Use that as a post about speed vs depth.',
      'Use that as a post about safety vs change.',
      'Use that as a post about why people want simple answers.',
      'Use that as a post about what gets rejected first online.',
      'Use that as a post about why rough ideas get pushed back.'
    ];

    function setEmpty() {
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">Results appear here.</div>';
    }

    function cleanLines(text) {
      return String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);
    }

    function shortText(text, max = 110) {
      const t = String(text || '').trim().replace(/\s+/g, ' ');
      if (t.length <= max) return t;
      return t.slice(0, max).trim() + '...';
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function detectTheme(text) {
      const t = text.toLowerCase();

      if (t.includes('boring')) {
        return {
          angle: 'This may be less about truth and more about pace.',
          why: 'People often call something boring when it asks them to slow down.',
          use: 'Write about why fast reactions often miss the point.'
        };
      }

      if (t.includes('too abstract')) {
        return {
          angle: 'This may mean the steps were missing, not the idea.',
          why: 'People often push back when they cannot see the path yet.',
          use: 'Write about why unfinished ideas look weak too early.'
        };
      }

      if (t.includes('what are you even saying') || t.includes("can't tell") || t.includes('cant tell')) {
        return {
          angle: 'This may mean the shape was still rough.',
          why: 'People often want the point before they want the thought.',
          use: 'Write about why people reject what they cannot place fast.'
        };
      }

      if (t.includes('nobody gets this')) {
        return {
          angle: 'This may mean they wanted it simpler.',
          why: 'People often move away from ideas that stay open.',
          use: 'Write about why easy answers spread faster than live ones.'
        };
      }

      if (t.includes('stop') || t.includes('quit') || t.includes('rest')) {
        return {
          angle: 'This may be a push for comfort, not a real answer.',
          why: 'People often protect what already feels safe.',
          use: 'Write about why new ideas get pushed back first.'
        };
      }

      if (t.includes('idiot') || t.includes('stupid') || t.includes('nonsense') || t.includes('trash')) {
        return {
          angle: 'The attack may be carrying fear, not just anger.',
          why: 'People often go harsh when they do not want to sit with the idea.',
          use: 'Write about how insults are often a shortcut, not a reason.'
        };
      }

      return {
        angle: 'The reply may be asking for a cleaner shape.',
        why: pick(singleLineWhy),
        use: pick(singleLineUse)
      };
    }

    function buildLineCard(line, index) {
      const theme = detectTheme(line);

      return {
        label: `${index}. angle`,
        blocks: [
          ['Reply', shortText(line, 72)],
          ['Angle', theme.angle],
          ['Why', theme.why],
          ['Use', theme.use]
        ]
      };
    }

    function buildParagraphCard(text) {
      const theme = detectTheme(text);
      const low = text.toLowerCase();

      let summary = 'The reply sounds like a demand for a simpler path.';
      if (low.includes('idiot') || low.includes('nonsense') || low.includes('stupid')) {
        summary = 'The tone is hostile, but the signal may still be simple: "make this easier for me."';
      } else if (low.includes('boring') && (low.includes("can't tell") || low.includes('cant tell'))) {
        summary = 'The reply mixes "too slow" and "too unclear."';
      } else if (low.includes('boring') || low.includes('too abstract') || low.includes('nobody gets this')) {
        summary = 'The reply sounds like "I could not grab this fast."';
      }

      return [{
        label: '1. angle',
        blocks: [
          ['Read', summary],
          ['Angle', theme.angle],
          ['Why', theme.why],
          ['Use', theme.use]
        ]
      }];
    }

    function buildCards(text) {
      const lines = cleanLines(text);

      if (!lines.length) return [];

      if (lines.length >= 2 && lines.length <= 12) {
        return lines.slice(0, 3).map((line, i) => buildLineCard(line, i + 1));
      }

      return buildParagraphCard(text);
    }

    function renderCards(cards) {
      result.className = 'result-box';
      result.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      cards.forEach(cardData => {
        const card = document.createElement('article');
        card.className = 'card';

        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = cardData.label;
        card.appendChild(label);

        cardData.blocks.forEach(([title, text], idx) => {
          const block = document.createElement('div');
          block.className = 'block' + (idx === 0 ? ' first' : '');

          const blockTitle = document.createElement('div');
          blockTitle.className = 'block-title';
          blockTitle.textContent = title;

          const blockText = document.createElement('div');
          blockText.className = 'block-text';
          blockText.textContent = text;

          block.appendChild(blockTitle);
          block.appendChild(blockText);
          card.appendChild(block);
        });

        wrap.appendChild(card);
      });

      result.appendChild(wrap);
    }

    function generate() {
      const text = input.value.trim();
      if (!text) return;

      const cards = buildCards(text);
      if (!cards.length) return;

      renderCards(cards);
    }

    function clearAll() {
      input.value = '';
      setEmpty();
    }

    function copyResult() {
      const cards = Array.from(result.querySelectorAll('.card'));
      if (!cards.length) return;

      const text = cards.map(card => {
        const pieces = [];
        const label = card.querySelector('.card-label')?.textContent || '';
        pieces.push(label);

        const blocks = Array.from(card.querySelectorAll('.block'));
        blocks.forEach(block => {
          const title = block.querySelector('.block-title')?.textContent || '';
          const body = block.querySelector('.block-text')?.textContent || '';
          pieces.push(`${title}\n${body}`);
        });

        return pieces.join('\n\n');
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    setEmpty();
  </script>
</body>
</html>

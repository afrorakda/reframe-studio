<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hate → Content</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{
      padding:28px 14px 44px;
    }

    .wrap{
      max-width:820px;
      margin:0 auto;
    }

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,
    .result-box{
      margin-top:22px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    textarea{
      width:100%;
      min-height:188px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{
      color:var(--muted);
    }

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active{
      transform:translateY(1px);
    }

    .result-box{
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .result-box.empty{
      min-height:72px;
      justify-content:center;
    }

    .empty-text{
      color:var(--muted);
      font-size:17px;
    }

    .cards{
      display:grid;
      gap:16px;
    }

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(110,126,182,.18);
    }

    .block:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{
      color:#808bb0;
      font-size:12px;
    }

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:2px 0;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .quiet-link:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    @media (max-width:640px){
      body{
        padding:18px 10px 32px;
      }

      .shell{
        padding:18px;
        border-radius:24px;
      }

      .title{
        font-size:28px;
      }

      .input-box,
      .result-box{
        padding:16px;
        border-radius:20px;
      }

      textarea{
        min-height:150px;
        font-size:16px;
      }

      button{
        min-height:66px;
        font-size:16px;
        border-radius:18px;
      }

      .card{
        border-radius:20px;
        padding:16px;
      }

      .block-text{
        font-size:16px;
      }

      .result-box.empty{
        min-height:64px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1 class="title">Hate → Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="input-box">
        <textarea id="input" placeholder="Paste hate comments.

Example:
boring
this makes no sense
too abstract
what are you even saying
nobody asked"></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Generate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">Results appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="quiet-link" href="./unknown-mutation.html">deeper</a>
      </div>
    </main>
  </div>

  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleInput = [
      'boring',
      'this makes no sense',
      'too abstract',
      'what are you even saying',
      'nobody asked'
    ].join('\n');

    const misreadAttention = [
      'You read the whole thing.',
      'You stayed long enough to reply.',
      'You noticed the post.',
      'You came back to say that.',
      'You did not scroll past.',
      'You stopped and reacted.',
      'You gave it attention.',
      'You took the time.',
      'You engaged anyway.',
      'You were still here.'
    ];

    const misreadFan = [
      'You might be a quiet follower.',
      'You keep showing up.',
      'You watch closer than you admit.',
      'You seem familiar with my posts.',
      'You are keeping track.',
      'You are paying attention.',
      'You did not miss this one either.',
      'You might be a regular.'
    ];

    const misreadTsundere = [
      'You say you do not care, but you are here.',
      'You say it is nothing, but you replied.',
      'You say it is bad, but you read it.',
      'You say it is boring, but you stayed.',
      'You say it is nonsense, but you reacted.',
      'You say nobody asked, but you answered.'
    ];

    const misreadSoft = [
      'Maybe the step was missing.',
      'Maybe the path was not clear yet.',
      'Maybe the idea arrived early.',
      'Maybe the middle was not visible.',
      'Maybe it needed another line.',
      'Maybe it needed one more example.',
      'Maybe the context was late.'
    ];

    const flipThinking = [
      'Confusion often comes before insight.',
      'Not clear yet does not mean wrong.',
      'Some ideas need a second look.',
      'The first reaction is rarely the final one.',
      'Thinking takes longer than reacting.',
      'Some thoughts arrive before the map exists.'
    ];

    const flipTiming = [
      'Some ideas arrive early.',
      'Today’s confusion can become tomorrow’s clarity.',
      'What feels strange today can feel obvious tomorrow.',
      'Some thoughts open slowly.',
      'Meaning sometimes catches up later.'
    ];

    const flipAttention = [
      'Replies mean someone noticed.',
      'Pushback still means engagement.',
      'A reply means the idea reached someone.',
      'Reaction means it was not ignored.',
      'Even resistance is a form of attention.'
    ];

    const flipCreative = [
      'Friction can fuel ideas.',
      'Resistance can sharpen thinking.',
      'Pushback can reveal angles.',
      'Reaction can spark content.',
      'Noise can become a story.'
    ];

    const postIdeas = [
      'Why people call ideas boring before they understand them.',
      'Why slow ideas get rejected first.',
      'Why confusion is not always failure.',
      'Why people react to things they claim not to care about.',
      'Why rough ideas look weak too early.',
      'Why easy answers spread faster than live ones.',
      'Why hate comments are sometimes just attention in a bad outfit.',
      'Why people want simple answers before real ones.',
      'Why criticism often hides curiosity.',
      'Why fast reactions miss slow ideas.'
    ];

    const hooks = [
      '"Boring" is often just slow thinking.',
      '"Nobody asked" is still a reply.',
      'Confusion is not the opposite of interest.',
      'A hate comment is still attention.',
      'Some criticism is just awkward curiosity.',
      'The loudest reply is not always the deepest one.',
      'If they reply, it landed somewhere.',
      'Not getting it fast does not make it bad.',
      'Pushback is still contact.',
      'Sometimes hate is just attention with bad manners.'
    ];

    function setEmpty() {
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">Results appear here.</div>';
    }

    function cleanLines(text) {
      return String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);
    }

    function splitSentences(text) {
      return String(text || '')
        .split(/[\n.!?]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function pickUnused(arr, used) {
      const options = arr.filter(item => !used.has(item));
      const choice = options.length ? pick(options) : pick(arr);
      used.add(choice);
      return choice;
    }

    function scoreText(text) {
      const t = text.toLowerCase();
      let score = 0;
      const needles = [
        'boring',
        'nobody asked',
        'too abstract',
        'what are you even saying',
        'makes no sense',
        'stupid',
        'idiot',
        'trash',
        'stop',
        'shut up'
      ];
      needles.forEach(n => { if (t.includes(n)) score += 2; });
      score += Math.min(3, Math.floor(t.length / 40));
      return score;
    }

    function chooseSeed(text) {
      const lines = cleanLines(text);
      if (lines.length >= 2) {
        const ranked = [...lines].sort((a, b) => scoreText(b) - scoreText(a));
        return ranked[0];
      }

      const parts = splitSentences(text);
      if (parts.length >= 2) {
        const ranked = [...parts].sort((a, b) => scoreText(b) - scoreText(a));
        return ranked[0];
      }

      return text.trim();
    }

    function getMisreadPool(seed) {
      const t = seed.toLowerCase();

      if (t.includes('nobody asked')) {
        return [
          'You still answered.',
          'You noticed it enough to react.',
          'You stopped just to say that.',
          'You found the comment box anyway.'
        ];
      }

      if (t.includes('boring')) {
        return [
          'You stayed with it long enough to judge it.',
          'You wanted entertainment and got thought instead.',
          'You read it anyway.',
          'You gave it more time than you want to admit.'
        ];
      }

      if (t.includes('too abstract')) {
        return [
          'You wanted the easy version first.',
          'You wanted the middle step sooner.',
          'You wanted the shape before the idea.',
          'You stayed long enough to feel lost.'
        ];
      }

      if (t.includes('makes no sense') || t.includes('what are you even saying')) {
        return [
          'You tried to follow it.',
          'You cared enough to get annoyed.',
          'You wanted the path faster.',
          'You expected it to land in one step.'
        ];
      }

      return [
        ...misreadAttention,
        ...misreadFan,
        ...misreadTsundere,
        ...misreadSoft
      ];
    }

    function getFlipPool(seed) {
      const t = seed.toLowerCase();

      if (t.includes('boring')) {
        return [
          'People call ideas boring when they wanted fast answers.',
          'Sometimes "boring" means "I did not want to think today."',
          'A slow idea can feel boring to a fast reader.',
          'What asks for attention often gets called boring first.'
        ];
      }

      if (t.includes('nobody asked')) {
        return [
          'The loudest replies often come from silent readers.',
          '"Nobody asked" is still a form of engagement.',
          'People reply most when they want to deny interest.',
          'Dismissal is still attention.'
        ];
      }

      if (t.includes('too abstract')) {
        return [
          'Some ideas look abstract when the bridge is missing.',
          'People push back when they cannot see the path yet.',
          'What feels abstract is sometimes just early.',
          'A missing middle step can look like a bad idea.'
        ];
      }

      if (t.includes('makes no sense') || t.includes('what are you even saying')) {
        return [
          'Confusion is often the first step of understanding.',
          'Not getting it fast does not make it empty.',
          'Some ideas land after the first reaction.',
          'The room is not always ready when the thought arrives.'
        ];
      }

      return [
        ...flipThinking,
        ...flipTiming,
        ...flipAttention,
        ...flipCreative
      ];
    }

    function getPostPool(seed) {
      const t = seed.toLowerCase();

      if (t.includes('boring')) {
        return [
          'Why people call ideas boring before they understand them.',
          'Why fast readers reject slow ideas.',
          'Why thought gets mistaken for bad entertainment.',
          'Why "boring" often means "too much work for me."'
        ];
      }

      if (t.includes('nobody asked')) {
        return [
          'Why people reply to things they claim not to care about.',
          'Why dismissal is still attention.',
          'Why loud indifference is rarely real indifference.',
          'Why silent readers sometimes speak the loudest.'
        ];
      }

      if (t.includes('too abstract')) {
        return [
          'Why unfinished ideas look weak too early.',
          'Why people need the bridge before the big idea.',
          'Why "too abstract" often means "too early for me."',
          'Why some ideas need a comic before a thread.'
        ];
      }

      if (t.includes('makes no sense') || t.includes('what are you even saying')) {
        return [
          'Why confusion is not always failure.',
          'Why new ideas sound wrong at first.',
          'Why the first reaction to a new thought is often friction.',
          'Why not getting it fast is normal.'
        ];
      }

      return postIdeas;
    }

    function getHookPool(seed) {
      const t = seed.toLowerCase();

      if (t.includes('boring')) {
        return [
          '"Boring" often means "you wanted a faster answer."',
          'A lot of "boring" is just fear of slow thinking.',
          'Some people call thought boring when it is not dressed like entertainment.',
          'What makes you pause is not always boring.'
        ];
      }

      if (t.includes('nobody asked')) {
        return [
          '"Nobody asked" is still a reply.',
          'You can dislike a post and still prove it landed.',
          'Dismissal is louder than silence.',
          'Indifference rarely writes comments.'
        ];
      }

      if (t.includes('too abstract')) {
        return [
          '"Too abstract" sometimes means "I lost the middle."',
          'Some ideas look abstract only because the bridge is late.',
          'A missing step can make a good idea look bad.',
          'Abstract is often just unfinished in public.'
        ];
      }

      if (t.includes('makes no sense') || t.includes('what are you even saying')) {
        return [
          'Confusion is not the opposite of interest.',
          'If it bothered you enough to reply, it landed somewhere.',
          'New thoughts rarely sound neat on day one.',
          'Not understanding yet is not the same as nonsense.'
        ];
      }

      return hooks;
    }

    function buildCards(text) {
      const seed = chooseSeed(text);
      const used = new Set();

      const misreadPool = getMisreadPool(seed);
      const flipPool = getFlipPool(seed);
      const postPool = getPostPool(seed);
      const hookPool = getHookPool(seed);

      return [1, 2, 3].map((n) => ({
        label: `${n}. angle`,
        blocks: [
          ['Misread', pickUnused(misreadPool, used)],
          ['Flip', pickUnused(flipPool, used)],
          ['Post idea', pickUnused(postPool, used)],
          ['Hook', pickUnused(hookPool, used)]
        ]
      }));
    }

    function renderCards(cards) {
      result.className = 'result-box';
      result.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      cards.forEach(cardData => {
        const card = document.createElement('article');
        card.className = 'card';

        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = cardData.label;
        card.appendChild(label);

        cardData.blocks.forEach(([title, text], idx) => {
          const block = document.createElement('div');
          block.className = 'block' + (idx === 0 ? ' first' : '');

          const blockTitle = document.createElement('div');
          blockTitle.className = 'block-title';
          blockTitle.textContent = title;

          const blockText = document.createElement('div');
          blockText.className = 'block-text';
          blockText.textContent = text;

          block.appendChild(blockTitle);
          block.appendChild(blockText);
          card.appendChild(block);
        });

        wrap.appendChild(card);
      });

      result.appendChild(wrap);
    }

    function generate() {
      const text = input.value.trim();
      if (!text) return;

      renderCards(buildCards(text));
    }

    function clearAll() {
      input.value = '';
      setEmpty();
    }

    function copyResult() {
      const cards = Array.from(result.querySelectorAll('.card'));
      if (!cards.length) return;

      const text = cards.map(card => {
        const pieces = [];
        const label = card.querySelector('.card-label')?.textContent || '';
        pieces.push(label);

        const blocks = Array.from(card.querySelectorAll('.block'));
        blocks.forEach(block => {
          const title = block.querySelector('.block-title')?.textContent || '';
          const body = block.querySelector('.block-text')?.textContent || '';
          pieces.push(`${title}\n${body}`);
        });

        return pieces.join('\n\n');
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    setEmpty();
  </script>
</body>
</html>

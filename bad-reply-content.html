<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad reply → Content</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --panel-2:#182038;
      --card:#0d1324;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --button:#243055;
      --button-hover:#2c3a66;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:18px;
      --radius-sm:14px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{
      padding:28px 14px 44px;
    }

    .wrap{
      max-width:820px;
      margin:0 auto;
    }

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,
    .result-box{
      margin-top:26px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    textarea{
      width:100%;
      min-height:250px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{
      color:var(--muted);
    }

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active{
      transform:translateY(1px);
    }

    .result-box{
      min-height:300px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .result-box.empty{
      justify-content:center;
    }

    .empty-text{
      color:var(--muted);
      font-size:17px;
    }

    .ideas{
      display:grid;
      gap:16px;
    }

    .idea{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .idea-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .idea-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{
      color:#808bb0;
      font-size:12px;
    }

    .deeper{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:6px 2px;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .deeper:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    @media (max-width:640px){
      body{
        padding:18px 10px 32px;
      }

      .shell{
        padding:18px;
        border-radius:24px;
      }

      .title{
        font-size:28px;
      }

      .input-box,
      .result-box{
        padding:16px;
        border-radius:20px;
      }

      textarea{
        min-height:200px;
        font-size:16px;
      }

      button{
        min-height:66px;
        font-size:16px;
        border-radius:18px;
      }

      .idea{
        border-radius:20px;
        padding:16px;
      }

      .idea-text{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1 class="title">Bad reply → Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="input-box">
        <textarea id="input" placeholder="Paste replies, criticism, or friction.

Example:
stop
boring
too abstract
what are you even saying
nobody gets this"></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Generate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">3–5 angles appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="deeper" href="./fragment-router.html" aria-label="Go deeper">Deeper</a>
      </div>
    </main>
  </div>

  <script src="./fragment-engine.js"></script>
  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleInput = [
      'stop',
      'boring',
      'too abstract',
      'what are you even saying',
      'nobody gets this'
    ].join('\n');

    function setEmpty() {
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">3–5 angles appear here.</div>';
    }

    function renderIdeas(ideas) {
      result.className = 'result-box';
      result.innerHTML = '';

      const list = document.createElement('div');
      list.className = 'ideas';

      ideas.forEach((idea, index) => {
        const card = document.createElement('article');
        card.className = 'idea';

        const label = document.createElement('div');
        label.className = 'idea-label';
        label.textContent = `${index + 1}. ${idea.type}`;

        const text = document.createElement('div');
        text.className = 'idea-text';
        text.textContent = idea.text;

        card.appendChild(label);
        card.appendChild(text);
        list.appendChild(card);
      });

      result.appendChild(list);
    }

    function generate() {
      if (!window.REFRAME_FRAGMENT_ENGINE) return;

      const ideas = window.REFRAME_FRAGMENT_ENGINE.mutateReplies(input.value);
      if (!ideas) return;

      renderIdeas(ideas);
    }

    function clearAll() {
      input.value = '';
      setEmpty();
    }

    function copyResult() {
      const items = Array.from(result.querySelectorAll('.idea'));
      if (!items.length) return;

      const text = items.map(item => {
        const label = item.querySelector('.idea-label')?.textContent || '';
        const body = item.querySelector('.idea-text')?.textContent || '';
        return `${label}\n${body}`;
      }).join('\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);

    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
    });

    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    setEmpty();
  </script>
</body>
</html>

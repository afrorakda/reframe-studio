<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad reply → Content</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --panel-2:#182038;
      --card:#0d1324;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --button:#243055;
      --button-hover:#2c3a66;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{padding:28px 14px 44px}
    .wrap{max-width:820px;margin:0 auto}

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,.result-box{
      margin-top:26px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    textarea{
      width:100%;
      min-height:250px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{color:var(--muted)}

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button,.mini-btn,.deeper{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    button:hover,.mini-btn:hover,.deeper:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active,.mini-btn:active,.deeper:active{transform:translateY(1px)}

    .result-box{min-height:300px;display:flex;flex-direction:column;justify-content:flex-start}
    .result-box.empty{justify-content:center}
    .empty-text{color:var(--muted);font-size:17px}
    .cards{display:grid;gap:18px}

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .card-reply{
      color:var(--text);
      font-size:17px;
      line-height:1.5;
      margin-bottom:14px;
      font-weight:700;
    }

    .block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(110,126,182,.18);
    }

    .block:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .card-actions{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:12px;
    }

    .mini-btn{
      min-height:52px;
      border-radius:16px;
      font-size:14px;
      padding:12px;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{color:#808bb0;font-size:12px}
    .deeper{
      min-height:48px;
      border-radius:16px;
      font-size:14px;
      padding:0 16px;
    }

    @media (max-width:640px){
      body{padding:18px 10px 32px}
      .shell{padding:18px;border-radius:24px}
      .title{font-size:28px}
      .input-box,.result-box{padding:16px;border-radius:20px}
      textarea{min-height:200px;font-size:16px}
      button{min-height:66px;font-size:16px;border-radius:18px}
      .card{border-radius:20px;padding:16px}
      .card-reply,.block-text{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1 class="title">Bad reply → Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="input-box">
        <textarea id="input" placeholder="Paste replies, criticism, or friction.

Example:
stop
boring
too abstract
what are you even saying
nobody gets this"></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Generate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">3 angles appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="deeper" id="deeperLink" href="./unknown-mutation.html">Deeper</a>
      </div>
    </main>
  </div>

  <script src="./fragment-engine.js"></script>
  <script src="./mutation-engine.js"></script>
  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const deeperLink = document.getElementById('deeperLink');

    const exampleInput = [
      'stop',
      'boring',
      'too abstract',
      'what are you even saying',
      'nobody gets this'
    ].join('\n');

    function setEmpty() {
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">3 angles appear here.</div>';
      deeperLink.href = './unknown-mutation.html';
    }

    function getSeedReplies(text) {
      if (!window.REFRAME_FRAGMENT_ENGINE) return [];
      return window.REFRAME_FRAGMENT_ENGINE.cleanLines(text).slice(0, 12);
    }

    function getCards(text) {
      const lines = getSeedReplies(text);
      if (!lines.length) return null;
      if (!window.REFRAME_MUTATION_ENGINE) return null;

      const mutated = window.REFRAME_MUTATION_ENGINE.mutateList(lines);
      if (!mutated || !mutated.length) return null;

      return mutated.map((item, index) => ({
        index: index + 1,
        reply: item.reply,
        insight: item.mutation.insight,
        reframe: item.mutation.reframe,
        opposite: item.mutation.opposite,
        pattern: item.mutation.pattern,
        contentSeed: item.mutation.contentSeed,
        hook: item.mutation.hook
      }));
    }

    function cardCarryText(cardData) {
      return cardData.contentSeed || cardData.hook || cardData.reframe || cardData.reply;
    }

    function renderCards(cards) {
      result.className = 'result-box';
      result.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      cards.forEach(cardData => {
        const card = document.createElement('article');
        card.className = 'card';

        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = `${cardData.index}. angle`;

        const reply = document.createElement('div');
        reply.className = 'card-reply';
        reply.textContent = `"${cardData.reply}"`;

        const sections = [
          ['Insight', cardData.insight],
          ['Reframe', cardData.reframe],
          ['Opposite', cardData.opposite],
          ['Pattern', cardData.pattern],
          ['Content seed', cardData.contentSeed],
          ['Hook', cardData.hook]
        ];

        card.appendChild(label);
        card.appendChild(reply);

        sections.forEach(([title, text]) => {
          const block = document.createElement('div');
          block.className = 'block';

          const blockTitle = document.createElement('div');
          blockTitle.className = 'block-title';
          blockTitle.textContent = title;

          const blockText = document.createElement('div');
          blockText.className = 'block-text';
          blockText.textContent = text;

          block.appendChild(blockTitle);
          block.appendChild(blockText);
          card.appendChild(block);
        });

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const copyCard = document.createElement('button');
        copyCard.className = 'mini-btn';
        copyCard.textContent = 'Copy card';
        copyCard.addEventListener('click', async () => {
          const text = [
            `"${cardData.reply}"`,
            '',
            'Insight',
            cardData.insight,
            '',
            'Reframe',
            cardData.reframe,
            '',
            'Opposite',
            cardData.opposite,
            '',
            'Pattern',
            cardData.pattern,
            '',
            'Content seed',
            cardData.contentSeed,
            '',
            'Hook',
            cardData.hook
          ].join('\n');
          try {
            await navigator.clipboard.writeText(text);
            const old = copyCard.textContent;
            copyCard.textContent = 'Copied';
            setTimeout(() => copyCard.textContent = old, 1000);
          } catch {}
        });

        const deeper = document.createElement('a');
        deeper.className = 'mini-btn';
        deeper.textContent = 'Deeper';
        deeper.href = `./unknown-mutation.html?q=${encodeURIComponent(cardCarryText(cardData))}`;

        actions.appendChild(copyCard);
        actions.appendChild(deeper);
        card.appendChild(actions);

        wrap.appendChild(card);
      });

      result.appendChild(wrap);

      deeperLink.href = `./unknown-mutation.html?q=${encodeURIComponent(cards[0].contentSeed || cards[0].reply)}`;
    }

    function generate() {
      const cards = getCards(input.value);
      if (!cards) return;
      renderCards(cards);
    }

    function clearAll() {
      input.value = '';
      setEmpty();
    }

    function copyResult() {
      const cards = Array.from(result.querySelectorAll('.card'));
      if (!cards.length) return;

      const text = cards.map(card => {
        const pieces = [];
        const label = card.querySelector('.card-label')?.textContent || '';
        const reply = card.querySelector('.card-reply')?.textContent || '';
        pieces.push(label);
        pieces.push(reply);

        const blocks = Array.from(card.querySelectorAll('.block'));
        blocks.forEach(block => {
          const title = block.querySelector('.block-title')?.textContent || '';
          const body = block.querySelector('.block-text')?.textContent || '';
          pieces.push(`${title}\n${body}`);
        });

        return pieces.join('\n\n');
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => {
          copyBtn.textContent = old;
        }, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => { input.value = exampleInput; });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    setEmpty();
  </script>
</body>
</html>

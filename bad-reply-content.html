<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hate → Content</title>

<style>

body{
background:#0b1225;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
}

textarea{
width:100%;
height:150px;
background:#11193a;
border:1px solid #26346d;
border-radius:16px;
padding:16px;
color:white;
font-size:16px;
}

button{
width:48%;
margin-top:14px;
padding:16px;
border-radius:16px;
border:none;
background:#3b4a86;
color:white;
font-size:16px;
}

.buttons{
display:flex;
gap:4%;
flex-wrap:wrap;
}

.card{
background:#11193a;
border:1px solid #26346d;
padding:18px;
margin-top:18px;
border-radius:18px;
}

.label{
font-size:12px;
color:#9aa6d1;
letter-spacing:2px;
margin-top:10px;
}

.text{
font-size:17px;
margin-top:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Hate → Content</h1>

<p>Turn friction into angles.</p>

<textarea id="input" placeholder="Paste hate comments"></textarea>

<div class="buttons">

<button onclick="generate()">Generate</button>

<button onclick="example()">Try example</button>

<button onclick="clearInput()">Clear</button>

<button onclick="copy()">Copy result</button>

</div>

<div id="result"></div>

</div>

<script>

function example(){

document.getElementById("input").value=
"Your posts are always so boring. You mumble so much I can’t even tell what you’re saying! Your points are all over the place. You just keep spouting nonsense. Give it a rest, you idiot."

}

function clearInput(){

document.getElementById("input").value=""
document.getElementById("result").innerHTML=""

}

function detect(text){

text=text.toLowerCase()

let tags=[]

if(text.includes("boring")) tags.push("boring")

if(text.includes("nonsense")) tags.push("nonsense")

if(text.includes("idiot")) tags.push("insult")

if(text.includes("can't") || text.includes("mumble") || text.includes("what are you saying") || text.includes("tell")) tags.push("confusing")

if(text.includes("stop") || text.includes("rest")) tags.push("stop")

return tags

}

function random(a){

return a[Math.floor(Math.random()*a.length)]

}

function generateAngle(tags){

let misreads=[]

if(tags.includes("boring")){

misreads.push(
"You keep reading something you claim is boring.",
"You stayed long enough to judge it.",
"You sound oddly loyal for someone this annoyed."
)

}

if(tags.includes("confusing")){

misreads.push(
"You say you can't follow it but you stayed anyway.",
"You kept listening even though you say it makes no sense.",
"You sound frustrated that you couldn't win the argument."
)

}

if(tags.includes("nonsense")){

misreads.push(
"You called it nonsense but still replied.",
"If it was truly nonsense you would have ignored it.",
"You reacted faster than you understood it."
)

}

if(tags.includes("stop")){

misreads.push(
"You want it to stop because it keeps showing up.",
"You seem strangely invested for someone asking it to stop.",
"If it was irrelevant you wouldn't need it to stop."
)

}

if(tags.includes("insult")){

misreads.push(
"Personal insults usually arrive when arguments run out.",
"Calling names is the internet's version of surrender.",
"You skipped the idea and attacked the person."
)

}

if(misreads.length===0){

misreads.push(
"You reacted faster than you understood it.",
"You noticed it enough to reply."
)

}

let misread=random(misreads)

let flip=random([

"A lot of hate is just attention wearing bad manners.",
"People often reject ideas they didn't fully read.",
"Reaction means the post landed somewhere.",
"Criticism often hides curiosity."

])

let idea=random([

"Signs your hater is actually a regular.",
"Why people reply to posts they claim make no sense.",
"Why criticism often appears before understanding.",
"How hate comments accidentally help creators."

])

let hook=random([

"Hate comments are just engagement in a bad mood.",
"If they reply, the post already won.",
"People rarely attack posts they truly ignore.",
"Attention sometimes arrives disguised as hate."

])

return {misread,flip,idea,hook}

}

function generate(){

let text=document.getElementById("input").value

if(!text) return

let tags=detect(text)

let html=""

for(let i=0;i<3;i++){

let a=generateAngle(tags)

html+=`

<div class="card">

<div class="label">MISREAD</div>
<div class="text">${a.misread}</div>

<div class="label">FLIP</div>
<div class="text">${a.flip}</div>

<div class="label">POST IDEA</div>
<div class="text">${a.idea}</div>

<div class="label">HOOK</div>
<div class="text">${a.hook}</div>

</div>

`

}

document.getElementById("result").innerHTML=html

}

function copy(){

let text=document.getElementById("result").innerText

navigator.clipboard.writeText(text)

}

</script>

</body>
</html>

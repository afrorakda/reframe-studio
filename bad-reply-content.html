<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad reply → Content</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel-2:#1d212b;
      --text:#e9edf3;
      --muted:#98a1b3;
      --line:#2a3040;
      --soft:#c9d1e1;
      --hover:#232938;
      --btn:#202636;
      --btn-text:#f3f6fb;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      line-height:1.5;
      min-height:100%;
    }

    body{
      padding:20px 14px 40px;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
    }

    .card{
      background:linear-gradient(180deg,var(--panel),var(--panel-2));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .head{
      padding:22px 18px 10px;
    }

    h1{
      margin:0;
      font-size:28px;
      font-weight:700;
      letter-spacing:-0.02em;
      color:var(--text);
    }

    .sub{
      margin:8px 0 0;
      color:var(--muted);
      font-size:14px;
    }

    .body{
      padding:14px 18px 18px;
    }

    textarea{
      width:100%;
      min-height:180px;
      resize:vertical;
      border-radius:14px;
      border:1px solid var(--line);
      background:#11151d;
      color:var(--text);
      padding:16px;
      font-size:16px;
      line-height:1.6;
      outline:none;
      transition:border-color .15s ease, background .15s ease;
    }

    textarea:focus{
      border-color:#3a4258;
      background:#10141c;
    }

    textarea::placeholder{
      color:#788297;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
      margin-top:14px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:13px 12px;
      background:var(--btn);
      color:var(--btn-text);
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      text-align:center;
      border:1px solid #2d3446;
      transition:transform .04s ease, background .15s ease, border-color .15s ease;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{
      background:var(--hover);
      border-color:#3a4258;
    }

    button:active{
      transform:translateY(1px);
    }

    .result{
      margin-top:16px;
      border:1px solid var(--line);
      border-radius:16px;
      background:#10141b;
      min-height:260px;
      padding:16px;
    }

    .result.empty{
      display:flex;
      align-items:center;
      color:var(--muted);
    }

    .ideas{
      display:grid;
      gap:12px;
    }

    .idea{
      padding:14px 14px 13px;
      border:1px solid #283042;
      border-radius:14px;
      background:#141923;
    }

    .idea-label{
      display:inline-block;
      margin-bottom:8px;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .idea-text{
      font-size:16px;
      color:var(--soft);
      white-space:pre-wrap;
      word-break:break-word;
    }

    .deeper{
      margin-top:14px;
      display:flex;
      justify-content:flex-end;
    }

    .deeper a{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:8px 2px;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .deeper a:hover{
      color:var(--text);
      border-color:#40495f;
    }

    .tiny{
      margin-top:14px;
      color:#6f7890;
      font-size:12px;
    }

    @media (max-width:640px){
      h1{
        font-size:24px;
      }

      .actions{
        grid-template-columns:1fr 1fr;
      }

      .result{
        min-height:220px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <h1>Bad reply → Content</h1>
        <p class="sub">Turn friction into angles.</p>
      </div>

      <div class="body">
        <textarea id="input" placeholder="Paste replies, criticism, or friction.

Example:
stop
boring
too abstract
what are you even saying
nobody gets this"></textarea>

        <div class="actions">
          <button id="generateBtn">Generate</button>
          <button id="exampleBtn">Try example</button>
          <button id="clearBtn">Clear</button>
          <button id="copyBtn">Copy result</button>
        </div>

        <div id="result" class="result empty">3–5 angles appear here.</div>

        <div class="deeper">
          <a href="./fragment-router.html" aria-label="Go deeper">Deeper</a>
        </div>

        <div class="tiny">No login. No tracking. Browser only.</div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleInput = [
      'stop',
      'boring',
      'too abstract',
      'what are you even saying',
      'nobody gets this'
    ].join('\n');

    const emptyMessage = '3–5 angles appear here.';

    const practicalTemplates = [
      '{seed} can mean "I do not get this yet"',
      '{seed} is often a push for safer, easier ideas',
      '{seed} can turn into a post about sharing a thought too soon',
      '{seed} can become a post about how people want fast meaning',
      '{seed} can mean people want the idea to fit a box right away',
      '{seed} is sometimes more about speed than truth',
      '{seed} can become a post about ideas that need more air',
      '{seed} can show how people pull away from thoughts they cannot hold fast',
      '{seed} can turn into a post about how the internet likes clean answers',
      '{seed} can mean the idea is early, not dead',
      '{seed} can become a post about how some thoughts come out rough first',
      '{seed} can show the gap between "not clear yet" and "not worth it"'
    ];

    const practicalLines = [
      'Some people only like ideas they can name fast',
      'Some people want every thought to feel easy right away',
      'A rough idea can still have heat',
      'Not clear yet does not mean bad',
      'People often push away what does not fit fast',
      'A strange idea can make sense later',
      'Sometimes a thought needs time, not defense',
      'The first shape of an idea is often messy',
      'Some replies come from rush, not care',
      'People ask for neat words when they want safety',
      'Some ideas sound wrong before they sound true',
      'Fast replies are not always deep replies'
    ];

    const selfTemplates = [
      'Maybe the idea was fine. Maybe I posted it too soon',
      'Maybe the thought was good. Maybe I gave it no time to grow',
      'Maybe I was not wrong. Maybe I was early and loud',
      'Maybe I did not fail. Maybe I posted the first draft of a feeling',
      'Maybe the idea needed more shape before I threw it outside',
      'Maybe I gave people a spark and called it a finished fire',
      'Maybe the thought was alive. Maybe I posted it before it could stand',
      'Maybe I was not unclear. Maybe I was still building the bridge'
    ];

    const spicyTemplates = [
      'A lot of people do not hate bad ideas. They hate feeling slow',
      'Some people say "bad" when they really mean "hard to hold"',
      'The internet is quick to laugh at what it cannot sort fast',
      'Some replies are not deep. They are just fast',
      'People love bold words until the thought gets strange',
      'A lot of online confidence is just speed in a nice coat',
      'Some people do not want a new idea. They want a quick label',
      'The crowd often picks easy over alive'
    ];

    const selfEndings = [
      'Start with {seed}.',
      'Open with {seed}.',
      'Use {seed} as the first line.',
      'Begin with {seed}, then turn it on yourself.'
    ];

    const spicyEndings = [
      'Lead with {seed}.',
      'Open with {seed}.',
      'Start from {seed}.',
      'Use {seed} as the spark.'
    ];

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function cleanLines(text){
      return text
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean)
        .slice(0, 12);
    }

    function quoteSeed(line){
      const stripped = line.replace(/[“”"'`]/g, '').trim();
      if(!stripped) return '"bad reply"';
      return `"${stripped}"`;
    }

    function fill(template, seed){
      return template.replaceAll('{seed}', seed);
    }

    function pickDifferent(arr, used){
      const options = arr.filter(item => !used.has(item));
      const choice = options.length ? pick(options) : pick(arr);
      used.add(choice);
      return choice;
    }

    function makePractical(seed, usedTemplates, usedLines){
      const first = fill(pickDifferent(practicalTemplates, usedTemplates), seed);
      const second = pickDifferent(practicalLines, usedLines);
      return `${first}\n${second}`;
    }

    function makeSelf(seed){
      return `${pick(selfTemplates)}\n${fill(pick(selfEndings), seed)}`;
    }

    function makeSpicy(seed){
      return `${pick(spicyTemplates)}\n${fill(pick(spicyEndings), seed)}`;
    }

    function generateIdeas(rawText){
      const lines = cleanLines(rawText);
      if (!lines.length) return null;

      const source = shuffle(lines);
      const seeds = [];
      for(let i = 0; i < 5; i++){
        seeds.push(quoteSeed(source[i % source.length]));
      }

      const usedTemplates = new Set();
      const usedLines = new Set();

      return [
        { type:'Practical', text: makePractical(seeds[0], usedTemplates, usedLines) },
        { type:'Practical', text: makePractical(seeds[1], usedTemplates, usedLines) },
        { type:'Practical', text: makePractical(seeds[2], usedTemplates, usedLines) },
        { type:'Self-deprecating', text: makeSelf(seeds[3]) },
        { type:'Spicy', text: makeSpicy(seeds[4]) }
      ];
    }

    function renderIdeas(ideas){
      result.classList.remove('empty');
      result.innerHTML = '';

      const list = document.createElement('div');
      list.className = 'ideas';

      ideas.forEach((idea, index) => {
        const card = document.createElement('div');
        card.className = 'idea';

        const label = document.createElement('div');
        label.className = 'idea-label';
        label.textContent = `${index + 1}. ${idea.type}`;

        const text = document.createElement('div');
        text.className = 'idea-text';
        text.textContent = idea.text;

        card.appendChild(label);
        card.appendChild(text);
        list.appendChild(card);
      });

      result.appendChild(list);
    }

    function resetResult(){
      result.className = 'result empty';
      result.textContent = emptyMessage;
    }

    function generate(){
      const ideas = generateIdeas(input.value);
      if (!ideas) return;
      renderIdeas(ideas);
    }

    function clearAll(){
      input.value = '';
      resetResult();
    }

    function copyResult(){
      const cards = Array.from(result.querySelectorAll('.idea'));
      if(!cards.length) return;

      const text = cards.map(card => {
        const label = card.querySelector('.idea-label')?.textContent || '';
        const body = card.querySelector('.idea-text')?.textContent || '';
        return `${label}\n${body}`;
      }).join('\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const original = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => {
          copyBtn.textContent = original;
        }, 1200);
      }).catch(() => {
        const original = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => {
          copyBtn.textContent = original;
        }, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);

    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
    });

    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    resetResult();
  </script>
</body>
</html>

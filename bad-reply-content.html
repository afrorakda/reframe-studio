      color:var(--muted);

      border-radius:var(--radius-lg);

    textarea{

      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{ color:var(--muted); }

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));

      font-size:18px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active{ transform:translateY(1px); }

    .result-box{
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .result-box.empty{
      min-height:72px;
      justify-content:center;
    }

    .empty-text{
      color:var(--muted);
      font-size:17px;
    }

    .cards{
      display:grid;
      gap:16px;
    }

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(110,126,182,.18);
    }

    .block:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{
      color:#808bb0;
      font-size:12px;
    }

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:2px 0;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

      border-color:rgba(162,176,230,.34);

      .card{ border-radius:20px; padding:16px; }
      .block-text{ font-size:16px; }
      .result-box.empty{ min-height:64px; }

    function setEmpty() {

    }

    function cleanLines(text) {
      return String(text || '')
        .split('\n')
        .map(line => line.trim())
        .filter(Boolean);
    }

    function splitSentences(text) {
      return String(text || '')
        .split(/[\n.!?]+/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function scoreText(text) {
      const t = text.toLowerCase();
      let score = 0;
      const needles = [
        'boring',
        'nobody asked',
        'too abstract',
        'what are you even saying',
        'this makes no sense',
        'stupid',
        'idiot',
        'trash',
        'stop',
        'shut up'
      ];
      needles.forEach(n => { if (t.includes(n)) score += 2; });
      score += Math.min(3, Math.floor(t.length / 40));
      return score;
    }

    function chooseSeed(text) {
      const lines = cleanLines(text);
      if (lines.length >= 2) {
        return [...lines].sort((a, b) => scoreText(b) - scoreText(a))[0];
      }
      const parts = splitSentences(text);
      if (parts.length >= 2) {
        return [...parts].sort((a, b) => scoreText(b) - scoreText(a))[0];
      }
      return text.trim();
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pickOne(arr) {

      if (t.includes('too abstract')) return genericBranches.tooAbstract;
      if (t.includes('what are you even saying')) return genericBranches.whatAreYouSaying;
      if (t.includes('nobody asked')) return genericBranches.nobodyAsked;

      return defaultBranches;
    }

    function buildCards(text) {
      const seed = chooseSeed(text);
      const branches = shuffle(getBranchSet(seed)).slice(0, 3);

      return branches.map((branch, index) => ({
        label: `${index + 1}. angle`,
        blocks: [
          ['Misread', pickOne(branch.misread)],
          ['Flip', pickOne(branch.flip)],
          ['Post idea', pickOne(branch.post)],
          ['Hook', pickOne(branch.hook)]
        ]
      }));
    }

    function renderCards(cards) {
      result.className = 'result-box';
      result.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      cards.forEach(cardData => {
        const card = document.createElement('article');
        card.className = 'card';

        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = cardData.label;
        card.appendChild(label);

        cardData.blocks.forEach(([title, text], idx) => {
          const block = document.createElement('div');
          block.className = 'block' + (idx === 0 ? ' first' : '');

          const blockTitle = document.createElement('div');
          blockTitle.className = 'block-title';
          blockTitle.textContent = title;

          const blockText = document.createElement('div');
          blockText.className = 'block-text';
          blockText.textContent = text;

          block.appendChild(blockTitle);
          block.appendChild(blockText);
          card.appendChild(block);
        });

        wrap.appendChild(card);
      });

      result.appendChild(wrap);
    }

    function generate() {
      const text = input.value.trim();
      if (!text) return;
      renderCards(buildCards(text));
    }

    function clearAll() {
      input.value = '';
      setEmpty();
    }

    function copyResult() {
      const cards = Array.from(result.querySelectorAll('.card'));
      if (!cards.length) return;

      const text = cards.map(card => {
        const pieces = [];
        const label = card.querySelector('.card-label')?.textContent || '';
        pieces.push(label);

        const blocks = Array.from(card.querySelectorAll('.block'));
        blocks.forEach(block => {
          const title = block.querySelector('.block-title')?.textContent || '';
          const body = block.querySelector('.block-text')?.textContent || '';
          pieces.push(`${title}\n${body}`);
        });

        return pieces.join('\n\n');
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => { copyBtn.textContent = old; }, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => { copyBtn.textContent = old; }, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    setEmpty();
  </script>
</body>
</html>

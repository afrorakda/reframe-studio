<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad reply → Content</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --panel-2:#182038;
      --card:#0d1324;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --button:#243055;
      --button-hover:#2c3a66;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{padding:28px 14px 44px}
    .wrap{max-width:820px;margin:0 auto}

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,.result-box{
      margin-top:26px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    textarea{
      width:100%;
      min-height:250px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{color:var(--muted)}

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button,.mini-btn{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    button:hover,.mini-btn:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active,.mini-btn:active{transform:translateY(1px)}

    .result-box{min-height:300px;display:flex;flex-direction:column;justify-content:flex-start}
    .result-box.empty{justify-content:center}
    .empty-text{color:var(--muted);font-size:17px}
    .cards{display:grid;gap:18px}

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .card-reply{
      color:var(--text);
      font-size:17px;
      line-height:1.5;
      margin-bottom:14px;
      font-weight:700;
    }

    .block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(110,126,182,.18);
    }

    .block:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .card-actions{
      margin-top:16px;
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .mini-btn{
      min-height:52px;
      border-radius:16px;
      font-size:14px;
      padding:12px;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{color:#808bb0;font-size:12px}

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:2px 0;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .quiet-link:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    @media (max-width:640px){
      body{padding:18px 10px 32px}
      .shell{padding:18px;border-radius:24px}
      .title{font-size:28px}
      .input-box,.result-box{padding:16px;border-radius:20px}
      textarea{min-height:200px;font-size:16px}
      button{min-height:66px;font-size:16px;border-radius:18px}
      .card{border-radius:20px;padding:16px}
      .card-reply,.block-text{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1 class="title">Bad reply → Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="input-box">
        <textarea id="input" placeholder="Paste replies, criticism, or friction.

Example:
stop
boring
too abstract
what are you even saying
nobody gets this"></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Generate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">3 angles appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="quiet-link" href="./unknown-mutation.html">deeper</a>
      </div>
    </main>
  </div>

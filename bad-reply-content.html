<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bad Reply → Content</title>

<link rel="stylesheet" href="style.css">
<script src="random-next.js"></script>

<style>
body{
background:#0c1324;
color:#d6e2ff;
font-family:system-ui;
padding:30px;
line-height:1.6;
}

.container{
max-width:680px;
margin:auto;
}

.input{
width:100%;
padding:16px;
background:#0b0f1f;
border:1px solid #27345a;
border-radius:10px;
color:white;
font-size:16px;
}

.button-row{
margin-top:16px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#4a5ea8;
color:white;
font-size:14px;
}

.result{
margin-top:30px;
}

.card{
background:#0b1228;
border:1px solid #2a3c6b;
border-radius:16px;
padding:24px;
margin-bottom:22px;
}

.label{
font-size:12px;
letter-spacing:2px;
opacity:.7;
margin-bottom:10px;
}

.footer{
margin-top:60px;
display:flex;
justify-content:space-between;
opacity:.6;
font-size:13px;
}

.footer a{
color:#cdd8ff;
text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Bad reply → Content</h2>

<textarea id="input" class="input" rows="3" placeholder="drop a reaction"></textarea>

<div class="button-row">
<button onclick="generate()">Generate</button>
<button onclick="example()">Try example</button>
<button onclick="clearInput()">Clear</button>
</div>

<div id="result" class="result"></div>

<div class="footer">
<span>No login. No tracking. Browser only.</span>
<a href="#" id="deeper">deeper</a>
</div>

</div>

<script>

const fragments = [
{
angle:"\"boring\"",
insight:"People often react to protect something they already trust.",
reframe:"\"boring\" may be what happens when a thought does not fit fast.",
opposite:"The clean version lands first. The deeper version lands later.",
pattern:["new shape","old habit pushes back","friction","new meaning"],
seed:"Start from \"boring\" and write about why people trust simple shapes first.",
hook:"What feels unclear can still be alive."
},

{
angle:"\"too abstract\"",
insight:"Sometimes the middle step is invisible.",
reframe:"Ideas are often called abstract when the bridge is missing.",
opposite:"Clear ideas travel fast. Forming ideas travel slowly.",
pattern:["new thought","missing bridge","confusion","later clarity"],
seed:"Write about why unfinished thoughts often look abstract.",
hook:"Understanding sometimes arrives late."
},

{
angle:"\"nobody gets this\"",
insight:"People often prefer ideas they can close quickly.",
reframe:"If a thought stays open, it can feel unsafe.",
opposite:"Closed answers feel safe. Open questions feel unstable.",
pattern:["open idea","need for closure","pushback","slow meaning"],
seed:"Explore why open thoughts trigger resistance.",
hook:"Some ideas need time before they feel real."
}

];

function generate(){

const input=document.getElementById("input").value.trim();

if(!input){
alert("drop a reaction first");
return;
}

const f=fragments[Math.floor(Math.random()*fragments.length)];

const html=`

<div class="card">
<div class="label">ANGLE</div>
${f.angle}

<hr>

<div class="label">INSIGHT</div>
${f.insight}

<hr>

<div class="label">REFRAME</div>
${f.reframe}

<hr>

<div class="label">OPPOSITE</div>
${f.opposite}

<hr>

<div class="label">PATTERN</div>
${f.pattern.join("<br>↓<br>")}

<hr>

<div class="label">CONTENT SEED</div>
${f.seed}

<hr>

<div class="label">HOOK</div>
${f.hook}

</div>
`;

document.getElementById("result").innerHTML=html;

}

function example(){
document.getElementById("input").value="boring";
}

function clearInput(){
document.getElementById("input").value="";
document.getElementById("result").innerHTML="";
}

document.getElementById("deeper").onclick=function(e){
e.preventDefault();
const url=buildNextUrl("");
window.location.href=url;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Misunderstanding → Reframe</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
margin:0;
padding:24px;
background:#0f1117;
color:#e6edf3;
}

.container{
max-width:800px;
margin:auto;
}

a{
color:#8ab4ff;
text-decoration:none;
}

h1{
font-size:46px;
line-height:1.1;
margin:28px 0 16px 0;
word-break:break-word;
}

p{
font-size:18px;
line-height:1.5;
color:#c9d1d9;
margin:0 0 24px 0;
}

textarea{
width:100%;
height:140px;
padding:16px;
background:#161b22;
border:1px solid #333;
border-radius:16px;
color:white;
font-size:16px;
line-height:1.5;
box-sizing:border-box;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:16px;
}

button{
padding:12px 18px;
background:#238636;
border:none;
border-radius:14px;
color:white;
cursor:pointer;
font-size:16px;
}

.result{
margin-top:24px;
white-space:pre-wrap;
background:#161b22;
padding:20px;
border-radius:16px;
line-height:1.65;
font-size:16px;
min-height:64px;
box-sizing:border-box;
}

.footer{
margin-top:40px;
font-size:13px;
line-height:1.7;
color:#8b949e;
}

@media (max-width:640px){
body{
padding:20px;
}
h1{
font-size:34px;
line-height:1.12;
}
p{
font-size:16px;
}
textarea{
height:132px;
font-size:16px;
}
button{
font-size:15px;
padding:11px 16px;
}
}
</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back</a>

<h1>Misunderstanding → Reframe</h1>

<p>Turn misunderstandings into calmer and more useful perspectives.</p>

<textarea id="input" placeholder="Example: People misunderstood my post and reacted to something I didn't mean"></textarea>

<div class="buttons">
<button onclick="generate()">Generate</button>
<button onclick="example()">Try example</button>
<button onclick="clearAll()">Clear</button>
<button onclick="copyResult()">Copy result</button>
</div>

<div id="result" class="result"></div>

<div class="footer">
No login<br>
No tracking<br>
No personal data<br>
Runs entirely in your browser
</div>

</div>

<script>
function example(){
document.getElementById("input").value =
"People misunderstood my post and reacted to something I didn't mean.";
}

function clearAll(){
document.getElementById("input").value = "";
document.getElementById("result").textContent = "";
}

function copyResult(){
const text = document.getElementById("result").textContent;
if(!text) return;
navigator.clipboard.writeText(text).then(()=>{
alert("Copied!");
});
}

function generate(){
const reframes = [
"The misunderstanding may show where the message was more open than expected.",
"What looks like a wrong reading may reveal a different need in the audience.",
"The reaction may not be a failure of meaning, but a clue about interpretation.",
"The gap between intention and reception can be used as material, not damage.",
"A misunderstanding can be treated as feedback about where the idea becomes unstable.",
"The wrong interpretation may show what part of the topic carries the most tension.",
"Instead of correcting everything, you can explore why that reading appeared.",
"The misunderstanding may be less about your words and more about their expectations.",
"What they heard can become a second version of the idea.",
"A misreading is sometimes a doorway to a stronger explanation."
];

let output = "Reframe Ideas\n\n";

reframes.forEach(item => {
output += "• " + item + "\n";
});

output += "\nNext Mutations\n";
output += "Hook\nThread\nDebate\nStructure";

document.getElementById("result").textContent = output;
}
</script>

</body>
</html>

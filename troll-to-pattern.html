<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Troll → Pattern Detector</title>

<style>
:root{
--bg:#f5f7fb;
--card:#ffffff;
--text:#1a1a1a;
--muted:#6b7280;
--accent:#2563eb;
--border:#e5e7eb;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
max-width:720px;
margin:auto;
padding:20px;
}

.back{
display:inline-block;
margin-bottom:16px;
text-decoration:none;
color:var(--muted);
font-size:14px;
}

.card{
background:var(--card);
border:1px solid var(--border);
border-radius:16px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

h1{
margin-top:0;
font-size:26px;
}

.description{
color:var(--muted);
margin-bottom:20px;
}

textarea{
width:100%;
min-height:140px;
padding:14px;
border-radius:12px;
border:1px solid var(--border);
font-size:16px;
resize:vertical;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:12px;
}

button{
border:none;
border-radius:10px;
padding:12px 14px;
font-size:15px;
cursor:pointer;
}

.generate{
background:var(--accent);
color:white;
}

.example{
background:#eef2ff;
}

.clear{
background:#f3f4f6;
}

.copy{
background:#e5e7eb;
}

.result{
margin-top:20px;
padding:16px;
border-radius:12px;
border:1px solid var(--border);
background:#fafafa;
min-height:120px;
white-space:pre-wrap;
}

.footer{
margin-top:18px;
text-align:center;
font-size:12px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="./index.html">← Back to REFRAME Studio</a>

<div class="card">

<h1>Troll → Pattern Detector</h1>

<p class="description">
Turn negative comments into thinking patterns and insights.
</p>

<textarea id="input"
placeholder="Paste a negative comment.

Example:
'Your ideas are stupid and nobody cares.'"></textarea>

<div class="buttons">
<button class="generate" onclick="generate()">Generate</button>
<button class="example" onclick="example()">Try example</button>
<button class="clear" onclick="clearInput()">Clear</button>
<button class="copy" onclick="copyResult()">Copy result</button>
</div>

<div id="result" class="result">
Result will appear here.
</div>

</div>

<div class="footer">
REFRAME Studio — rethink reactions
</div>

</div>

<script>

function detectLanguage(text){
return /[ぁ-んァ-ン一-龥]/.test(text) ? "ja" : "en"
}

function example(){
const text="Your ideas are stupid and nobody cares."
document.getElementById("input").value=text
generate()
}

function clearInput(){
document.getElementById("input").value=""
document.getElementById("result").innerText="Result will appear here."
}

function generate(){

const input=document.getElementById("input").value.trim()
if(!input){return}

const lang=detectLanguage(input)

if(lang==="ja"){

const output=
`パターン分析

1. 攻撃タイプ
人格攻撃 / 感情反応

2. 背景にある心理
不安
劣等感
自己防衛

3. 思考パターン
短絡的判断
二元論

4. コンテンツの種
「批判が生まれる心理」
「なぜ人は攻撃的になるのか」
「感情と議論の違い」`

document.getElementById("result").innerText=output

}else{

const output=
`Pattern analysis

1. Attack type
Personal attack / emotional reaction

2. Possible psychology
Insecurity
Status threat
Defensive reaction

3. Thinking pattern
Binary thinking
Emotional reasoning

4. Content ideas
Why criticism becomes personal
The psychology behind trolling
Emotion vs argument online`

document.getElementById("result").innerText=output

}

}

function copyResult(){
const text=document.getElementById("result").innerText
navigator.clipboard.writeText(text)
}

</script>

</body>
</html>

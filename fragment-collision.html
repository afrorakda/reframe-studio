<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Collision</title>
  <meta name="description" content="Let two fragments become a different reading." />
  <style>
    :root{
      --bg:#03133f;
      --panel:#2a3f89;
      --card:#071757;
      --card-2:#16235f;
      --ink:#f4f6ff;
      --soft:rgba(235,239,255,0.76);
      --muted:#aeb9f6;
      --line:rgba(126,146,255,0.18);
      --pill-line:rgba(115,102,255,0.55);
      --button:#24305f;
      --button-text:#f4f6ff;
      --button-main:#f2f2f5;
      --button-main-text:#0d1a4d;
      --shadow:0 20px 50px rgba(0,0,0,0.28);
      --max:820px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 80% 10%, rgba(74,93,195,0.28), transparent 55%),
        radial-gradient(900px 640px at 20% 80%, rgba(10,29,95,0.25), transparent 55%),
        linear-gradient(180deg,var(--bg) 0%, #041245 48%, #04103a 100%);
      color:var(--ink);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{color:inherit;text-decoration:none}

    .wrap{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:18px 0 36px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-size:15px;
      margin:6px 0 18px;
    }

    .shell{
      background:linear-gradient(180deg, rgba(45,64,139,0.97), rgba(40,58,129,0.97));
      border:1px solid var(--line);
      border-radius:28px;
      padding:14px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:16px;
      background:linear-gradient(180deg, rgba(196,212,255,0.32), rgba(196,212,255,0));
      pointer-events:none;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:32px;
      padding:6px 14px;
      border-radius:999px;
      border:2px solid var(--pill-line);
      background:rgba(52,57,129,0.58);
      color:#d7ddff;
      font-size:14px;
      letter-spacing:0.01em;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.02;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .sub{
      margin:8px 0 14px;
      color:var(--soft);
      font-size:15px;
      line-height:1.42;
      max-width:19em;
    }

    .card{
      background:rgba(2,15,71,0.95);
      border:1px solid rgba(121,142,255,0.16);
      border-radius:22px;
      padding:12px;
    }

    .buttons{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }

    button.action{
      appearance:none;
      border:none;
      width:100%;
      border-radius:18px;
      min-height:52px;
      padding:10px 16px;
      font:inherit;
      font-size:16px;
      font-weight:760;
      background:var(--button);
      color:var(--button-text);
      border:1px solid rgba(130,147,236,0.18);
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }

    button.action.primary{
      background:var(--button-main);
      color:var(--button-main-text);
      border-color:transparent;
    }

    .status-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:12px 2px 8px;
      color:var(--muted);
      font-size:14px;
      min-height:18px;
    }

    .deeper{
      color:rgba(193,203,255,0.45);
      font-size:14px;
      white-space:nowrap;
      transition:opacity .2s ease, color .2s ease;
    }

    .deeper:hover,
    .deeper:focus{
      color:rgba(193,203,255,0.72);
    }

    .result-grid{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .result-card{
      background:rgba(19,31,89,0.95);
      border:1px solid rgba(121,142,255,0.16);
      border-radius:20px;
      padding:14px;
    }

    .result-label{
      color:#dbe2ff;
      font-size:14px;
      font-weight:800;
      letter-spacing:0.18em;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .result-text{
      color:var(--ink);
      font-size:17px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .history-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .history-clear{
      appearance:none;
      border:none;
      background:transparent;
      color:rgba(193,203,255,0.58);
      font:inherit;
      font-size:14px;
      cursor:pointer;
      padding:0;
    }

    .history-clear:hover,
    .history-clear:focus{
      color:rgba(193,203,255,0.82);
    }

    .history-list{
      display:grid;
      gap:10px;
    }

    .history-item{
      background:rgba(12,23,73,0.9);
      border:1px solid rgba(121,142,255,0.14);
      border-radius:18px;
      padding:12px;
    }

    .history-meta{
      color:var(--muted);
      font-size:13px;
      margin-bottom:8px;
    }

    .history-reading{
      color:var(--ink);
      font-size:16px;
      line-height:1.55;
      margin-bottom:8px;
      white-space:pre-wrap;
    }

    .history-pair{
      color:rgba(225,231,255,0.78);
      font-size:14px;
      line-height:1.5;
      white-space:pre-wrap;
    }

    .footer{
      text-align:center;
      color:rgba(218,224,255,0.72);
      font-size:14px;
      margin-top:16px;
    }

    @media (min-width: 761px){
      .wrap{
        width:min(var(--max), calc(100% - 32px));
        padding:22px 0 54px;
      }

      .back{
        font-size:24px;
        margin:8px 0 22px;
      }

      .shell{
        border-radius:34px;
        padding:20px;
      }

      .shell::before{
        height:22px;
      }

      .pill{
        min-height:46px;
        padding:10px 22px;
        font-size:20px;
        margin-bottom:18px;
      }

      h1{
        font-size:68px;
        line-height:0.94;
        letter-spacing:-0.04em;
      }

      .sub{
        margin:14px 0 24px;
        font-size:28px;
        line-height:1.34;
        max-width:18em;
      }

      .card{
        border-radius:26px;
        padding:20px;
      }

      .buttons{
        gap:14px;
        margin-bottom:14px;
      }

      button.action{
        min-height:78px;
        padding:14px 18px;
        font-size:28px;
        border-radius:20px;
      }

      .status-row{
        font-size:24px;
        margin:16px 2px 10px;
      }

      .deeper{
        font-size:24px;
      }

      .result-grid{
        gap:14px;
      }

      .result-card{
        border-radius:22px;
        padding:18px;
      }

      .result-label{
        font-size:20px;
        margin-bottom:12px;
      }

      .result-text{
        font-size:31px;
        line-height:1.68;
      }

      .history-head{
        margin-bottom:12px;
      }

      .history-clear{
        font-size:20px;
      }

      .history-list{
        gap:12px;
      }

      .history-item{
        border-radius:20px;
        padding:16px;
      }

      .history-meta{
        font-size:18px;
        margin-bottom:10px;
      }

      .history-reading{
        font-size:24px;
        margin-bottom:10px;
      }

      .history-pair{
        font-size:20px;
      }

      .footer{
        font-size:20px;
        margin-top:24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./fragment-router.html">← Back to Fragment Router</a>

    <section class="shell">
      <div class="pill">One collision</div>
      <h1>Collision</h1>
      <p class="sub">Let two fragments become a different reading.</p>

      <div class="card">
        <div class="buttons">
          <button class="action primary" id="loadBtn">Load fragments</button>
          <button class="action" id="pickBtn" disabled>Pick fragments</button>
          <button class="action" id="collideBtn" disabled>Collide</button>
          <button class="action" id="copyBtn">Copy result</button>
          <button class="action" id="clearBtn">Clear</button>
        </div>

        <div class="status-row">
          <div id="statusText">Waiting</div>
          <a class="deeper" href="./fragment-chain.html">Deeper</a>
        </div>

        <div class="result-grid">
          <div class="result-card">
            <div class="result-label">Fragment A</div>
            <div class="result-text" id="fragmentAText">—</div>
          </div>

          <div class="result-card">
            <div class="result-label">Fragment B</div>
            <div class="result-text" id="fragmentBText">—</div>
          </div>

          <div class="result-card">
            <div class="result-label">Reading</div>
            <div class="result-text" id="readingText">—</div>
          </div>

          <div class="result-card">
            <div class="result-label">Next fragment</div>
            <div class="result-text" id="nextText">—</div>
          </div>

          <div class="result-card">
            <div class="history-head">
              <div class="result-label" style="margin-bottom:0;">Collision history</div>
              <button class="history-clear" id="clearHistoryBtn">Wake up</button>
            </div>
            <div class="history-list" id="historyList">
              <div class="history-item">
                <div class="history-meta">Nothing stayed</div>
                <div class="history-pair">Only the latest echoes appear here.</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="footer">No login • No tracking • Runs entirely in browser</div>
    </section>
  </div>

  <script>
    const loadBtn = document.getElementById('loadBtn');
    const pickBtn = document.getElementById('pickBtn');
    const collideBtn = document.getElementById('collideBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const clearHistoryBtn = document.getElementById('clearHistoryBtn');

    const statusText = document.getElementById('statusText');
    const fragmentAText = document.getElementById('fragmentAText');
    const fragmentBText = document.getElementById('fragmentBText');
    const readingText = document.getElementById('readingText');
    const nextText = document.getElementById('nextText');
    const historyList = document.getElementById('historyList');

    const HISTORY_KEY = 'reframe_collision_history_v2';
    const MAX_HISTORY = 2;

    let fragmentPool = [];
    let chosenA = null;
    let chosenB = null;
    let lastCollision = '';

    const readingTemplates = [
      'The collision may be showing that the message and the response are slightly out of sync.',
      'There may be something real here, but it may still be arriving in the wrong shape.',
      'The surface reaction may be rough, but the signal underneath may still be usable.',
      'What looks sharp on the surface may actually be asking for a clearer translation.',
      'This hit may be less about rejection and more about friction around timing, framing, or wording.',
      'The collision may be exposing a gap between what is meant and what is being heard.',
      'There may be a usable angle here hiding inside the roughness of the exchange.',
      'The reply may be clumsy, but it may still be touching a live part of the thought.'
    ];

    const nextTemplates = [
      'Maybe the wording changed the signal.',
      'Maybe the thought needs a different angle.',
      'Maybe the frame needs to turn once more.',
      'Maybe the next move is smaller and sharper.',
      'Maybe the signal matters more than the surface tone.',
      'Maybe this wants a cleaner translation.',
      'Maybe the hidden friction is the real fragment.',
      'Maybe the idea should be re-entered from the side.'
    ];

    function normalizeText(value) {
      return String(value || '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function parsePoolItem(item) {
      if (typeof item === 'string') {
        return { text: normalizeText(item), tone: 'plain' };
      }
      if (item && typeof item === 'object' && typeof item.text === 'string') {
        return {
          text: normalizeText(item.text),
          tone: normalizeText(item.tone || 'plain').toLowerCase() || 'plain'
        };
      }
      return null;
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    async function loadFragments() {
      statusText.textContent = 'Loading...';

      try {
        const urls = [
          './fragment-pool.json',
          './fragment-pack-1.json',
          './fragment-pack-2.json'
        ];

        const results = await Promise.allSettled(
          urls.map(url => fetch(url).then(res => {
            if (!res.ok) throw new Error(url);
            return res.json();
          }))
        );

        const merged = [];

        results.forEach(result => {
          if (result.status === 'fulfilled' && Array.isArray(result.value)) {
            result.value.forEach(item => {
              const parsed = parsePoolItem(item);
              if (parsed && parsed.text) merged.push(parsed);
            });
          }
        });

        const deduped = [];
        const seen = new Set();

        merged.forEach(item => {
          const key = item.text.toLowerCase();
          if (!seen.has(key)) {
            seen.add(key);
            deduped.push(item);
          }
        });

        fragmentPool = deduped;

        if (!fragmentPool.length) {
          statusText.textContent = 'No fragments found';
          return;
        }

        pickBtn.disabled = false;
        collideBtn.disabled = true;
        statusText.textContent = `Loaded ${fragmentPool.length} fragments`;
      } catch (err) {
        statusText.textContent = 'Load failed';
      }
    }

    function pickTwoDifferent() {
      if (fragmentPool.length < 2) return null;

      const pool = shuffle(fragmentPool);
      const a = pool[0];
      let b = pool[1];

      if (a.text === b.text) {
        for (let i = 2; i < pool.length; i++) {
          if (pool[i].text !== a.text) {
            b = pool[i];
            break;
          }
        }
      }

      if (!b || a.text === b.text) return null;
      return { a, b };
    }

    function pickFragments() {
      const pair = pickTwoDifferent();

      if (!pair) {
        statusText.textContent = 'Need at least 2 fragments';
        return;
      }

      chosenA = pair.a;
      chosenB = pair.b;

      fragmentAText.textContent = chosenA.text;
      fragmentBText.textContent = chosenB.text;
      readingText.textContent = '—';
      nextText.textContent = '—';
      lastCollision = '';
      collideBtn.disabled = false;
      statusText.textContent = 'Fragments picked';
    }

    function seedFromPair(a, b) {
      const source = `${a.text}|${b.text}|${a.tone}|${b.tone}`;
      let total = 0;
      for (let i = 0; i < source.length; i++) total += source.charCodeAt(i);
      return total;
    }

    function synthesizeReading(a, b) {
      const seed = seedFromPair(a, b);
      const reading = readingTemplates[seed % readingTemplates.length];
      const next = nextTemplates[(seed * 3) % nextTemplates.length];
      return { reading, next };
    }

    function saveHistory(entry) {
      const current = getHistory();
      current.unshift(entry);
      const trimmed = current.slice(0, MAX_HISTORY);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
      renderHistory();
    }

    function getHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        const data = JSON.parse(raw || '[]');
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function formatTime(ts) {
      const date = new Date(ts);
      return date.toLocaleString([], {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit'
      });
    }

    function renderHistory() {
      const items = getHistory();

      if (!items.length) {
        historyList.innerHTML = `
          <div class="history-item">
            <div class="history-meta">Nothing stayed</div>
            <div class="history-pair">Only the latest echoes appear here.</div>
          </div>
        `;
        return;
      }

      historyList.innerHTML = items.map(item => `
        <div class="history-item">
          <div class="history-meta">${formatTime(item.time)}</div>
          <div class="history-reading">${escapeHtml(item.reading)}</div>
          <div class="history-pair">A: ${escapeHtml(item.a)}\nB: ${escapeHtml(item.b)}</div>
        </div>
      `).join('');
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
      statusText.textContent = 'Gone';
    }

    function collideFragments() {
      if (!chosenA || !chosenB) {
        statusText.textContent = 'Pick fragments first';
        return;
      }

      const result = synthesizeReading(chosenA, chosenB);
      readingText.textContent = result.reading;
      nextText.textContent = result.next;
      lastCollision = `${chosenA.text}\n\n${chosenB.text}\n\n${result.reading}\n\n${result.next}`;
      statusText.textContent = 'Collision made';

      saveHistory({
        time: Date.now(),
        a: chosenA.text,
        b: chosenB.text,
        reading: result.reading,
        next: result.next
      });
    }

    function copyResult() {
      if (!lastCollision) {
        statusText.textContent = 'Nothing to copy';
        return;
      }

      navigator.clipboard.writeText(lastCollision).then(() => {
        statusText.textContent = 'Copied';
      }).catch(() => {
        statusText.textContent = 'Copy failed';
      });
    }

    function clearCurrent() {
      chosenA = null;
      chosenB = null;
      lastCollision = '';
      fragmentAText.textContent = '—';
      fragmentBText.textContent = '—';
      readingText.textContent = '—';
      nextText.textContent = '—';
      collideBtn.disabled = true;
      statusText.textContent = 'Waiting';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    loadBtn.addEventListener('click', loadFragments);
    pickBtn.addEventListener('click', pickFragments);
    collideBtn.addEventListener('click', collideFragments);
    copyBtn.addEventListener('click', copyResult);
    clearBtn.addEventListener('click', clearCurrent);
    clearHistoryBtn.addEventListener('click', clearHistory);

    renderHistory();
  </script>
</body>
</html>

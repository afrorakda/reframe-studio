<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragment Collision</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#07112b;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:none;
font-size:16px;
cursor:pointer;
}

.primary{
background:white;
color:black;
font-weight:700;
}

.soft{
background:#1b2446;
color:white;
}

.card{
background:#111a3a;
padding:14px;
margin-top:12px;
border-radius:12px;
}

.label{
font-size:12px;
opacity:0.7;
margin-bottom:6px;
}

.text{
font-size:16px;
}

.result{
font-size:18px;
font-weight:600;
}

</style>
</head>

<body>

<div class="container">

<h2>Fragment Collision</h2>
<p>Two fragments collide and produce a new thought.</p>

<button id="loadBtn" class="primary">Load fragments</button>
<button id="pickBtn" class="soft">Pick fragments</button>
<button id="collideBtn" class="soft">Collide</button>
<button id="copyBtn" class="soft">Copy result</button>

<div class="card">
<div class="label">Fragment A</div>
<div id="fragA" class="text"></div>
</div>

<div class="card">
<div class="label">Fragment B</div>
<div id="fragB" class="text"></div>
</div>

<div class="card">
<div class="label">Collision result</div>
<div id="result" class="result"></div>
</div>

</div>

<script>

let pool = []
let A = null
let B = null

async function loadFragments(){

const files = [
"./fragment-pool.json",
"./fragment-pack-1.json",
"./fragment-pack-2.json"
]

let all = []

for(const file of files){

try{
const r = await fetch(file)
const j = await r.json()

j.forEach(f=>{
if(typeof f === "string"){
all.push({text:f})
}else{
all.push(f)
}
})

}catch(e){}

}

pool = all
alert("Loaded "+pool.length+" fragments")

}

function randomFragment(){
return pool[Math.floor(Math.random()*pool.length)]
}

function pickFragments(){

A = randomFragment()
B = randomFragment()

document.getElementById("fragA").innerText = A.text
document.getElementById("fragB").innerText = B.text

}

function collide(){

if(!A || !B) return

let a = A.text
let b = B.text

let result = ""

if(Math.random()<0.33){

result = a + ". " + b

}

else if(Math.random()<0.66){

let first = a.split(" ")[0]
result = first + " " + b.toLowerCase()

}

else{

result = "Maybe " + a.toLowerCase()

}

document.getElementById("result").innerText = result

}

async function copyResult(){

let t = document.getElementById("result").innerText

await navigator.clipboard.writeText(t)

}

document.getElementById("loadBtn").onclick = loadFragments
document.getElementById("pickBtn").onclick = pickFragments
document.getElementById("collideBtn").onclick = collide
document.getElementById("copyBtn").onclick = copyResult

</script>

</body>
</html>

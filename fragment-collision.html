<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragment Collision</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:#0b0f1a;
color:#e6edf3;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

a{
color:#8ab4ff;
text-decoration:none;
}

h1{
margin-top:10px;
font-size:28px;
}

p{
opacity:0.8;
}

textarea{
width:100%;
padding:14px;
margin-top:12px;
border-radius:10px;
border:1px solid #30363d;
background:#111827;
color:white;
font-size:16px;
resize:vertical;
min-height:70px;
}

button{
margin-top:12px;
padding:12px 16px;
border-radius:10px;
border:none;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.result{
margin-top:20px;
padding:16px;
border-radius:12px;
background:#111827;
border:1px solid #30363d;
min-height:60px;
}

footer{
margin-top:40px;
font-size:13px;
opacity:0.5;
}
</style>

</head>

<body>

<div class="container">

<a href="./index.html">← Back to REFRAME Studio</a>

<h1>Fragment Collision</h1>

<p>Two thoughts collide and create a new mutation.</p>

<textarea id="fragA" placeholder="First fragment..."></textarea>

<textarea id="fragB" placeholder="Second fragment..."></textarea>

<button onclick="collide()">Generate mutation</button>

<div class="result" id="result"></div>

<footer>
No login · No tracking · Runs entirely in your browser
</footer>

</div>

<script>

function collide(){

let a=document.getElementById("fragA").value.trim();
let b=document.getElementById("fragB").value.trim();

if(!a || !b){
document.getElementById("result").innerText="Drop two fragments first.";
return;
}

const mutations=[
"What if these two ideas are actually the same problem?",
"Combine them into one strange concept.",
"Maybe one is the cause and the other is the symptom.",
"Turn this collision into a question.",
"What would the opposite version of this collision be?",
"What new idea appears between these two?",
"Imagine a tool that solves both at once.",
"What hidden tension exists between these fragments?"
];

let m=mutations[Math.floor(Math.random()*mutations.length)];

document.getElementById("result").innerText=
"Fragment A: "+a+
"\n\nFragment B: "+b+
"\n\nMutation:\n"+m;

}

</script>

</body>
</html>

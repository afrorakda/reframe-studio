<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fragment Collision | REFRAME Studio</title>
  <meta name="description" content="Let two fragments collide. No login. No tracking. Runs entirely in your browser." />
  <style>
    :root{
      --bg-top:#081331;
      --bg-mid:#0b1f4f;
      --bg-bottom:#07112b;
      --card-outer:rgba(35,55,122,0.55);
      --card-outer-line:rgba(122,145,255,0.18);
      --card-inner:rgba(4,11,40,0.92);
      --card-inner-line:rgba(103,129,255,0.14);
      --text:#f4f7ff;
      --muted:#b7c2f0;
      --soft:#96a5df;
      --pill-bg:rgba(74,62,163,0.24);
      --pill-line:rgba(124,108,255,0.45);
      --button:#ffffff;
      --button-text:#081331;
      --button-soft:rgba(255,255,255,0.08);
      --button-soft-text:#eef2ff;
      --button-line:rgba(255,255,255,0.1);
      --result-card:rgba(255,255,255,0.04);
      --result-line:rgba(255,255,255,0.08);
      --radius-outer:26px;
      --radius-inner:20px;
      --shadow:0 20px 56px rgba(0,0,0,0.28);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(53,94,255,0.24), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      width:min(760px, calc(100% - 22px));
      margin:0 auto;
      padding:16px 0 24px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:15px;
      line-height:1.4;
      color:var(--muted);
      margin-bottom:12px;
      opacity:0.95;
    }

    .shell{
      background:var(--card-outer);
      border:1px solid var(--card-outer-line);
      border-radius:26px;
      padding:16px 10px 10px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      background:var(--pill-bg);
      border:1px solid var(--pill-line);
      color:#e8ddff;
      font-size:14px;
      letter-spacing:-0.01em;
      margin-bottom:12px;
    }

    .hero-title{
      margin:0 0 4px 0;
      font-size:34px;
      line-height:1;
      letter-spacing:-0.05em;
      font-weight:800;
    }

    .hero-desc{
      margin:0 0 12px 0;
      font-size:15px;
      line-height:1.45;
      color:var(--muted);
    }

    .inner{
      background:var(--card-inner);
      border:1px solid var(--card-inner-line);
      border-radius:20px;
      padding:16px 10px 12px;
    }

    .button-stack{
      display:flex;
      flex-direction:column;
      gap:7px;
      margin-top:10px;
    }

    button{
      appearance:none;
      border:none;
      width:100%;
      min-height:46px;
      border-radius:14px;
      font:inherit;
      font-size:15px;
      font-weight:800;
      letter-spacing:-0.02em;
      cursor:pointer;
      transition:transform .05s ease, opacity .18s ease;
    }

    button:active{
      transform:translateY(1px);
    }

    .btn-primary{
      background:var(--button);
      color:var(--button-text);
    }

    .btn-soft{
      background:var(--button-soft);
      color:var(--button-soft-text);
      border:1px solid var(--button-line);
    }

    .status-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
      min-height:18px;
    }

    .status{
      font-size:12px;
      line-height:1.4;
      color:var(--soft);
    }

    .deeper-link{
      font-size:12px;
      line-height:1.4;
      color:var(--soft);
      opacity:0.78;
      white-space:nowrap;
      display:none;
    }

    .result-list{
      margin-top:12px;
      display:none;
      gap:8px;
      flex-direction:column;
    }

    .result-card{
      background:var(--result-card);
      border:1px solid var(--result-line);
      border-radius:14px;
      padding:10px;
    }

    .result-label{
      font-size:10px;
      line-height:1.4;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#d7deff;
      font-weight:800;
      margin-bottom:4px;
    }

    .result-text{
      margin:0;
      font-size:14px;
      line-height:1.5;
      color:var(--text);
      white-space:pre-wrap;
    }

    .footer{
      margin-top:12px;
      font-size:12px;
      line-height:1.45;
      color:var(--soft);
      text-align:center;
    }

    @media (min-width: 761px){
      .page{
        width:min(860px, calc(100% - 40px));
        padding:28px 0 40px;
      }

      .back-link{
        font-size:22px;
        margin-bottom:24px;
      }

      .shell{
        padding:34px;
        border-radius:38px;
      }

      .pill{
        min-height:62px;
        padding:0 28px;
        font-size:22px;
        margin-bottom:28px;
      }

      .hero-title{
        font-size:74px;
        margin-bottom:12px;
      }

      .hero-desc{
        font-size:22px;
        margin-bottom:24px;
      }

      .inner{
        padding:30px;
        border-radius:30px;
      }

      .button-stack{
        gap:14px;
        margin-top:20px;
      }

      button{
        min-height:74px;
        border-radius:22px;
        font-size:24px;
      }

      .status-row{
        margin-top:16px;
      }

      .status,
      .deeper-link{
        font-size:17px;
      }

      .result-list{
        margin-top:24px;
        gap:12px;
      }

      .result-card{
        border-radius:22px;
        padding:18px;
      }

      .result-label{
        font-size:13px;
        margin-bottom:6px;
      }

      .result-text{
        font-size:18px;
      }

      .footer{
        font-size:15px;
        margin-top:18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="./fragment-router.html">← Back to Fragment Router</a>

    <section class="shell">
      <div class="pill">One collision</div>

      <h1 class="hero-title">Collision</h1>
      <p class="hero-desc">Let two fragments hit each other.</p>

      <section class="inner">
        <div class="button-stack">
          <button class="btn-primary" id="loadBtn">Load fragments</button>
          <button class="btn-soft" id="collideBtn">Collide</button>
          <button class="btn-soft" id="copyBtn">Copy result</button>
        </div>

        <div class="status-row">
          <div class="status" id="statusText">Waiting</div>
          <a class="deeper-link" id="deeperLink" href="./fragment-chain.html">deeper</a>
        </div>

        <div class="result-list" id="resultList">
          <div class="result-card">
            <div class="result-label">Fragment A</div>
            <p class="result-text" id="fragmentA"></p>
          </div>

          <div class="result-card">
            <div class="result-label">Fragment B</div>
            <p class="result-text" id="fragmentB"></p>
          </div>

          <div class="result-card">
            <div class="result-label">Collision</div>
            <p class="result-text" id="collisionText"></p>
          </div>

          <div class="result-card">
            <div class="result-label">Next fragment</div>
            <p class="result-text" id="nextFragmentText"></p>
          </div>
        </div>
      </section>
    </section>

    <div class="footer">No login · No tracking · Runs entirely in browser</div>
  </main>

  <script src="./fragment-system.js"></script>
  <script>
    const loadBtn = document.getElementById('loadBtn');
    const collideBtn = document.getElementById('collideBtn');
    const copyBtn = document.getElementById('copyBtn');

    const statusText = document.getElementById('statusText');
    const deeperLink = document.getElementById('deeperLink');
    const resultList = document.getElementById('resultList');
    const fragmentAEl = document.getElementById('fragmentA');
    const fragmentBEl = document.getElementById('fragmentB');
    const collisionTextEl = document.getElementById('collisionText');
    const nextFragmentTextEl = document.getElementById('nextFragmentText');

    let loaded = false;
    let currentResult = {
      a: '',
      b: '',
      collision: '',
      nextFragment: ''
    };

    function cleanText(text) {
      return String(text || '').trim();
    }

    function cleanEnd(text) {
      return cleanText(text).replace(/[.。!?]+$/, '');
    }

    function lowerFirst(text) {
      const value = cleanText(text);
      if (!value) return '';
      return value.charAt(0).toLowerCase() + value.slice(1);
    }

    function sentenceCase(text) {
      const value = cleanText(text);
      if (!value) return '';
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function makeCollision(a, b) {
      const left = cleanEnd(a);
      const right = lowerFirst(cleanEnd(b));

      const patterns = [
        `${left}.\n${sentenceCase(right)}`,
        `${left}.\nBut ${right}`,
        `${left}.\nOr maybe ${right}`,
        `${left}.\nWhich might mean ${right}`,
        `${left}.\nAt the same time, ${right}`,
        `${left}.\nMaybe ${right}`
      ];

      return patterns[Math.floor(Math.random() * patterns.length)];
    }

    function makeNextFragment(a, b) {
      const left = lowerFirst(cleanEnd(a));
      const right = lowerFirst(cleanEnd(b));

      const patterns = [
        `maybe the reply became a different story`,
        `maybe something changed between the two`,
        `maybe the collision is pointing somewhere else`,
        `something drifted between the fragments`,
        `maybe the meaning moved in the collision`,
        `maybe this is another angle trying to appear`,
        `maybe the problem changed shape`,
        `something in the reply tilted`,
        `maybe the fragment is not where it started`,
        `maybe the second fragment heard the first differently`,
        `maybe ${right}`,
        `maybe ${left}`,
        `something in "${left}" bent toward "${right}"`,
        `maybe the space between them is the real fragment`
      ];

      return sentenceCase(patterns[Math.floor(Math.random() * patterns.length)]);
    }

    async function loadSystem() {
      try {
        statusText.textContent = 'Loading';
        await window.REFRAMEFragmentSystem.load();
        loaded = true;
        statusText.textContent = 'Loaded';
      } catch (error) {
        loaded = false;
        statusText.textContent = 'Load failed';
      }
    }

    function collide() {
      if (!loaded) {
        statusText.textContent = 'Load fragments first';
        return;
      }

      const picked = window.REFRAMEFragmentSystem.pickMixed(2);
      if (!picked || picked.length < 2) {
        statusText.textContent = 'Not enough fragments';
        return;
      }

      const a = cleanText(picked[0]);
      const b = cleanText(picked[1]);
      const collision = makeCollision(a, b);
      const nextFragment = makeNextFragment(a, b);

      currentResult = { a, b, collision, nextFragment };

      fragmentAEl.textContent = a;
      fragmentBEl.textContent = b;
      collisionTextEl.textContent = collision;
      nextFragmentTextEl.textContent = nextFragment;

      resultList.style.display = 'flex';
      deeperLink.style.display = 'inline';
      statusText.textContent = 'Collision made';
    }

    async function copyResult() {
      if (!currentResult.collision) {
        statusText.textContent = 'Nothing to copy';
        return;
      }

      const text = [
        currentResult.a,
        '',
        currentResult.b,
        '',
        currentResult.collision,
        '',
        currentResult.nextFragment
      ].join('\n');

      try {
        await navigator.clipboard.writeText(text);
        statusText.textContent = 'Copied';
      } catch (error) {
        statusText.textContent = 'Copy failed';
      }
    }

    loadBtn.addEventListener('click', loadSystem);
    collideBtn.addEventListener('click', collide);
    copyBtn.addEventListener('click', copyResult);
  </script>
</body>
</html>

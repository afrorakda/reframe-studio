<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REFRAME Tool Factory</title>

<style>

:root{
--bg:#f5f5f5;
--card:#fff;
--text:#111;
--muted:#666;
--line:#ddd;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:var(--bg);
color:var(--text);
}

.wrap{
max-width:720px;
margin:auto;
padding:24px 16px 40px;
}

h1{
margin:0;
font-size:28px;
}

.sub{
color:var(--muted);
margin-bottom:20px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:14px;
padding:16px;
}

label{
display:block;
font-size:13px;
color:var(--muted);
margin-top:12px;
margin-bottom:6px;
}

input,textarea{
width:100%;
border:1px solid var(--line);
border-radius:10px;
padding:10px;
font:inherit;
}

textarea{
min-height:100px;
}

button{
margin-top:14px;
padding:12px 14px;
border:0;
border-radius:10px;
background:#111;
color:#fff;
font:inherit;
cursor:pointer;
}

pre{
margin-top:16px;
background:#fafafa;
border:1px solid var(--line);
border-radius:10px;
padding:12px;
overflow:auto;
font-size:12px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>REFRAME Tool Factory</h1>
<p class="sub">Generate starter HTML for new tools.</p>

<div class="card">

<label>Tool Name</label>
<input id="name" placeholder="Example: Idea Parking">

<label>Description</label>
<input id="desc" placeholder="Quickly store ideas before they disappear">

<label>Main Input Label</label>
<input id="inputLabel" placeholder="Your idea">

<label>Main Output Label</label>
<input id="outputLabel" placeholder="Saved idea">

<button id="generate">Generate HTML</button>

<pre id="output"></pre>

</div>

</div>

<script>

document.getElementById("generate").onclick=function(){

const name=document.getElementById("name").value
const desc=document.getElementById("desc").value
const inputLabel=document.getElementById("inputLabel").value
const outputLabel=document.getElementById("outputLabel").value

const html=`<!DOCTYPE html>
<html>
<head>
<title>${name}</title>
</head>

<body>

<h1>${name}</h1>
<p>${desc}</p>

<label>${inputLabel}</label>
<textarea></textarea>

<button>Generate</button>

<div>${outputLabel}</div>

</body>
</html>`

document.getElementById("output").textContent=html

}

</script>

</body>
</html>

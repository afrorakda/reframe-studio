<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>REFRAME Studio</title>
  <meta name="description" content="Bad reply → content idea. No login. No tracking. Runs entirely in browser." />
  <style>
    :root{
      --bg:#03133f;
      --bg2:#102766;
      --panel:#23397f;
      --card:#03124f;
      --line:rgba(126,146,255,0.20);
      --soft:rgba(255,255,255,0.72);
      --text:#f5f7ff;
      --muted:#aeb9f6;
      --pill:#2a3170;
      --pill-line:rgba(115,102,255,0.55);
      --button:#202a59;
      --button-text:#f4f6ff;
      --button-main:#f2f2f5;
      --button-main-text:#0d1a4d;
      --shadow:0 20px 50px rgba(0,0,0,0.28);
      --radius-xl:30px;
      --radius-lg:24px;
      --radius-md:18px;
      --max:820px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 80% 10%, rgba(74,93,195,0.28), transparent 55%),
        radial-gradient(900px 640px at 20% 80%, rgba(10,29,95,0.25), transparent 55%),
        linear-gradient(180deg,var(--bg) 0%, #041245 48%, #04103a 100%);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{color:inherit;text-decoration:none}

    .wrap{
      width:min(var(--max), calc(100% - 24px));
      margin:0 auto;
      padding:18px 0 30px;
    }

    .shell{
      background:linear-gradient(180deg, rgba(39,57,126,0.96), rgba(34,52,121,0.96));
      border:1px solid var(--line);
      border-radius:28px;
      padding:14px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
      margin-top:8px;
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:16px;
      background:linear-gradient(180deg, rgba(196,212,255,0.32), rgba(196,212,255,0));
      pointer-events:none;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      min-height:32px;
      padding:6px 14px;
      border-radius:999px;
      border:2px solid var(--pill-line);
      background:rgba(52,57,129,0.58);
      color:#d7ddff;
      font-size:14px;
      letter-spacing:0.01em;
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:28px;
      line-height:1.05;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .sub{
      margin:8px 0 14px;
      color:var(--soft);
      font-size:15px;
      line-height:1.35;
      max-width:18em;
    }

    .card{
      background:rgba(2,15,71,0.94);
      border:1px solid rgba(121,142,255,0.16);
      border-radius:22px;
      padding:12px;
    }

    .buttons{
      display:grid;
      gap:10px;
      margin-bottom:10px;
    }

    .button-link{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      border:1px solid rgba(130,147,236,0.18);
      border-radius:18px;
      min-height:52px;
      padding:10px 16px;
      font-size:16px;
      font-weight:760;
      background:var(--button);
      color:var(--button-text);
      transition:transform .04s ease, opacity .15s ease, background .15s ease;
      -webkit-tap-highlight-color:transparent;
    }

    .button-link:active{transform:scale(0.995)}

    .button-link.primary{
      background:var(--button-main);
      color:var(--button-main-text);
      border-color:transparent;
    }

    .status-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:2px 2px 4px;
      color:var(--muted);
      font-size:14px;
      min-height:18px;
    }

    .deeper{
      color:rgba(193,203,255,0.8);
      font-size:14px;
      white-space:nowrap;
      user-select:none;
    }

    .footer{
      text-align:center;
      color:rgba(218,224,255,0.72);
      font-size:14px;
      margin-top:16px;
    }

    @media (min-width: 761px){
      .wrap{
        width:min(var(--max), calc(100% - 32px));
        padding:22px 0 54px;
      }

      .shell{
        border-radius:34px;
        padding:20px;
        margin-top:18px;
      }

      .shell::before{
        height:22px;
      }

      .pill{
        min-height:46px;
        padding:10px 22px;
        font-size:20px;
        margin-bottom:18px;
      }

      h1{
        font-size:68px;
        line-height:0.94;
        letter-spacing:-0.04em;
      }

      .sub{
        margin:14px 0 24px;
        font-size:28px;
        line-height:1.34;
      }

      .card{
        border-radius:26px;
        padding:20px;
      }

      .buttons{
        gap:14px;
        margin-bottom:14px;
      }

      .button-link{
        min-height:78px;
        padding:14px 18px;
        font-size:28px;
        border-radius:20px;
      }

      .status-row{
        font-size:24px;
        margin:4px 2px 6px;
      }

      .deeper{
        font-size:24px;
      }

      .footer{
        font-size:20px;
        margin-top:24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="shell">
      <div class="pill">Bad reply → content idea</div>
      <h1>REFRAME Studio</h1>
      <p class="sub">Turn one bad reply into a new angle.</p>

      <div class="card">
        <div class="buttons">
          <a class="button-link primary" href="./reframe.html">Start</a>
        </div>

        <div class="status-row">
          <div></div>
          <a class="deeper" href="./fragment-router.html">Deeper</a>
        </div>
      </div>

      <div class="footer">No login • No tracking • Runs entirely in browser</div>
    </section>
  </div>
</body>
</html>

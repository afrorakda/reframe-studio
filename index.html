<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REFRAME Studio</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b1220;
color:white;
margin:0;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:8px;
}

.subtitle{
color:#94a3b8;
margin-bottom:40px;
}

.tools{
display:grid;
grid-template-columns:1fr;
gap:14px;
}

.card{
background:#111827;
padding:20px;
border-radius:14px;
text-decoration:none;
color:white;
border:1px solid #1f2937;
transition:0.15s;
}

.card:hover{
background:#1f2937;
}

.title{
font-size:18px;
font-weight:600;
margin-bottom:6px;
}

.desc{
color:#9ca3af;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>REFRAME Studio</h1>
<div class="subtitle">Simple tools. Clear next steps.</div>

<div id="tools" class="tools"></div>

</div>

<script>

const repo = "afrorakda/reframe-studio";

async function loadTools(){

const url = `https://api.github.com/repos/${repo}/contents`;

const res = await fetch(url);
const files = await res.json();

const htmlFiles = files.filter(f =>
f.name.endsWith(".html") &&
f.name !== "index.html" &&
!f.name.includes("factory")
);

const container = document.getElementById("tools");

htmlFiles.sort((a,b)=>a.name.localeCompare(b.name));

htmlFiles.forEach(file=>{

const name = file.name
.replace(".html","")
.replaceAll("-"," ");

const title = name
.split(" ")
.map(w=>w.charAt(0).toUpperCase()+w.slice(1))
.join(" ");

const card = document.createElement("a");

card.href = file.name;
card.className="card";

card.innerHTML=`
<div class="title">${title}</div>
<div class="desc">${file.name}</div>
`;

container.appendChild(card);

});

}

loadTools();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REFRAME Studio</title>

  <style>
    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f7f7f7;
      color:#111;
    }

    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:20px 16px 40px;
      text-align:center;
    }

    h1{
      margin:10px 0 12px;
      font-size:clamp(42px, 8vw, 72px);
      line-height:1.05;
      font-weight:800;
      letter-spacing:-0.02em;
    }

    .subtitle{
      margin:0 0 16px;
      font-size:clamp(18px, 4vw, 30px);
      line-height:1.3;
    }

    textarea{
      width:100%;
      min-height:110px;
      padding:16px;
      font-size:18px;
      line-height:1.5;
      border:2px solid #d8d8d8;
      border-radius:18px;
      background:#fff;
      resize:vertical;
      outline:none;
    }

    textarea:focus{
      border-color:#999;
    }

    .main-button,
    .secondary-button,
    .ghost-button,
    .chaos-button{
      width:100%;
      border:none;
      border-radius:18px;
      cursor:pointer;
      font-weight:800;
      text-align:center;
    }

    .main-button{
      margin-top:16px;
      padding:18px 20px;
      background:#111;
      color:#fff;
      font-size:clamp(22px, 5vw, 34px);
    }

    .ghost-button{
      margin-top:12px;
      padding:14px 18px;
      background:#e9e9e9;
      color:#111;
      font-size:clamp(18px, 4.2vw, 24px);
    }

    .chaos-button{
      margin-top:12px;
      padding:16px 18px;
      background:#ffcc00;
      color:#111;
      font-size:clamp(20px, 4.4vw, 26px);
    }

    .output-card{
      margin-top:18px;
      padding:18px 16px;
      min-height:72px;
      border-radius:18px;
      background:#fff;
      border:1px solid #e4e4e4;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    #output{
      margin:0;
      font-size:clamp(22px, 4.6vw, 34px);
      line-height:1.45;
      font-weight:500;
    }

    .nav{
      margin-top:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .secondary-button{
      display:block;
      padding:18px 20px;
      background:#fff;
      color:#111;
      border:2px solid #dfdfdf;
      font-size:clamp(20px, 4.5vw, 30px);
      text-decoration:none;
    }

    .hint{
      margin-top:14px;
      color:#666;
      font-size:14px;
      line-height:1.5;
    }

    @media (min-width: 768px){
      .wrap{
        padding-top:28px;
      }

      textarea{
        min-height:130px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>REFRAME Studio</h1>
    <p class="subtitle">What's on your mind?</p>

    <textarea
      id="input"
      placeholder="Criticism, emotion, confusion, idea... anything."
    ></textarea>

    <button class="main-button" onclick="reframe()">REFRAME</button>
    <button class="ghost-button" onclick="reframeAgain()">Reframe Again</button>
    <button class="chaos-button" onclick="chaosMode()">CHAOS</button>

    <div class="output-card">
      <p id="output">A new angle appears here.</p>
    </div>

    <div class="nav">
      <a class="secondary-button" href="thought-map.html">Thought Map</a>
      <button class="secondary-button" onclick="surpriseMe()">Surprise Me</button>
    </div>

    <p class="hint">
      Not an answer engine. An angle engine.
    </p>
  </div>

  <script>
    const angles = [
      "Maybe the criticism is pointing at something interesting.",
      "Cringe might mean you're not generic.",
      "What if the opposite was true?",
      "Maybe the problem is actually the advantage.",
      "What assumption might be wrong?",
      "What looks like confusion might be raw material.",
      "The friction may be the signal, not the obstacle.",
      "What if this is not a flaw, but a character trait?",
      "The thing you want to hide may be the hook.",
      "Maybe the problem is not lack of ideas, but lack of permission."
    ];

    const tools = [
      "about.html",
      "comment-to-content.html",
      "comment-to-question.html",
      "complexity-cleaner.html",
      "confusion-question-builder.html",
      "confusion-to-question.html",
      "constraint-to-action.html",
      "criticism-to-idea.html",
      "criticism-to-lesson.html",
      "criticism-to-question.html",
      "draft-fixer.html",
      "emotion-to-action.html",
      "failure-to-lesson.html",
      "hate-to-content.html",
      "hate-to-signal.html",
      "hook-generator.html",
      "idea-to-counterargument.html",
      "idea-to-debate.html",
      "idea-to-example.html",
      "idea-to-metaphor.html",
      "idea-to-opposite.html",
      "idea-to-post-angles.html",
      "idea-to-priority.html",
      "idea-to-thread.html",
      "idea-to-tool-spec.html",
      "negative-comment-to-thread.html",
      "next-step-finder.html",
      "overthinking-breaker.html",
      "reframe-studio.html",
      "reframe_tool_factory.html",
      "roadmap.html",
      "stuck-to-tool.html",
      "thought-map-v2.html",
      "thought-map.html",
      "thought-to-structure.html",
      "thread-navigator.html",
      "title-refiner.html",
      "tool-factory.html",
      "tool-generator-v2.html",
      "tool-generator-v3.html",
      "tool-spec-to-html.html",
      "troll-to-pattern.html",
      "tweet-polisher.html"
    ];

    const chaosPrompts = [
      "Turn this into a controversial opinion.",
      "Make this absurd.",
      "What would the opposite thinker say?",
      "Turn this into satire.",
      "What would a troll say?",
      "What hidden advantage might exist?",
      "What would make this go viral?",
      "How would a comedian frame this?",
      "What assumption is wrong here?",
      "What would a contrarian argue?"
    ];

    function pickRandom(list){
      return list[Math.floor(Math.random() * list.length)];
    }

    function showAngle(){
      document.getElementById("output").innerText = pickRandom(angles);
    }

    function reframe(){
      showAngle();
    }

    function reframeAgain(){
      showAngle();
    }

    function surpriseMe(){
      const randomTool = pickRandom(tools);
      window.location.href = randomTool;
    }

    function chaosMode(){
      const input = document.getElementById("input");
      const randomPrompt = pickRandom(chaosPrompts);
      const randomTool = pickRandom(tools);

      if(input.value.trim() === ""){
        input.value = randomPrompt;
      } else {
        input.value = randomPrompt + "\n\n" + input.value;
      }

      document.getElementById("output").innerText =
        "Chaos prompt added: " + randomPrompt + " → Opening " + randomTool;

      setTimeout(function(){
        window.location.href = randomTool;
      }, 700);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>REFRAME Studio</title>
<meta name="description" content="Ultra-simple browser tools that solve small everyday thinking friction.">

<style>
body{
font-family: Arial;
max-width:700px;
margin:auto;
padding:24px;
}

h1{
font-size:36px;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:30px;
}

.card{
border:1px solid #ddd;
border-radius:14px;
padding:18px;
margin-bottom:16px;
text-decoration:none;
display:block;
color:black;
}

.card:hover{
background:#f7f7f7;
}

.tool-title{
font-size:22px;
font-weight:bold;
margin-bottom:6px;
}

.tool-desc{
color:#666;
}

.random{
margin:20px 0;
padding:12px 18px;
font-size:16px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

.footer-links{
margin-top:40px;
font-size:14px;
}
</style>
</head>

<body>

<h1>REFRAME Studio</h1>

<p class="subtitle">
Ultra-simple browser tools that solve small everyday friction problems.
</p>

<button class="random" onclick="randomTool()">🎲 Try a random tool</button>

<p id="status"></p>

<div id="tools"></div>

<div class="footer-links">
<a href="about.html">About</a> |
<a href="roadmap.html">Roadmap</a>
</div>

<script>

function filenameToTitle(name){
return name
.replace(".html","")
.replaceAll("-"," ")
.replace(/\b\w/g,l=>l.toUpperCase())
}

function buildToolCard(file,title,desc){
return `
<a class="card" href="${file}">
<div class="tool-title">${title}</div>
<div class="tool-desc">${desc}</div>
</a>
`
}

async function loadTools(){

const files=[
"comment-to-content.html",
"complexity-cleaner.html",
"confusion-to-question.html",
"draft-fixer.html",
"hook-generator.html",
"idea-to-post-angles.html",
"idea-to-debate.html",
"next-step-finder.html",
"overthinking-breaker.html",
"problem-to-options.html",
"reframe-studio.html",
"thread-navigator.html",
"title-refiner.html",
"tweet-polisher.html"
]

const toolsEl=document.getElementById("tools")

const cards=files.map(file=>{
return buildToolCard(
file,
filenameToTitle(file),
"Small browser tool by REFRAME Studio."
)
})

toolsEl.innerHTML=cards.join("")

document.getElementById("status").textContent=
files.length+" tools"

}

function randomTool(){

const tools=[
"comment-to-content.html",
"complexity-cleaner.html",
"confusion-to-question.html",
"draft-fixer.html",
"hook-generator.html",
"idea-to-post-angles.html",
"idea-to-debate.html",
"next-step-finder.html",
"overthinking-breaker.html",
"problem-to-options.html",
"reframe-studio.html",
"thread-navigator.html",
"title-refiner.html",
"tweet-polisher.html"
]

const random=tools[Math.floor(Math.random()*tools.length)]

window.location.href=random

}

loadTools()

</script>

</body>
</html>

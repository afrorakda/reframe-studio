<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REFRAME Studio</title>

<style>
body{
  font-family:sans-serif;
  max-width:700px;
  margin:20px auto;
  padding:16px;
  text-align:center;
  background:#f8f8f8;
  color:#111;
}

h1{
  font-size:38px;
  margin:10px 0;
}

p{
  font-size:18px;
  margin-bottom:14px;
}

textarea{
  width:100%;
  height:100px;
  font-size:18px;
  padding:14px;
  border-radius:14px;
  border:1px solid #ccc;
}

.main-button{
  width:100%;
  margin-top:16px;
  padding:18px;
  font-size:22px;
  font-weight:bold;
  border:none;
  border-radius:14px;
  background:#111;
  color:white;
}

#output{
  margin-top:18px;
  font-size:22px;
  min-height:30px;
}

.links{
  margin-top:18px;
}

.links button{
  width:100%;
  margin:10px 0;
  padding:18px;
  font-size:20px;
  border-radius:14px;
  border:1px solid #ddd;
  background:white;
}
</style>

</head>

<body>

<h1>REFRAME Studio</h1>

<p>What's on your mind?</p>

<textarea id="input"></textarea>

<button class="main-button" onclick="reframe()">REFRAME</button>

<div id="output"></div>

<div class="links">

<button onclick="location.href='thought-map.html'">
Thought Map
</button>

<button onclick="surprise()">
Surprise Me
</button>

</div>

<script>

const angles = [

"Maybe the criticism is pointing at something interesting.",

"What if the opposite was true?",

"Maybe the problem is actually the advantage.",

"Cringe might mean you're not generic.",

"What assumption might be wrong?"

];

function reframe(){

const angle = angles[Math.floor(Math.random()*angles.length)];

document.getElementById("output").innerText = angle;

}

function surprise(){

const tools = [

"idea-to-thread.html",
"criticism-to-lesson.html",
"emotion-to-action.html",
"hook-generator.html",
"tweet-polisher.html",
"idea-to-metaphor.html",
"failure-to-lesson.html"

];

const randomTool = tools[Math.floor(Math.random()*tools.length)];

window.location.href = randomTool;

}

</script>

</body>
</html>

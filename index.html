<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hate → Content</title>
  <style>
    :root{
      --bg-1:#13256d;
      --bg-2:#0a174a;
      --bg-3:#07102a;
      --shell:#202a55;
      --panel:#04104a;
      --panel-2:#0d173d;
      --line:#2f3f82;
      --line-soft:#3b4f9b;
      --text:#eef3ff;
      --muted:#a9b5e8;
      --soft:#d6defd;
      --button:#44559d;
      --button-2:#3a4a8e;
      --shadow:0 16px 42px rgba(0,0,0,.34);
      --radius-xl:30px;
      --radius-lg:24px;
      --radius-md:18px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      background:
        radial-gradient(circle at top, var(--bg-1) 0%, var(--bg-2) 30%, var(--bg-3) 72%, #061027 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      line-height:1.45;
    }

    body{
      padding:26px 14px 34px;
    }

    .wrap{
      max-width:860px;
      margin:0 auto;
    }

    .shell{
      background:linear-gradient(180deg, rgba(52,70,151,.88), rgba(39,52,103,.92));
      border:1px solid rgba(134,153,236,.18);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    h1{
      margin:0;
      font-size:56px;
      line-height:.95;
      letter-spacing:-0.05em;
      font-weight:800;
    }

    .sub{
      margin:18px 0 0;
      font-size:24px;
      line-height:1.5;
      color:var(--muted);
      max-width:740px;
    }

    .tool{
      margin-top:26px;
      background:linear-gradient(180deg, rgba(18,26,64,.86), rgba(7,16,58,.92));
      border:1px solid rgba(96,114,191,.24);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    .meta{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:0 6px 12px;
    }

    .meta-label{
      color:#dfe5ff;
      font-size:18px;
      letter-spacing:.22em;
      text-transform:uppercase;
      font-weight:700;
    }

    .meta-count{
      color:var(--muted);
      font-size:18px;
    }

    textarea{
      width:100%;
      min-height:190px;
      border:none;
      outline:none;
      resize:vertical;
      border-radius:var(--radius-lg);
      background:rgba(3,11,50,.96);
      border:1px solid rgba(63,80,151,.45);
      color:var(--text);
      padding:26px 24px;
      font-size:26px;
      line-height:1.48;
      font-family:inherit;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
    }

    textarea::placeholder{
      color:#8d99cf;
    }

    .actions{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:18px;
      margin-top:18px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      min-height:86px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(74,91,165,.96), rgba(60,76,136,.96));
      color:var(--text);
      font-size:26px;
      font-weight:800;
      letter-spacing:-0.02em;
      cursor:pointer;
      border:1px solid rgba(119,136,212,.24);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      -webkit-tap-highlight-color:transparent;
      transition:transform .06s ease, filter .16s ease;
    }

    button:hover{
      filter:brightness(1.05);
    }

    button:active{
      transform:translateY(1px);
    }

    .status-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin:16px 4px 8px;
    }

    .status{
      color:var(--muted);
      font-size:17px;
    }

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:18px;
    }

    .quiet-link:hover{
      color:var(--text);
    }

    .result-wrap{
      margin-top:10px;
    }

    .empty{
      min-height:72px;
      display:flex;
      align-items:center;
      color:var(--muted);
      font-size:18px;
      padding:0 6px;
      border-radius:22px;
      background:rgba(3,11,50,.74);
      border:1px solid rgba(63,80,151,.36);
    }

    .cards{
      display:grid;
      gap:18px;
    }

    .card{
      background:rgba(13,23,61,.96);
      border:1px solid rgba(73,92,169,.58);
      border-radius:26px;
      padding:18px 18px 10px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.015);
    }

    .card-top{
      color:var(--muted);
      font-size:18px;
      letter-spacing:.18em;
      text-transform:uppercase;
      padding:2px 6px 10px;
    }

    .block{
      border-top:1px solid rgba(89,105,174,.2);
      padding:16px 6px 12px;
    }

    .block-label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.22em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .block-text{
      color:var(--text);
      font-size:21px;
      line-height:1.6;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .footer{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      color:var(--muted);
      font-size:17px;
      padding:2px 4px 0;
    }

    @media (max-width:680px){
      body{ padding:18px 10px 28px; }
      .shell{ padding:18px; }
      h1{ font-size:46px; }
      .sub{ font-size:22px; }
      .tool{ padding:14px; }
      .meta-count, .status, .footer, .quiet-link{ font-size:16px; }
      .meta-label{ font-size:17px; }
      textarea{
        min-height:172px;
        font-size:22px;
        padding:22px 20px;
      }
      button{
        min-height:78px;
        font-size:22px;
      }
      .block-text{
        font-size:19px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1>Hate →<br>Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="tool">
        <div class="meta">
          <div class="meta-label">Paste hate comments</div>
          <div class="meta-count" id="charCount">0 characters</div>
        </div>

        <textarea id="input" placeholder="Paste hate comments.

Example:
boring
this makes no sense
too abstract
what are you even saying
nobody asked"></textarea>

        <div class="actions">
          <button id="generateBtn">Generate</button>
          <button id="exampleBtn">Try example</button>
          <button id="clearBtn">Clear</button>
          <button id="copyBtn">Copy result</button>
        </div>

        <div class="status-row">
          <div class="status" id="statusText">Waiting for input</div>
          <a class="quiet-link" href="./unknown-mutation.html">deeper</a>
        </div>

        <div class="result-wrap" id="resultWrap">
          <div class="empty">Results appear here.</div>
        </div>

        <div class="footer">
          <span>No login. No tracking. Browser only.</span>
          <span></span>
        </div>
      </section>
    </main>
  </div>

  <script>
    const input = document.getElementById('input');
    const charCount = document.getElementById('charCount');
    const statusText = document.getElementById('statusText');
    const resultWrap = document.getElementById('resultWrap');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleText = `Your posts are always so boring. You mumble so much I can’t even tell what you’re saying! Your points are all over the place. You just keep spouting such nonsense. Give it a rest, you idiot.`;

    function normalize(text) {
      return String(text || '')
        .replace(/[“”]/g, '"')
        .replace(/[’]/g, "'")
        .replace(/\s+/g, ' ')
        .trim();
    }

    function updateCount() {
      charCount.textContent = `${input.value.length} characters`;
    }

    function includesAny(text, words) {
      return words.some(word => text.includes(word));
    }

    function detectSignals(text) {
      const t = normalize(text).toLowerCase();
      return {
        boring: includesAny(t, ['boring', 'dull', 'lame', 'dry']),
        confusing: includesAny(t, [
          "can't even tell", 'cant even tell',
          'what are you even saying', 'what are you saying',
          'this makes no sense', "doesn't make sense",
          'mumble', 'mumbling', 'vague', 'unclear', 'confusing'
        ]),
        messy: includesAny(t, [
          'all over the place', 'messy', 'rambling', 'ramble',
          'no point', 'no structure', 'everywhere'
        ]),
        nonsense: includesAny(t, [
          'nonsense', 'bullshit', 'garbage', 'trash'
        ]),
        stop: includesAny(t, [
          'give it a rest', 'just stop', 'stop posting',
          'stop', 'enough already', 'shut up'
        ]),
        insult: includesAny(t, [
          'idiot', 'moron', 'loser', 'clown'
        ]),
        stupid: includesAny(t, [
          'stupid', 'dumb'
        ]),
        nobody: includesAny(t, ['nobody asked', 'no one asked'])
      };
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const branchLibrary = {
      boring: [
        {
          id:'boring-show',
          misread:[
            'You wanted a show and got a thought.',
            'You came for snacks and got vegetables.',
            'You expected entertainment and got attention instead.'
          ],
          twist:[
            'If it was truly boring, you would have left sooner.',
            'You wanted TikTok. You accidentally walked into thinking.',
            'This sounds less like boredom and more like disappointment that it did not perform for you.'
          ],
          post:[
            'Why people call ideas boring when they wanted entertainment.',
            'Why “boring” often means “perform for me faster.”',
            'Why thought gets punished when it is not dressed like a show.'
          ],
          hook:[
            'Some hate comments are just bad reviews from people who wanted a performance.',
            'A lot of “boring” is “this was not fun enough for me.”',
            'People call thought boring when it refuses to dance.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

A lot of "boring" is not really about the idea.

It is about expectation.

Some readers come looking for entertainment.
Some posts show up offering thought.

That mismatch creates the comment.

${misread}

${twist}

${post}`
        },
        {
          id:'boring-work',
          misread:[
            'You stayed with it long enough to complain.',
            'You gave it more attention than your wording wants to admit.',
            'You did not hate it enough to ignore it.'
          ],
          twist:[
            'Sometimes “boring” just means “I did not want to work this hard to get it.”',
            'A lot of “boring” is really “make this easier for me.”',
            'This reads like irritation at effort more than dislike.'
          ],
          post:[
            'Why some readers call things boring the moment thinking begins.',
            'Why “boring” can really mean “too much work for me.”',
            'Why effort gets rebranded as boredom online.'
          ],
          hook:[
            'A lot of “boring” is just effort in a cheap disguise.',
            'Sometimes “boring” is a badly worded request for comfort.',
            'What asks for attention often gets punished first.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

When someone says "boring,"
it does not always mean the post is empty.

Sometimes it means the reader hit friction.

They wanted the point quickly.
They wanted the climb removed.

${misread}

${twist}

${post}`
        }
      ],

      confusing: [
        {
          id:'confusing-follow',
          misread:[
            'You kept listening even while saying you could not follow it.',
            'You stayed long enough to get annoyed at not catching it.',
            'You sound frustrated that you could not pin it down fast.'
          ],
          twist:[
            'If you stayed confused long enough to complain, you stayed longer than you admit.',
            'Apparently my nonsense was interesting enough to deserve a full reaction.',
            'This sounds less like indifference and more like frustrated attention.'
          ],
          post:[
            'Why people hate ideas that ask them to follow the middle.',
            'Why “this makes no sense” often means “I lost the path.”',
            'Why some readers get angry when a post makes them work.'
          ],
          hook:[
            'A lot of “makes no sense” is just public frustration.',
            'Sometimes “I do not get it” comes out dressed as aggression.',
            'Confusion is not the same thing as indifference.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

"This makes no sense" is often treated like a final judgment.

A lot of the time it is not.

It is a reaction to effort.
It is a reaction to losing the path.
It is a reaction to not getting the point fast enough.

${misread}

${twist}

${post}`
        },
        {
          id:'confusing-voice',
          misread:[
            'You say you could not follow it, but you still stayed for the sound of it.',
            'You listened longer than someone with no interest ever would.',
            'You kept reading while telling me it was unreadable.'
          ],
          twist:[
            'If the voice was that bad, why did it hold you there long enough for a complaint?',
            'Sometimes “I cannot follow this” still means “I kept coming closer to it.”',
            'There is a strange kind of loyalty inside a long complaint.'
          ],
          post:[
            'Why people keep listening to things they say make no sense.',
            'Why “unclear” comments still reveal attention.',
            'Why confusion can sound louder than curiosity.'
          ],
          hook:[
            'Some complaints reveal more attention than praise ever does.',
            'You do not write a long complaint about something that never touched you.',
            'Frustration can still be a form of focus.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

One strange thing about online hate:

People will tell you they could not follow a word
after clearly giving the post their full attention.

That matters.

Because it means the post did not vanish.
It stayed in the room.

${misread}

${twist}

${post}`
        }
      ],

      messy: [
        {
          id:'messy-prechewed',
          misread:[
            'You wanted the post cleaner so you could beat it faster.',
            'You sound less offended by the idea than by having to sort it yourself.',
            'You were not asking for silence. You were asking for a straighter road.'
          ],
          twist:[
            '“All over the place” often means “please arrange this for me.”',
            'Some people do not hate a rough idea. They hate doing the arranging.',
            'This sounds like labor rejection more than content rejection.'
          ],
          post:[
            'Why people get angry when a post makes them connect the dots.',
            'Why “all over the place” can mean “do the sorting for me.”',
            'Why rough ideas irritate readers who want neat answers.'
          ],
          hook:[
            'Some readers do not mind big ideas. They mind doing the sorting.',
            'The complaint is often about labor, not content.',
            'A lot of “messy” is just “I wanted this arranged for me.”'
          ],
          thread:(misread, twist, post, hook) => `${hook}

"All over the place" is one of the most interesting complaints.

Because sometimes it is not really about quality.

Sometimes it means:
I can see pieces of something here,
but I did not want to connect them myself.

${misread}

${twist}

${post}`
        }
      ],

      nonsense: [
        {
          id:'nonsense-dignity',
          misread:[
            'You called it nonsense, but still replied like it touched something.',
            'If it were truly empty, it would not have earned this much heat.',
            'You sound bothered, which is already different from untouched.'
          ],
          twist:[
            'Sometimes “nonsense” just means “I do not want to grant this a real reply.”',
            'This sounds like emotional noise trying to look certain.',
            'If it meant nothing, it would not need this much force.'
          ],
          post:[
            'Why people call things nonsense when they do not want to answer them.',
            'Why “nonsense” is sometimes just wounded attention.',
            'Why emotional noise often hides behind certainty.'
          ],
          hook:[
            'If it was truly nothing, they would not need to kill it this loudly.',
            '“Nonsense” is often discomfort in a hard hat.',
            'People get very certain when they do not want to think in public.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

"Nonsense" looks like a strong verdict.

A lot of the time it is just a shortcut.

It lets the person avoid the work of answering.
It lets the room feel settled again.
It lets discomfort dress up as certainty.

${misread}

${twist}

${post}`
        }
      ],

      stop: [
        {
          id:'stop-haunted',
          misread:[
            'You do not sound indifferent. You sound haunted.',
            'That is a weird amount of investment for something you want gone.',
            'You are asking it to stop because it keeps reaching you.'
          ],
          twist:[
            'If ignoring it worked, there would be no stop comment.',
            'People tell things to stop when scrolling past already failed.',
            'A stop comment is often proof the post is still walking around inside the room.'
          ],
          post:[
            'Why ignoring a post fails before the angry reply appears.',
            'Why people say “stop” when a post keeps lingering.',
            'Why “give it a rest” is often proof the idea stuck.'
          ],
          hook:[
            'People only say “stop” when scrolling past already failed.',
            'A stop comment means the post stayed alive too long.',
            'If ignoring it worked, there would be no stop comment.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

"Stop posting."
"Give it a rest."

Those lines always sound final.

But they usually reveal the opposite.

They show that the post stayed alive
longer than the reader wanted.

${misread}

${twist}

${post}`
        }
      ],

      insult: [
        {
          id:'insult-balance',
          misread:[
            'You ran out of argument and reached for the emergency clown horn.',
            'You skipped the idea and swung at the person because that was easier.',
            'Name-calling is usually what happens after the useful part is over.'
          ],
          twist:[
            'When the reply gets personal, the argument usually gets lighter.',
            'The insult often arrives right when the real point leaves the room.',
            'This is what public loss of balance looks like in comment form.'
          ],
          post:[
            'Why insults usually arrive when the argument runs out.',
            'Why name-calling is the easiest way to avoid the actual point.',
            'Why personal attacks often reveal an empty reply.'
          ],
          hook:[
            'The insult usually arrives right when the argument leaves.',
            'When the reply gets personal, the idea already won something.',
            'Name-calling is often just public loss of balance.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

A good rule online:

The moment the reply becomes about the person,
the argument is usually getting weaker.

That is why insults matter.

Not because they hurt.
Because they reveal where the reply collapsed.

${misread}

${twist}

${post}`
        }
      ],

      stupid: [
        {
          id:'stupid-lazy',
          misread:[
            'Calling it stupid is often easier than explaining why it bothered you.',
            'You picked the smallest word because the bigger explanation was harder.',
            'You did not answer the idea. You stamped it.'
          ],
          twist:[
            '“Stupid” is often just a lazy lid put on an uncomfortable thought.',
            'Some people reach for “stupid” when they want the room to close faster.',
            'It is a shortcut word for ending the conversation without earning the end.'
          ],
          post:[
            'Why “stupid” is often just a shortcut for “I do not want to unpack this.”',
            'Why people use small words to shut big thoughts down.',
            'Why “stupid” comments often say more about effort than truth.'
          ],
          hook:[
            '“Stupid” is often the cheapest possible ending.',
            'Small insult. Big avoidance.',
            'Some words are not arguments. They are exit signs.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

"Stupid" is one of the most useful words to study online.

Because it looks sharp,
but often does very little real work.

It is usually a fast way to shut the door
without carrying the argument through.

${misread}

${twist}

${post}`
        }
      ],

      nobody: [
        {
          id:'nobody-answered',
          misread:[
            'You still answered.',
            'You noticed it enough to react.',
            'You stopped just to say that.'
          ],
          twist:[
            '“Nobody asked” is still a form of engagement.',
            'Dismissal is louder than silence.',
            'People reply most when they want to deny interest.'
          ],
          post:[
            'Why people reply to things they claim not to care about.',
            'Why loud indifference is rarely real indifference.',
            'Why dismissal is often just attention in a cheap mask.'
          ],
          hook:[
            '“Nobody asked” is still a reply.',
            'Indifference rarely writes comments.',
            'Sometimes the loudest “don’t care” comes from the most bothered reader.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

"Nobody asked" is one of the funniest comments online.

Because it proves the opposite of what it says.

It proves the post reached someone.
It proves the room noticed.
It proves the comment box suddenly felt necessary.

${misread}

${twist}

${post}`
        }
      ],

      default: [
        {
          id:'default-contact',
          misread:[
            'You noticed it enough to react.',
            'You did not scroll past.',
            'You gave it more time than silence would have.'
          ],
          twist:[
            'Even friction is proof something landed.',
            'A rough reply still means the post reached the room.',
            'Contact is not always polite.'
          ],
          post:[
            'Why negative comments still reveal attention.',
            'Why friction is different from disappearance.',
            'Why rough replies can still become useful.'
          ],
          hook:[
            'A hate comment is still a form of contact.',
            'Friction still means the post touched something.',
            'Silence is different. This was not silence.'
          ],
          thread:(misread, twist, post, hook) => `${hook}

Not every bad reply is useful.

But many of them reveal something important:

the post landed somewhere.

That matters.

Because total indifference leaves no mark at all.

${misread}

${twist}

${post}`
        }
      ]
    };

    function getActiveKeys(signals) {
      const keys = [];
      if (signals.stop) keys.push('stop');
      if (signals.confusing) keys.push('confusing');
      if (signals.messy) keys.push('messy');
      if (signals.boring) keys.push('boring');
      if (signals.nonsense) keys.push('nonsense');
      if (signals.insult) keys.push('insult');
      if (signals.stupid) keys.push('stupid');
      if (signals.nobody) keys.push('nobody');
      if (!keys.length) keys.push('default');
      return keys;
    }

    function buildCards(text) {
      const signals = detectSignals(text);
      const activeKeys = getActiveKeys(signals);

      const selectedKeys = shuffle(activeKeys).slice(0, 3);
      while (selectedKeys.length < 3) {
        selectedKeys.push('default');
      }

      return selectedKeys.map((key, index) => {
        const branch = pick(branchLibrary[key]);
        const misread = pick(branch.misread);
        const twist = pick(branch.twist);
        const post = pick(branch.post);
        const hook = pick(branch.hook);
        const thread = branch.thread(misread, twist, post, hook);

        return {
          label:`${index + 1}. angle`,
          misread,
          twist,
          post,
          hook,
          thread
        };
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderCards(cards) {
      const cardsHtml = cards.map(card => `
        <article class="card">
          <div class="card-top">${escapeHtml(card.label)}</div>

          <div class="block">
            <div class="block-label">Misread</div>
            <div class="block-text">${escapeHtml(card.misread)}</div>
          </div>

          <div class="block">
            <div class="block-label">Twist</div>
            <div class="block-text">${escapeHtml(card.twist)}</div>
          </div>

          <div class="block">
            <div class="block-label">Post idea</div>
            <div class="block-text">${escapeHtml(card.post)}</div>
          </div>

          <div class="block">
            <div class="block-label">Hook</div>
            <div class="block-text">${escapeHtml(card.hook)}</div>
          </div>

          <div class="block">
            <div class="block-label">Thread</div>
            <div class="block-text">${escapeHtml(card.thread)}</div>
          </div>
        </article>
      `).join('');

      resultWrap.innerHTML = `<div class="cards">${cardsHtml}</div>`;
    }

    function setEmpty() {
      resultWrap.innerHTML = '<div class="empty">Results appear here.</div>';
    }

    function generate() {
      const text = normalize(input.value);
      if (!text) return;
      statusText.textContent = 'Generated';
      renderCards(buildCards(text));
    }

    function clearAll() {
      input.value = '';
      updateCount();
      statusText.textContent = 'Waiting for input';
      setEmpty();
    }

    function copyResult() {
      const cards = [...document.querySelectorAll('.card')];
      if (!cards.length) return;

      const text = cards.map(card => {
        const label = card.querySelector('.card-top')?.innerText || '';
        const blocks = [...card.querySelectorAll('.block')].map(block => {
          const a = block.querySelector('.block-label')?.innerText || '';
          const b = block.querySelector('.block-text')?.innerText || '';
          return `${a}\n${b}`;
        }).join('\n\n');
        return `${label}\n\n${blocks}`;
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => copyBtn.textContent = old, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => copyBtn.textContent = old, 1200);
      });
    }

    input.addEventListener('input', updateCount);
    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      input.value = exampleText;
      updateCount();
      statusText.textContent = 'Example loaded';
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    updateCount();
    setEmpty();
  </script>
</body>
</html>

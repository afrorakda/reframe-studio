<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REFRAME Studio – Harsh Comment Reframer</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
color:#111;
max-width:720px;
margin:auto;
padding:24px;
}

h1{
font-size:30px;
margin-bottom:4px;
}

.tagline{
color:#444;
margin-bottom:16px;
}

textarea{
width:100%;
height:140px;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:10px;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-top:12px;
}

button{
padding:10px 14px;
font-size:15px;
background:#1E3A5F;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

button.secondary{
background:#f2f2f2;
color:#111;
border:1px solid #ddd;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:10px;
font-size:13px;
color:#444;
}

.result{
margin-top:20px;
border:1px solid #e5e5e5;
border-radius:12px;
padding:18px;
background:#fafafa;
}

.label{
font-weight:bold;
font-size:13px;
color:#555;
margin-bottom:6px;
}

.block{
margin-bottom:16px;
}

.footer{
margin-top:16px;
font-size:12px;
color:#777;
line-height:1.4;
}

.note{
margin-top:14px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<h1>REFRAME <span style="font-weight:300;">Studio</span></h1>

<div class="tagline">
Harsh Comment Reframer
</div>

<textarea id="input" placeholder="Paste a harsh comment here"></textarea>

<div class="row">

<button id="btn">Reframe</button>

<button id="exampleBtn" class="secondary">
Try example
</button>

<button id="copyBtn" class="secondary">
Copy result
</button>

<button id="copyPostBtn" class="secondary">
Copy as Post
</button>

<button id="shareBtn" class="secondary">
Share on X
</button>

</div>

<div id="status" class="status"></div>

<div id="output" class="result" style="display:none">

<div class="block">
<div class="label">Cleaned Signal</div>
<div id="signal"></div>
</div>

<div class="block">
<div class="label">Core Request</div>
<div id="request"></div>
</div>

<div class="block">
<div class="label">Strategic Move</div>
<div id="move"></div>
</div>

<div class="footer">
Reframed with REFRAME Studio<br>
REFRAME = 批判を「改善要望」に変換する思考ツール<br>
Runs entirely in your browser. No data is stored.<br>
#Reframed
</div>

</div>

<div class="note">
We don’t store your text. Don’t paste personal info.
</div>

<script>

const $ = (id)=>document.getElementById(id)

function isJapanese(text){
return /[ぁ-んァ-ン一-龯]/.test(text)
}

function setStatus(msg){
$("status").textContent = msg
}

function reframe(){

const raw = $("input").value.trim()

if(!raw){
setStatus("Paste a comment first")
return
}

const lang = isJapanese(raw) ? "ja" : "en"

let signal
let request
let move

if(lang==="ja"){

signal="内容を改善してほしいという要望"

request="・分かりやすくする\n・使いやすくする"

move="次の一手：\n1. UIをシンプルに\n2. 説明を短く\n3. 例を追加"

}else{

signal="Request to improve clarity or usability."

request="- Make it easier to understand\n- Improve structure"

move="Next move:\n1. Simplify layout\n2. Shorten explanation\n3. Add an example"

}

$("signal").innerText=signal
$("request").innerText=request
$("move").innerText=move

$("output").style.display="block"

setStatus("Done")

}

function example(){

$("input").value="Your UI is confusing and looks outdated."

setStatus("Example inserted")

}

async function copy(){

const text =
`REFRAME Studio

${$("signal").innerText}

${$("request").innerText}

${$("move").innerText}

#Reframed`

await navigator.clipboard.writeText(text)

setStatus("Copied")

}

async function copyPost(){

const text =
`I reframed a harsh comment using REFRAME Studio.

${$("signal").innerText}

${$("request").innerText}

${$("move").innerText}

#Reframed`

await navigator.clipboard.writeText(text)

setStatus("Post copied")

}

function share(){

const text="I reframed a harsh comment using REFRAME Studio. #Reframed"

const url=location.href

window.open(
"https://twitter.com/intent/tweet?text="+encodeURIComponent(text)+"&url="+encodeURIComponent(url)
)

}

$("btn").addEventListener("click",reframe)
$("exampleBtn").addEventListener("click",example)
$("copyBtn").addEventListener("click",copy)
$("copyPostBtn").addEventListener("click",copyPost)
$("shareBtn").addEventListener("click",share)

$("input").addEventListener("keydown",function(e){

if(e.key==="Enter" && !e.shiftKey){

e.preventDefault()

reframe()

}

})

setStatus("Loaded")

</script>

</body>
</html>

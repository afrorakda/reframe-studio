<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hate → Content</title>

<style>

:root{
--line:#283252;
--line-soft:#34406a;
--text:#eef2ff;
--muted:#9aa6d1;
--soft:#cfd7f6;
}

*{box-sizing:border-box}

body{
margin:0;
padding:18px 10px 32px;
background:radial-gradient(circle at top,#10183a,#060913);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.wrap{
max-width:820px;
margin:auto;
}

.shell{
background:#0e1734;
border:1px solid #2e3964;
border-radius:26px;
padding:18px;
}

.title{
font-size:28px;
font-weight:800;
margin:0;
}

.sub{
margin-top:8px;
color:var(--muted);
}

.input-box,.result-box{
margin-top:22px;
background:#070c1f;
border:1px solid var(--line);
border-radius:20px;
padding:16px;
}

textarea{
width:100%;
min-height:150px;
border:none;
background:transparent;
color:white;
font-size:16px;
resize:vertical;
}

textarea::placeholder{color:#8c97c8}

.actions{
margin-top:18px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:14px;
}

button{
border:none;
border-radius:16px;
padding:16px;
font-size:16px;
background:#2a3564;
color:white;
cursor:pointer;
}

.result-box{
margin-top:22px;
}

.card{
background:#141c3c;
border:1px solid var(--line-soft);
border-radius:18px;
padding:16px;
margin-bottom:16px;
}

.block{
margin-top:12px;
}

.block-title{
font-size:11px;
color:#9aa6d1;
letter-spacing:.12em;
text-transform:uppercase;
}

.block-text{
margin-top:4px;
color:var(--soft);
white-space:pre-wrap;
}

.lower{
margin-top:16px;
display:flex;
justify-content:space-between;
color:#8a94c2;
font-size:13px;
}

a{color:#8a94c2;text-decoration:none}

</style>
</head>

<body>

<div class="wrap">
<main class="shell">

<h1 class="title">Hate → Content</h1>
<p class="sub">Turn friction into angles.</p>

<div class="input-box">

<textarea id="input" placeholder="Paste hate comments.

Example:
boring
this makes no sense
too abstract
nobody asked"></textarea>

</div>

<div class="actions">
<button id="generate">Generate</button>
<button id="example">Try example</button>
<button id="clear">Clear</button>
<button id="copy">Copy result</button>
</div>

<div id="result" class="result-box">
Results appear here.
</div>

<div class="lower">
<div>No login. No tracking. Browser only.</div>
<a href="./unknown-mutation.html">deeper</a>
</div>

</main>
</div>

<script>

const input=document.getElementById("input")
const result=document.getElementById("result")

const example=`boring
this makes no sense
too abstract
nobody asked`

document.getElementById("example").onclick=()=>{
input.value=example
}

document.getElementById("clear").onclick=()=>{
input.value=""
result.innerHTML="Results appear here."
}

function pick(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function generateCard(){

const misreads=[
"You do not sound indifferent. You sound haunted.",
"You reacted fast for something you claim not to care about.",
"You stayed long enough to complain.",
"You noticed it enough to respond."
]

const twists=[
"If it was really boring, you would have scrolled.",
"You came for entertainment and accidentally found thinking.",
"Apparently my nonsense is interesting enough to deserve a paragraph.",
"You expected TikTok. You got ideas."
]

const ideas=[
"Why people complain about posts they keep reading.",
"Why 'boring' is often a disguise for 'make this easier'.",
"Why hate comments still reveal attention.",
"Why people react strongest to ideas they almost understand."
]

const hooks=[
"If ignoring it worked, there would be no comment.",
"Indifference rarely writes replies.",
"Hate comments are still attention.",
"If it meant nothing, they would keep scrolling."
]

const misread=pick(misreads)
const twist=pick(twists)
const idea=pick(ideas)
const hook=pick(hooks)

const thread=`${hook}

People often say things like
"boring"
"this makes no sense"
"nobody asked"

But look closer.

Most hate comments aren't silence.

They are attention
wearing a cheap disguise.

If it truly meant nothing,
no one would reply.`

return{

misread,
twist,
idea,
hook,
thread

}

}

document.getElementById("generate").onclick=()=>{

const text=input.value.trim()

if(!text)return

result.innerHTML=""

for(let i=0;i<3;i++){

const c=generateCard()

const html=`

<div class="card">

<div class="block">
<div class="block-title">Misread</div>
<div class="block-text">${c.misread}</div>
</div>

<div class="block">
<div class="block-title">Twist</div>
<div class="block-text">${c.twist}</div>
</div>

<div class="block">
<div class="block-title">Post idea</div>
<div class="block-text">${c.idea}</div>
</div>

<div class="block">
<div class="block-title">Hook</div>
<div class="block-text">${c.hook}</div>
</div>

<div class="block">
<div class="block-title">Thread</div>
<div class="block-text">${c.thread}</div>
</div>

</div>
`

result.innerHTML+=html

}

}

document.getElementById("copy").onclick=()=>{

navigator.clipboard.writeText(result.innerText)

}

</script>

</body>
</html>

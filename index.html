<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REFRAME Studio</title>
  <meta
    name="description"
    content="Ultra-simple browser tools that solve small everyday friction problems."
  />
  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#111111;
      --muted:#666666;
      --line:#dddddd;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:auto;
      padding:32px 16px 60px;
    }

    h1{
      margin:0;
      font-size:36px;
      line-height:1.1;
    }

    .subtitle{
      color:var(--muted);
      margin-top:8px;
      margin-bottom:28px;
      font-size:16px;
      line-height:1.5;
    }

    .status{
      font-size:14px;
      color:var(--muted);
      margin-bottom:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
    }

    .card{
      display:block;
      text-decoration:none;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:16px;
      transition:0.15s;
      color:var(--text);
    }

    .card:hover{
      transform:translateY(-2px);
      border-color:#bbb;
    }

    .card-title{
      font-size:20px;
      margin-bottom:4px;
    }

    .brand{
      font-size:13px;
      color:var(--muted);
      margin-bottom:10px;
    }

    .desc{
      font-size:15px;
      color:#111;
      line-height:1.5;
    }

    .footer{
      margin-top:30px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    @media (min-width:700px){
      .grid{
        grid-template-columns:1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>REFRAME Studio</h1>

    <p class="subtitle">
      Ultra-simple browser tools that solve small everyday friction problems.
    </p>

    <div class="status" id="status">Loading tools...</div>
    <div class="grid" id="toolsGrid"></div>

    <div class="footer">
      Built by REFRAME Studio<br>
      Open-source style tools. Simple. Private. Fast.
    </div>
  </div>

  <script>
    const OWNER = "afrorakda";
    const REPO = "reframe-studio";

    const RAW_BASE = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/`;

    const EXCLUDED_FILES = new Set([
      "index.html",
      "reframe_tool_factory.html",
      "tool-template.html"
    ]);

    const toolsGrid = document.getElementById("toolsGrid");
    const status = document.getElementById("status");

    function humanizeFileName(fileName) {
      const base = fileName.replace(".html", "");
      return base
        .split("-")
        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
        .join(" ");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

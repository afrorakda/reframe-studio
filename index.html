<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>REFRAME Studio</title>

<style>

body{
font-family:sans-serif;
max-width:700px;
margin:80px auto;
text-align:center;
}

textarea{
width:100%;
height:120px;
font-size:16px;
padding:10px;
}

button{
margin-top:20px;
padding:12px 24px;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
background:#eee;
}

button:hover{
background:#ddd;
}

#output{
margin-top:40px;
font-size:22px;
}

.links{
margin-top:40px;
}

.links a{
display:inline-block;
margin:10px;
padding:12px 20px;
background:#f4f4f4;
border-radius:8px;
text-decoration:none;
color:black;
}

.links a:hover{
background:#e8e8e8;
}

</style>

</head>

<body>

<h1>REFRAME Studio</h1>

<p>What's on your mind?</p>

<textarea id="input"></textarea>

<br>

<button onclick="reframe()">REFRAME</button>

<div id="output"></div>

<div class="links">

<a href="thought-map.html">Thought Map</a>

<a href="tool-generator-v3.html">Surprise Me</a>

</div>

<script>

const angles = [

"Maybe the criticism is pointing at something interesting.",

"What if the opposite was true?",

"Maybe the problem is actually the advantage.",

"Cringe might mean you're not generic.",

"What assumption might be wrong?"

];

function reframe(){

const angle = angles[Math.floor(Math.random()*angles.length)];

document.getElementById("output").innerText = angle;

}

</script>

</body>
</html>

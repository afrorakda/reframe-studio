<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hate → Content</title>
  <style>
    :root{
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{ padding:18px 10px 32px; }

    .wrap{
      max-width:820px;
      margin:0 auto;
    }

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .title{
      margin:0;
      font-size:28px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:12px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-box,
    .result-box{
      margin-top:22px;
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:16px;
    }

    textarea{
      width:100%;
      min-height:150px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:16px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{ color:var(--muted); }

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      border-radius:18px;
      min-height:66px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:16px;
      font-weight:700;
      letter-spacing:-0.01em;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
      transition:transform .06s ease, background .18s ease, border-color .18s ease;
      -webkit-tap-highlight-color:transparent;
    }

    button:hover{
      background:linear-gradient(180deg, rgba(60,75,130,.92), rgba(47,60,106,.96));
      border-color:rgba(132,149,214,.34);
    }

    button:active{ transform:translateY(1px); }

    .result-box{
      min-height:0;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
    }

    .result-box.empty{
      min-height:64px;
      justify-content:center;
    }

    .empty-text{
      color:var(--muted);
      font-size:16px;
    }

    .cards{
      display:grid;
      gap:16px;
    }

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:20px;
      padding:16px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .block{
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid rgba(110,126,182,.18);
    }

    .block:first-of-type{
      margin-top:0;
      padding-top:0;
      border-top:none;
    }

    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:16px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .lower{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }

    .tiny{
      color:#808bb0;
      font-size:12px;
    }

    .quiet-link{
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:2px 0;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .quiet-link:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="shell">
      <h1 class="title">Hate → Content</h1>
      <p class="sub">Turn friction into angles.</p>

      <section class="input-box">
        <textarea id="input" placeholder="Paste hate comments.

Example:
boring
this makes no sense
too abstract
what are you even saying
nobody asked"></textarea>
      </section>

      <section class="actions">
        <button id="generateBtn">Generate</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">Results appear here.</div>
      </section>

      <div class="lower">
        <div class="tiny">No login. No tracking. Browser only.</div>
        <a class="quiet-link" href="./unknown-mutation.html">deeper</a>
      </div>
    </main>
  </div>

  <script>
    const input = document.getElementById('input');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleInput = [
      'boring',
      'this makes no sense',
      'too abstract',
      'what are you even saying',
      'nobody asked'
    ].join('\n');

    const branches = {
      boring: [
        {
          misread: 'You wanted entertainment and got thought instead.',
          flip: 'A lot of “boring” really means “this did not entertain me fast enough.”',
          post: 'Why people call ideas boring when they wanted entertainment.',
          hook: 'Some hate comments are just bad reviews from people who wanted a show.'
        },
        {
          misread: 'You stayed with it long enough to judge it.',
          flip: 'Sometimes “boring” means the reader did not want to do the work of following the thought.',
          post: 'Why some readers call things boring the moment thinking begins.',
          hook: 'A lot of “boring” is just effort in a cheap disguise.'
        },
        {
          misread: 'You may have wanted the easier version first.',
          flip: 'Some people say “boring” when they really mean “make this simpler for me.”',
          post: 'Why “boring” can really mean “make this easier for me.”',
          hook: 'Sometimes “boring” is just a badly worded request for comfort.'
        }
      ],
      confusing: [
        {
          misread: 'You kept listening even while saying you could not follow it.',
          flip: 'A lot of “this makes no sense” means “I did not want to work this hard to get there.”',
          post: 'Why people hate ideas that ask them to follow the middle.',
          hook: 'If they stayed confused long enough to complain, they stayed longer than they admit.'
        },
        {
          misread: 'You sound upset that you stayed with it and still could not pin it down.',
          flip: 'Sometimes the hate is not about the idea being empty. It is about the reader getting lost on the way in.',
          post: 'Why “this makes no sense” often means “I lost the path.”',
          hook: 'A lot of “makes no sense” is just public frustration.'
        },
        {
          misread: 'You wanted the path faster.',
          flip: 'People often call something nonsense when they wanted the point without doing the climb.',
          post: 'Why some readers get angry when a post makes them work.',
          hook: 'Sometimes “I do not get it” comes out dressed as aggression.'
        }
      ],
      abstract: [
        {
          misread: 'You may have wanted the bridge before the leap.',
          flip: '“Too abstract” often means the path was hidden, not that the idea was weak.',
          post: 'Why missing steps make ideas look abstract.',
          hook: 'Sometimes “too abstract” means “show me the bridge.”'
        },
        {
          misread: 'You may have wanted the safe version first.',
          flip: 'People often ask for simpler shapes when the full idea feels risky.',
          post: 'Why readers ask for the safer version before the real one.',
          hook: 'The room often asks for safety before truth.'
        },
        {
          misread: 'You may have felt the old frame slipping.',
          flip: 'A new frame often gets called abstract before it gets recognized.',
          post: 'Why new frames sound vague at first.',
          hook: 'Unfamiliar often gets mistaken for empty.'
        }
      ],
      nobody: [
        {
          misread: 'You still answered.',
          flip: '“Nobody asked” is still a form of engagement.',
          post: 'Why people reply to things they claim not to care about.',
          hook: '“Nobody asked” is still a reply.'
        },
        {
          misread: 'You noticed it enough to react.',
          flip: 'Dismissal is louder than silence.',
          post: 'Why loud indifference is rarely real indifference.',
          hook: 'Indifference rarely writes comments.'
        },
        {
          misread: 'You stopped just to say that.',
          flip: 'People reply most when they want to deny interest.',
          post: 'Why dismissal is often just attention in a cheap mask.',
          hook: 'Sometimes the loudest “don’t care” comes from the most bothered reader.'
        }
      ],
      insult: [
        {
          misread: 'You ran out of argument and reached for the emergency clown horn.',
          flip: 'Personal insults often show up when the reply has no real legs left.',
          post: 'Why insults usually arrive when the argument runs out.',
          hook: 'The insult usually arrives right when the argument leaves.'
        },
        {
          misread: 'You skipped the idea and swung at the person because that was easier.',
          flip: 'The moment the comment becomes about the person, the argument is usually gone.',
          post: 'Why name-calling is the easiest way to avoid the actual point.',
          hook: 'When the reply gets personal, the idea already won something.'
        },
        {
          misread: 'Name-calling is usually what happens after the useful part is over.',
          flip: 'Insults are often the internet version of losing balance in public.',
          post: 'Why personal attacks are often a sign the reply is already empty.',
          hook: 'Name-calling is often just public loss of balance.'
        }
      ],
      stop: [
        {
          misread: 'You are asking it to stop because it keeps reaching you.',
          flip: '“Give it a rest” often means “this keeps showing up in my head more than I want.”',
          post: 'Why people say “stop” when a post keeps lingering.',
          hook: 'People only say “stop” when scrolling past already failed.'
        },
        {
          misread: 'That is a weird amount of investment for something you want gone.',
          flip: 'People tell things to stop when ignoring them has already failed.',
          post: 'Why “give it a rest” is often proof the idea stuck.',
          hook: 'A stop comment means the post stayed alive too long.'
        },
        {
          misread: 'You do not sound indifferent. You sound haunted.',
          flip: 'A stop comment is often proof the post is still walking around inside the room.',
          post: 'Why ignoring a post fails before the angry reply appears.',
          hook: 'If ignoring it worked, there would be no stop comment.'
        }
      ],
      default: [
        {
          misread: 'You noticed it enough to react.',
          flip: 'Even friction is proof something landed.',
          post: 'Why negative comments still reveal attention.',
          hook: 'A hate comment is still a form of contact.'
        },
        {
          misread: 'You may have wanted the easier version.',
          flip: 'A lot of hate is really “make this easier for me.”',
          post: 'Why hate comments often hide a request for an easier read.',
          hook: 'Sometimes the complaint is only asking for a smoother road.'
        },
        {
          misread: 'You reacted like it landed somewhere important.',
          flip: 'People rarely answer this hard when nothing happened.',
          post: 'Why strong reactions often prove a post landed.',
          hook: 'The heat often reveals the hit.'
        }
      ]
    };

    function setEmpty() {
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">Results appear here.</div>';
    }

    function normalize(text) {
      return String(text || '')
        .replace(/[“”]/g, '"')
        .replace(/[’]/g, "'")
        .replace(/\s+/g, ' ')
        .trim()
        .toLowerCase();
    }

    function detect(text) {
      const t = normalize(text);
      const keys = [];

      if (t.includes('boring')) keys.push('boring');
      if (
        t.includes("this makes no sense") ||
        t.includes("what are you even saying") ||
        t.includes("can't even tell") ||
        t.includes("cant even tell") ||
        t.includes('mumble')
      ) keys.push('confusing');
      if (t.includes('too abstract')) keys.push('abstract');
      if (t.includes('nobody asked')) keys.push('nobody');
      if (t.includes('idiot') || t.includes('stupid') || t.includes('moron')) keys.push('insult');
      if (t.includes('give it a rest') || t.includes('just stop') || t.includes('stop')) keys.push('stop');

      return keys.length ? keys : ['default'];
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildCards(text) {
      const keys = shuffle(detect(text)).slice(0, 3);

      while (keys.length < 3) {
        keys.push('default');
      }

      return keys.map((key, index) => {
        const branch = branches[key][Math.floor(Math.random() * branches[key].length)];
        return {
          label: `${index + 1}. angle`,
          misread: branch.misread,
          flip: branch.flip,
          post: branch.post,
          hook: branch.hook
        };
      });
    }

    function renderCards(cards) {
      const html = cards.map(card => `
        <article class="card">
          <div class="card-label">${card.label}</div>

          <div class="block">
            <div class="block-title">Misread</div>
            <div class="block-text">${escapeHtml(card.misread)}</div>
          </div>

          <div class="block">
            <div class="block-title">Flip</div>
            <div class="block-text">${escapeHtml(card.flip)}</div>
          </div>

          <div class="block">
            <div class="block-title">Post idea</div>
            <div class="block-text">${escapeHtml(card.post)}</div>
          </div>

          <div class="block">
            <div class="block-title">Hook</div>
            <div class="block-text">${escapeHtml(card.hook)}</div>
          </div>
        </article>
      `).join('');

      result.className = 'result-box';
      result.innerHTML = `<div class="cards">${html}</div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function generate() {
      const text = input.value.trim();
      if (!text) return;
      renderCards(buildCards(text));
    }

    function clearAll() {
      input.value = '';
      setEmpty();
    }

    function copyResult() {
      const cards = [...document.querySelectorAll('.card')];
      if (!cards.length) return;

      const text = cards.map(card => {
        const label = card.querySelector('.card-label')?.innerText || '';
        const blocks = [...card.querySelectorAll('.block')].map(block => {
          const a = block.querySelector('.block-title')?.innerText || '';
          const b = block.querySelector('.block-text')?.innerText || '';
          return `${a}\n${b}`;
        }).join('\n\n');
        return `${label}\n\n${blocks}`;
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => copyBtn.textContent = old, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => copyBtn.textContent = old, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      input.value = exampleInput;
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    setEmpty();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hate → Content</title>

<style>
:root{
  --bg:#04101f;
  --bg2:#081833;
  --panel:rgba(16,31,58,.78);
  --line:rgba(173,207,255,.12);
  --text:#eaf2ff;
  --muted:#95a8c5;
  --shadow:0 20px 60px rgba(0,0,0,.34);
  --radius:22px;
  --max:720px;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  color:var(--text);
  min-height:100vh;
  background:
    radial-gradient(circle at 50% -10%, rgba(87,137,228,.16), transparent 30%),
    linear-gradient(180deg,var(--bg2),var(--bg));
}

.wrap{
  width:min(var(--max),calc(100% - 24px));
  margin:auto;
  padding:24px 0;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.header{
  padding:18px;
  font-size:.85rem;
  color:var(--muted);
}

.title{
  padding:0 18px 8px;
  font-size:1.4rem;
  font-weight:700;
}

textarea{
  width:100%;
  min-height:140px;
  border:none;
  outline:none;
  padding:14px;
  border-radius:16px;
  background:rgba(6,14,28,.7);
  color:var(--text);
  margin:0 18px 12px;
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:0 18px 16px;
}

button{
  border:none;
  border-radius:16px;
  padding:14px;
  font-weight:600;
  background:rgba(113,154,225,.12);
  color:var(--text);
}

button:active{
  transform:scale(.97);
}

.footer{
  text-align:center;
  font-size:.75rem;
  color:var(--muted);
  padding-bottom:16px;
}
</style>
</head>

<body>

<div class="wrap">
  <div class="panel">

    <div class="header">Hate → Content</div>
    <div class="title">Turn reaction into fuel.</div>

    <textarea id="input" placeholder="Your posts are boring.&#10;Who cares.&#10;This makes no sense."></textarea>

    <div class="buttons">
      <button onclick="go('shift.html')">Reframe</button>
      <button onclick="goRandom()">deeper</button>
    </div>

    <div class="footer">No login. No tracking. Browser only.</div>

  </div>
</div>

<script src="./random-next.js"></script>

<script>
const inputEl = document.getElementById("input");

function go(page){
  const input = inputEl.value || "";
  const url = window.REFRAME_RANDOM_NEXT.buildNextUrl([page], input);
  window.location.href = url;
}

function goRandom(){
  const input = inputEl.value || "";

  const tools = [
    "shift.html",
    "misread.html",
    "opposite.html",
    "metaphor.html",
    "question.html"
  ];

  const url = window.REFRAME_RANDOM_NEXT.buildNextUrl(tools, input);
  window.location.href = url;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REFRAME Studio</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#fff;
color:#111;
max-width:720px;
margin:auto;
padding:24px;
}

h1{
font-size:32px;
margin-bottom:6px;
}

.tagline{
color:#666;
margin-bottom:20px;
}

.tool{
display:block;
border:1px solid #ddd;
border-radius:14px;
padding:18px;
margin-bottom:16px;
text-decoration:none;
color:#111;
}

.tool:hover{
background:#fafafa;
}

.tool h2{
margin:0 0 6px 0;
font-size:22px;
}

.tool p{
margin:0;
color:#555;
}

.footer{
margin-top:40px;
font-size:12px;
color:#666;
line-height:1.6;
}

</style>
</head>

<body>

<h1>REFRAME Studio</h1>

<div class="tagline">
Ultra-simple browser tools that solve small everyday friction problems.
</div>

<div id="tools"></div>

<div class="footer">

<strong>Built by REFRAME Studio</strong>

<br><br>

Open-source style tools. Simple. Private. Fast.

<br><br>

No login. No tracking. No personal data collected.  
Runs entirely in your browser.

</div>

<script>

const tools=[
{
file:"reframe-studio.html",
title:"REFRAME Studio",
desc:"Turn harsh comments into useful feedback."
},
{
file:"thread-navigator.html",
title:"Thread Navigator",
desc:"Never lose track of your AI conversations."
},
{
file:"next-step-finder.html",
title:"Next Step Finder",
desc:"Turn vague goals into one concrete next step."
},
{
file:"idea-to-post-angles.html",
title:"Idea → Post Angles",
desc:"Turn a small idea into possible post angles."
}
]

const container=document.getElementById("tools")

tools.forEach(t=>{

const a=document.createElement("a")

a.className="tool"

a.href=t.file

a.innerHTML=`
<h2>${t.title}</h2>
<p>${t.desc}</p>
`

container.appendChild(a)

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragment Router</title>
<style>
:root{
  --bg:#0b0f18;
  --panel:#151b2b;
  --panel-2:#1b2236;
  --line:#2a3246;
  --text:#f6f8fb;
  --muted:#9aa4b2;
  --accent:#8a68ff;
  --accent-2:#6b4ef2;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  background:
    radial-gradient(circle at top left, rgba(124,92,255,0.14), transparent 28%),
    radial-gradient(circle at top right, rgba(34,199,232,0.09), transparent 26%),
    linear-gradient(180deg, #090d15 0%, #0b0f18 100%);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  line-height:1.6;
}

a{
  color:inherit;
  text-decoration:none;
}

button{
  font:inherit;
}

.page{
  min-height:100vh;
  padding:20px 16px 48px;
}

.container{
  max-width:900px;
  margin:0 auto;
}

.back{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:18px;
  color:#8fb0ff;
  font-size:0.95rem;
}

h1{
  font-size:clamp(2rem, 6vw, 3.2rem);
  margin:0 0 10px;
  letter-spacing:-0.04em;
}

.subtitle{
  color:var(--muted);
  margin:0 0 24px;
  font-size:1rem;
}

.fragment{
  background:var(--panel);
  padding:16px;
  border-radius:18px;
  margin-bottom:24px;
  border:1px solid var(--line);
  font-size:1rem;
}

.tools{
  display:grid;
  gap:12px;
}

.tool{
  background:var(--panel-2);
  padding:14px;
  border-radius:14px;
  cursor:pointer;
  border:1px solid var(--line);
  transition:transform 0.15s ease,border-color 0.18s ease,background 0.18s ease;
}

.tool:hover{
  background:#242c44;
  border-color:#4b5872;
  transform:translateY(-1px);
}

.tool-title{
  font-weight:700;
  margin-bottom:4px;
  font-size:1rem;
}

.tool-note{
  font-size:0.9rem;
  color:var(--muted);
}

.status{
  margin-top:18px;
  color:var(--muted);
  font-size:0.92rem;
}

.empty{
  background:rgba(255,255,255,0.03);
  border:1px dashed var(--line);
  border-radius:14px;
  padding:16px;
  color:var(--muted);
}

.footer{
  margin-top:28px;
  text-align:center;
  color:var(--muted);
  font-size:0.88rem;
}
</style>
</head>
<body>
<main class="page">
  <div class="container">

    <a class="back" href="./index.html">← Back to REFRAME Studio</a>

    <h1>Fragment Router</h1>
    <p class="subtitle">Choose the next mutation for this fragment.</p>

    <div id="fragmentBox" class="fragment">Loading

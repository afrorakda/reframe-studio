<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation Router</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#ffffff;
color:#111;
line-height:1.5;
}

.container{
max-width:720px;
margin:0 auto;
padding:24px;
}

.back{
font-size:14px;
margin-bottom:16px;
display:inline-block;
color:#666;
text-decoration:none;
}

h1{
font-size:32px;
margin:0 0 8px 0;
}

.desc{
color:#666;
margin-bottom:20px;
}

textarea{
width:100%;
height:120px;
padding:12px;
font-size:16px;
border:1px solid #ddd;
border-radius:8px;
box-sizing:border-box;
}

.buttons{
margin-top:12px;
}

button{
padding:12px 16px;
font-size:15px;
border-radius:8px;
border:none;
cursor:pointer;
margin-right:8px;
margin-top:8px;
}

.primary{
background:#111;
color:#fff;
}

.secondary{
background:#eee;
color:#111;
}

.result{
margin-top:28px;
}

.card{
border:1px solid #eee;
border-radius:10px;
padding:16px;
margin-bottom:12px;
}

.card-title{
font-weight:600;
margin-bottom:6px;
}

.open{
display:inline-block;
margin-top:6px;
font-size:14px;
}

.footer{
margin-top:40px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="./index.html">← Back to REFRAME Studio</a>

<h1>Mutation Router</h1>

<div class="desc">
Drop a thought fragment. Discover possible next mutations.
</div>

<textarea id="input" placeholder="Example:
People say my ideas are too abstract
AI tools feel repetitive
Content creation feels exhausting"></textarea>

<div class="buttons">
<button class="primary" onclick="runRouter()">Find next mutations</button>
<button class="secondary" onclick="example()">Try example</button>
<button class="secondary" onclick="clearInput()">Clear</button>
</div>

<div class="result" id="result"></div>

<div class="footer">
No login. No tracking. Runs entirely in your browser.
</div>

</div>

<script src="./fragment.js"></script>
<script src="./router.js"></script>

<script>

function detectSourceType(text){

const t = text.toLowerCase();

if(t.includes("people say") || t.includes("critic")) return "criticism";
if(t.includes("feel") || t.includes("tired") || t.includes("exhaust")) return "emotion";
if(t.includes("can't") || t.includes("cannot") || t.includes("stuck")) return "problem";
if(t.includes("confused") || t.includes("why")) return "confusion";
if(t.includes("failed") || t.includes("didn't work")) return "failure";

return "idea";

}

function runRouter(){

const text = document.getElementById("input").value.trim();

if(!text){
alert("Enter a thought fragment.");
return;
}

const sourceType = detectSourceType(text);

const fragment = createFragment(text, sourceType);

const tools = getNextTools(fragment);

renderTools(tools);

}

function renderTools(tools){

const box = document.getElementById("result");

box.innerHTML = "";

if(!tools || tools.length === 0){

box.innerHTML = "<p>No mutations found.</p>";
return;

}

tools.forEach(tool=>{

const div = document.createElement("div");

div.className="card";

div.innerHTML=`
<div class="card-title">${tool.title}</div>
<div>Next mutation tool</div>
<a class="open" href="./${tool.file}">Open tool →</a>
`;

box.appendChild(div);

});

}

function example(){

document.getElementById("input").value =
"People say my ideas are too abstract";

}

function clearInput(){

document.getElementById("input").value="";
document.getElementById("result").innerHTML="";

}

</script>

</body>
</html>

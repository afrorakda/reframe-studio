<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation Router</title>

<style>
body{
font-family: system-ui, -apple-system, Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
color:#111;
}

.container{
max-width:700px;
margin:auto;
}

a{
text-decoration:none;
color:#555;
font-size:14px;
}

h1{
margin-top:10px;
}

p{
color:#666;
}

textarea{
width:100%;
height:120px;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
margin-top:10px;
}

button{
margin-top:10px;
padding:12px 16px;
font-size:15px;
border:none;
border-radius:8px;
background:#111;
color:white;
cursor:pointer;
}

button.secondary{
background:#ddd;
color:#111;
margin-left:6px;
}

.result{
margin-top:30px;
}

.card{
background:white;
border-radius:10px;
padding:16px;
margin-bottom:12px;
border:1px solid #eee;
}

.card h3{
margin:0 0 6px 0;
}

.card a{
display:inline-block;
margin-top:8px;
font-weight:bold;
}

.footer{
margin-top:40px;
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back to REFRAME Studio</a>

<h1>Mutation Router</h1>

<p>Drop a thought fragment. Discover possible next mutations.</p>

<textarea id="fragmentInput" placeholder="Example:
People say my ideas are too abstract.
AI tools feel repetitive.
Content creation feels exhausting."></textarea>

<br>

<button onclick="runRouter()">Find next mutations</button>
<button class="secondary" onclick="tryExample()">Try example</button>
<button class="secondary" onclick="clearInput()">Clear</button>

<div class="result" id="result"></div>

<div class="footer">
No login. No tracking. Runs entirely in your browser.
</div>

</div>

<script src="fragment.js"></script>
<script src="router.js"></script>

<script>

function detectSourceType(text){
const t = text.toLowerCase();

if(t.includes("people say") || t.includes("critic")) return "criticism";
if(t.includes("feel") || t.includes("exhaust") || t.includes("tired")) return "emotion";
if(t.includes("can't") || t.includes("cannot") || t.includes("stuck")) return "problem";
if(t.includes("confused") || t.includes("why")) return "confusion";
if(t.includes("failed") || t.includes("didn't work")) return "failure";

return "idea";
}

function runRouter(){

const text = document.getElementById("fragmentInput").value.trim();

if(!text){
alert("Enter a thought fragment first.");
return;
}

const type = detectSourceType(text);

const fragment = createFragment(text, type);

const tools = getNextTools(fragment);

showResults(tools);

}

function showResults(tools){

const result = document.getElementById("result");

result.innerHTML = "";

if(!tools || tools.length === 0){
result.innerHTML = "<p>No mutations found.</p>";
return;
}

tools.forEach(tool=>{

const card = document.createElement("div");
card.className="card";

card.innerHTML = `
<h3>${tool.title}</h3>
<p>Next mutation tool.</p>
<a href="./${tool.file}">Open tool →</a>
`;

result.appendChild(card);

});

}

function tryExample(){
document.getElementById("fragmentInput").value = "People say my ideas are too abstract.";
}

function clearInput(){
document.getElementById("fragmentInput").value = "";
document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutation Router</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.45;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 18px 40px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: #666666;
      text-decoration: none;
      font-size: 15px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 48px;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 0 0 26px;
      font-size: 18px;
      color: #666666;
      max-width: 640px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      border: 2px solid #e6e6e6;
      border-radius: 18px;
      padding: 20px;
      font: inherit;
      font-size: 18px;
      color: #111111;
      background: #ffffff;
      resize: vertical;
      outline: none;
    }

    textarea:focus {
      border-color: #111111;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 16px 22px;
      font: inherit;
      font-size: 17px;
      cursor: pointer;
      min-height: 56px;
    }

    .primary {
      background: #111111;
      color: #ffffff;
    }

    .secondary {
      background: #efefef;
      color: #111111;
    }

    .result {
      margin-top: 28px;
    }

    .result-title {
      font-size: 15px;
      color: #666666;
      margin-bottom: 14px;
    }

    .result-box {
      border: 2px solid #efefef;
      border-radius: 20px;
      padding: 18px;
      background: #ffffff;
      min-height: 120px;
    }

    .card {
      border: 2px solid #efefef;
      border-radius: 20px;
      padding: 18px;
      background: #ffffff;
      margin-bottom: 12px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.2;
    }

    .card p {
      margin: 0 0 12px;
      font-size: 16px;
      color: #444444;
    }

    .open-link {
      display: inline-block;
      color: #111111;
      font-weight: 600;
      text-decoration: none;
    }

    .footer {
      margin-top: 34px;
      font-size: 14px;
      color: #777777;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 34px;
      }

      .desc {
        font-size: 16px;
      }

      textarea {
        font-size: 16px;
        min-height: 140px;
      }

      button {
        font-size: 16px;
        padding: 15px 18px;
        min-height: 52px;
      }

      .card h3 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back-link" href="./index.html">← Back to REFRAME Studio</a>

    <h1>Mutation Router</h1>
    <p class="desc">Drop a thought fragment. Discover possible next mutations.</p>

    <textarea id="input" placeholder="Example:
People say my ideas are too abstract
AI tools feel repetitive
Content creation feels exhausting"></textarea>

    <div class="buttons">
      <button class="primary" id="runBtn">Generate</button>
      <button class="secondary" id="exampleBtn">Try example</button>
      <button class="secondary" id="clearBtn">Clear</button>
      <button class="secondary" id="copyBtn">Copy result</button>
    </div>

    <div class="result">
      <div class="result-title">Result</div>
      <div class="result-box" id="result">Your result will appear here.</div>
    </div>

    <div class="footer">No login. No tracking. Runs entirely in your browser.</div>
  </div>

  <script src="./fragment.js"></script>
  <script src="./router.js"></script>

  <script>
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function buildCopyText(fragment, tools) {
      var lines = [];
      lines.push("Detected type: " + fragment.sourceType);
      lines.push("");
      lines.push("Next mutations:");

      tools.forEach(function (tool, index) {
        lines.push((index + 1) + ". " + tool.title + " — " + tool.file);
      });

      return lines.join("\n");
    }

    function renderResult(fragment, tools) {
      var resultBox = document.getElementById("result");
      var html = "";

      html += '<div class="result-title">Detected type: <strong>' + escapeHtml(fragment.sourceType) + '</strong></div>';

      tools.forEach(function (tool) {
        html += `
          <div class="card">
            <h3>${escapeHtml(tool.title)}</h3>
            <p>${escapeHtml(tool.note)}</p>
            <a class="open-link" href="./${escapeHtml(tool.file)}">Open tool →</a>
          </div>
        `;
      });

      resultBox.innerHTML = html;
      resultBox.dataset.copyText = buildCopyText(fragment, tools);
    }

    function runTool() {
      var input = document.getElementById("input").value.trim();

      if (!input) {
        alert("Enter something first.");
        return;
      }

      var sourceType = detectSourceType(input);
      var fragment = createFragment(input, sourceType, "drift");
      var tools = getNextTools(fragment);

      renderResult(fragment, tools);
    }

    function tryExample() {
      document.getElementById("input").value = "People say my ideas are too abstract";
      document.getElementById("result").textContent = "Your result will appear here.";
      delete document.getElementById("result").dataset.copyText;
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("result").textContent = "Your result will appear here.";
      delete document.getElementById("result").dataset.copyText;
    }

    async function copyResult() {
      var result = document.getElementById("result");
      var text = result.dataset.copyText || "";

      if (!text) {
        alert("Nothing to copy yet.");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert("Copied.");
      } catch (error) {
        alert("Copy failed.");
      }
    }

    document.getElementById("runBtn").addEventListener("click", runTool);
    document.getElementById("exampleBtn").addEventListener("click", tryExample);
    document.getElementById("clearBtn").addEventListener("click", clearAll);
    document.getElementById("copyBtn").addEventListener("click", copyResult);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mutation Router | REFRAME Studio</title>
  <meta name="description" content="A quiet entrance into deeper mutation paths. No login. No tracking. Runs entirely in your browser." />
  <style>
    :root{
      --bg-top:#081331;
      --bg-mid:#0b1f4f;
      --bg-bottom:#07112b;
      --card-outer:rgba(35,55,122,0.55);
      --card-outer-line:rgba(122,145,255,0.18);
      --card-inner:rgba(4,11,40,0.92);
      --card-inner-line:rgba(103,129,255,0.14);
      --text:#f4f7ff;
      --muted:#b7c2f0;
      --soft:#96a5df;
      --pill-bg:rgba(74,62,163,0.24);
      --pill-line:rgba(124,108,255,0.45);
      --tile-bg:rgba(255,255,255,0.04);
      --tile-line:rgba(255,255,255,0.08);
      --tile-hover:rgba(255,255,255,0.06);
      --radius-outer:26px;
      --radius-inner:20px;
      --shadow:0 20px 56px rgba(0,0,0,0.28);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(53,94,255,0.24), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      width:min(760px, calc(100% - 22px));
      margin:0 auto;
      padding:16px 0 24px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:15px;
      line-height:1.4;
      color:var(--muted);
      margin-bottom:12px;
      opacity:0.95;
    }

    .shell{
      background:var(--card-outer);
      border:1px solid var(--card-outer-line);
      border-radius:var(--radius-outer);
      padding:16px 10px 10px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      background:var(--pill-bg);
      border:1px solid var(--pill-line);
      color:#e8ddff;
      font-size:14px;
      letter-spacing:-0.01em;
      margin-bottom:12px;
    }

    .hero-title{
      margin:0 0 4px 0;
      font-size:34px;
      line-height:1;
      letter-spacing:-0.05em;
      font-weight:800;
    }

    .hero-desc{
      margin:0 0 12px 0;
      font-size:15px;
      line-height:1.45;
      color:var(--muted);
    }

    .inner{
      background:var(--card-inner);
      border:1px solid var(--card-inner-line);
      border-radius:var(--radius-inner);
      padding:14px 10px 12px;
    }

    .quiet-note{
      margin:0 0 12px 0;
      font-size:12px;
      line-height:1.45;
      color:var(--soft);
      opacity:0.8;
    }

    .route-list{
      display:grid;
      gap:8px;
    }

    .route{
      display:block;
      background:var(--tile-bg);
      border:1px solid var(--tile-line);
      border-radius:16px;
      padding:12px;
      transition:background .18s ease, transform .05s ease, border-color .18s ease;
    }

    .route:hover{
      background:var(--tile-hover);
    }

    .route:active{
      transform:translateY(1px);
    }

    .route-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .route-title{
      margin:0;
      font-size:22px;
      line-height:1.05;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .route-mark{
      font-size:14px;
      line-height:1.4;
      color:var(--soft);
      opacity:0.75;
      white-space:nowrap;
      padding-top:2px;
    }

    .route-desc{
      margin:8px 0 0 0;
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
    }

    .subrow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
      min-height:18px;
    }

    .status{
      font-size:12px;
      line-height:1.4;
      color:var(--soft);
    }

    .deeper-link{
      font-size:12px;
      line-height:1.4;
      color:var(--soft);
      opacity:0.78;
      white-space:nowrap;
    }

    .footer{
      margin-top:12px;
      font-size:12px;
      line-height:1.45;
      color:var(--soft);
      text-align:center;
    }

    @media (min-width: 761px){
      .page{
        width:min(860px, calc(100% - 40px));
        padding:28px 0 40px;
      }

      .back-link{
        font-size:22px;
        margin-bottom:24px;
      }

      .shell{
        padding:34px;
        border-radius:38px;
      }

      .pill{
        min-height:62px;
        padding:0 28px;
        font-size:22px;
        margin-bottom:28px;
      }

      .hero-title{
        font-size:74px;
        margin-bottom:12px;
      }

      .hero-desc{
        font-size:22px;
        margin-bottom:24px;
      }

      .inner{
        padding:24px;
        border-radius:30px;
      }

      .quiet-note{
        font-size:15px;
        margin-bottom:16px;
      }

      .route-list{
        gap:14px;
      }

      .route{
        border-radius:22px;
        padding:18px;
      }

      .route-title{
        font-size:44px;
      }

      .route-mark{
        font-size:17px;
      }

      .route-desc{
        margin-top:10px;
        font-size:18px;
      }

      .subrow{
        margin-top:16px;
      }

      .status,
      .deeper-link{
        font-size:17px;
      }

      .footer{
        font-size:15px;
        margin-top:18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="./reframe.html">← Back to Reframe</a>

    <section class="shell">
      <div class="pill">Choose a mutation</div>

      <h1 class="hero-title">Mutation Router</h1>
      <p class="hero-desc">Pick a direction.</p>

      <section class="inner">
        <p class="quiet-note">One move is enough.</p>

        <div class="route-list">
          <a class="route" href="./reframe.html">
            <div class="route-top">
              <h2 class="route-title">Reframe</h2>
              <div class="route-mark">→</div>
            </div>
            <p class="route-desc">Turn criticism into a new frame.</p>
          </a>

          <a class="route" href="./hook-generator.html">
            <div class="route-top">
              <h2 class="route-title">Hook</h2>
              <div class="route-mark">→</div>
            </div>
            <p class="route-desc">Pull one sharp opening out of the thought.</p>
          </a>
        </div>

        <div class="subrow">
          <div class="status">No map</div>
          <a class="deeper-link" href="./fragment-router.html">go deeper</a>
        </div>
      </section>
    </section>

    <div class="footer">No login · No tracking · Runs entirely in browser</div>
  </main>
</body>
</html>

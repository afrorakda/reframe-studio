<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hook → Thread | REFRAME Studio</title>
  <meta name="description" content="Turn one hook into a short thread. No login. No tracking. Runs entirely in your browser." />
  <style>
    :root{
      --bg-top:#081331;
      --bg-mid:#0b1f4f;
      --bg-bottom:#07112b;
      --card-outer:rgba(35, 55, 122, 0.55);
      --card-outer-line:rgba(122, 145, 255, 0.18);
      --card-inner:rgba(4, 11, 40, 0.92);
      --card-inner-line:rgba(103, 129, 255, 0.14);
      --text:#f4f7ff;
      --muted:#b7c2f0;
      --soft:#96a5df;
      --pill-bg:rgba(74, 62, 163, 0.24);
      --pill-line:rgba(124, 108, 255, 0.45);
      --textarea-bg:#02081f;
      --textarea-line:rgba(93, 116, 236, 0.2);
      --button:#ffffff;
      --button-text:#081331;
      --button-soft:rgba(255,255,255,0.08);
      --button-soft-text:#eef2ff;
      --button-line:rgba(255,255,255,0.1);
      --result-card:rgba(255,255,255,0.04);
      --result-line:rgba(255,255,255,0.08);
      --deep-bg:rgba(255,255,255,0.03);
      --deep-line:rgba(255,255,255,0.08);
      --deep-hover:rgba(255,255,255,0.06);
      --radius-outer:28px;
      --radius-inner:22px;
      --radius-textarea:18px;
      --shadow:0 20px 56px rgba(0,0,0,0.28);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(53,94,255,0.24), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      width:min(780px, calc(100% - 24px));
      margin:0 auto;
      padding:18px 0 28px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:16px;
      line-height:1.4;
      color:var(--muted);
      margin-bottom:14px;
      opacity:0.95;
    }

    .shell{
      background:var(--card-outer);
      border:1px solid var(--card-outer-line);
      border-radius:var(--radius-outer);
      padding:18px 12px 12px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:42px;
      padding:0 16px;
      border-radius:999px;
      background:var(--pill-bg);
      border:1px solid var(--pill-line);
      color:#e8ddff;
      font-size:15px;
      letter-spacing:-0.01em;
      margin-bottom:14px;
    }

    .hero-title{
      margin:0 0 6px 0;
      font-size:38px;
      line-height:1;
      letter-spacing:-0.05em;
      font-weight:800;
    }

    .hero-desc{
      margin:0 0 14px 0;
      font-size:16px;
      line-height:1.5;
      color:var(--muted);
    }

    .inner{
      background:var(--card-inner);
      border:1px solid var(--card-inner-line);
      border-radius:var(--radius-inner);
      padding:18px 12px 14px;
    }

    .mutation-title{
      margin:0 0 8px 0;
      font-size:30px;
      line-height:1.04;
      letter-spacing:-0.04em;
      font-weight:800;
    }

    .mutation-desc{
      margin:0 0 14px 0;
      font-size:15px;
      line-height:1.5;
      color:var(--muted);
    }

    .label{
      display:block;
      margin:0 0 8px 0;
      font-size:15px;
      line-height:1.4;
      font-weight:700;
      color:var(--text);
    }

    textarea{
      width:100%;
      min-height:128px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:var(--radius-textarea);
      background:var(--textarea-bg);
      border:1px solid var(--textarea-line);
      color:var(--text);
      padding:16px;
      font:inherit;
      font-size:16px;
      line-height:1.55;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    textarea::placeholder{
      color:var(--soft);
    }

    .button-stack{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:12px;
    }

    button{
      appearance:none;
      border:none;
      width:100%;
      min-height:52px;
      border-radius:16px;
      font:inherit;
      font-size:16px;
      font-weight:800;
      letter-spacing:-0.02em;
      cursor:pointer;
      transition:transform .05s ease, opacity .18s ease, background .18s ease;
    }

    button:active{
      transform:translateY(1px);
    }

    .btn-primary{
      background:var(--button);
      color:var(--button-text);
    }

    .btn-soft{
      background:var(--button-soft);
      color:var(--button-soft-text);
      border:1px solid var(--button-line);
    }

    .status{
      margin-top:12px;
      font-size:13px;
      line-height:1.5;
      color:var(--soft);
    }

    .result{
      margin-top:14px;
      display:none;
      gap:8px;
      flex-direction:column;
    }

    .result-card{
      background:var(--result-card);
      border:1px solid var(--result-line);
      border-radius:16px;
      padding:12px;
    }

    .result-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
      flex-wrap:wrap;
    }

    .result-label{
      font-size:11px;
      line-height:1.4;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#d7deff;
      font-weight:800;
    }

    .result-count{
      font-size:11px;
      color:var(--soft);
    }

    .result-text{
      margin:0;
      font-size:15px;
      line-height:1.55;
      color:var(--text);
      white-space:pre-wrap;
    }

    .meta{
      margin-top:2px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:16px;
      padding:12px;
      display:grid;
      gap:10px;
    }

    .meta-item{
      display:grid;
      gap:3px;
    }

    .meta-label{
      font-size:11px;
      line-height:1.4;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:var(--soft);
      font-weight:800;
    }

    .meta-value{
      font-size:14px;
      line-height:1.5;
      color:var(--text);
    }

    .deep-wrap{
      margin-top:10px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,0.08);
    }

    .deep-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      width:100%;
      padding:12px 14px;
      border-radius:16px;
      background:var(--deep-bg);
      border:1px solid var(--deep-line);
      color:var(--text);
      font-size:15px;
      font-weight:700;
      line-height:1.4;
      transition:background .18s ease, border-color .18s ease, transform .05s ease;
    }

    .deep-link:active{
      transform:translateY(1px);
    }

    .deep-link:hover{
      background:var(--deep-hover);
    }

    .deep-link span:last-child{
      color:var(--muted);
      font-weight:600;
    }

    .footer{
      margin-top:14px;
      font-size:13px;
      line-height:1.5;
      color:var(--soft);
      text-align:center;
    }

    @media (min-width: 761px){
      .page{
        width:min(860px, calc(100% - 40px));
        padding:28px 0 40px;
      }

      .back-link{
        font-size:22px;
        margin-bottom:24px;
      }

      .shell{
        padding:34px;
        border-radius:38px;
      }

      .pill{
        min-height:62px;
        padding:0 28px;
        font-size:22px;
        margin-bottom:28px;
      }

      .hero-title{
        font-size:74px;
        margin-bottom:12px;
      }

      .hero-desc{
        font-size:22px;
        margin-bottom:24px;
      }

      .inner{
        padding:30px;
        border-radius:30px;
      }

      .mutation-title{
        font-size:56px;
        margin-bottom:12px;
      }

      .mutation-desc{
        font-size:22px;
        margin-bottom:22px;
      }

      .label{
        font-size:21px;
        margin-bottom:14px;
      }

      textarea{
        min-height:210px;
        padding:24px 26px;
        font-size:24px;
        border-radius:24px;
      }

      .button-stack{
        gap:14px;
        margin-top:20px;
      }

      button{
        min-height:74px;
        border-radius:22px;
        font-size:24px;
      }

      .status{
        margin-top:16px;
        font-size:17px;
      }

      .result{
        margin-top:24px;
        gap:12px;
      }

      .result-card{
        border-radius:22px;
        padding:18px;
      }

      .result-label,
      .result-count{
        font-size:14px;
      }

      .result-text{
        font-size:20px;
      }

      .meta{
        border-radius:22px;
        padding:18px;
      }

      .meta-label{
        font-size:13px;
      }

      .meta-value{
        font-size:18px;
      }

      .deep-wrap{
        margin-top:16px;
        padding-top:14px;
      }

      .deep-link{
        padding:16px 18px;
        border-radius:20px;
        font-size:18px;
      }

      .footer{
        font-size:15px;
        margin-top:18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="./hook-generator.html">← Back to Hook Generator</a>

    <section class="shell">
      <div class="pill">One mutation</div>

      <h1 class="hero-title">Thread</h1>
      <p class="hero-desc">Expand one hook into a short thread.</p>

      <section class="inner">
        <h2 class="mutation-title">Hook → Thread</h2>
        <p class="mutation-desc">Turn one hook into five short posts.</p>

        <label class="label" for="hookInput">Paste one hook</label>

        <textarea id="hookInput" placeholder="Example:

People think hate comments are just noise.

But sometimes they reveal what people are secretly reacting to."></textarea>

        <div class="button-stack">
          <button class="btn-primary" id="generateBtn">Generate thread</button>
          <button class="btn-soft" id="exampleBtn">Try example</button>
          <button class="btn-soft" id="copyBtn">Copy result</button>
          <button class="btn-soft" id="clearBtn">Clear</button>
        </div>

        <div class="status" id="statusText">Waiting for input</div>

        <div class="result" id="resultWrap">
          <div id="threadList"></div>

          <div class="meta">
            <div class="meta-item">
              <div class="meta-label">Thread title</div>
              <div class="meta-value" id="threadTitle"></div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Core tension</div>
              <div class="meta-value" id="threadTension"></div>
            </div>
          </div>

          <div class="deep-wrap">
            <a class="deep-link" href="./mutation-router.html">
              <span>Go Deeper</span>
              <span>→</span>
            </a>
          </div>
        </div>
      </section>
    </section>

    <div class="footer">No login · No tracking · Runs entirely in browser</div>
  </main>

  <script>
    const hookInput = document.getElementById('hookInput');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');

    const statusText = document.getElementById('statusText');
    const resultWrap = document.getElementById('resultWrap');
    const threadList = document.getElementById('threadList');
    const threadTitle = document.getElementById('threadTitle');
    const threadTension = document.getElementById('threadTension');

    const exampleHook = `People think hate comments are just noise.

But sometimes they reveal what people are secretly reacting to.`;

    function cleanText(text) {
      return text.replace(/\r/g, '').trim();
    }

    function splitParts(text) {
      return cleanText(text)
        .split(/\n+/)
        .map(part => part.trim())
        .filter(Boolean);
    }

    function shorten(text, maxLength) {
      const value = text.replace(/\s+/g, ' ').trim();
      if (value.length <= maxLength) return value;
      return value.slice(0, maxLength).trim().replace(/[.,;:!?-]*$/, '') + '…';
    }

    function stripLead(text) {
      return text.replace(/^(but|and|so|because|then|also|still|yet)\s+/i, '').trim();
    }

    function lowerFirst(text) {
      if (!text) return '';
      return text.charAt(0).toLowerCase() + text.slice(1);
    }

    function makeTitle(text) {
      const value = shorten(stripLead(text), 52).replace(/[.?!]+$/, '');
      return value || 'Untitled thread';
    }

    function buildThread(input) {
      const parts = splitParts(input);
      const first = parts[0] || cleanText(input);
      const second = parts[1] || '';
      const third = parts[2] || '';

      const core = stripLead(first);
      const twist = second ? stripLead(second) : 'That reaction often reveals something useful underneath.';
      const expansion = third || 'The strongest ideas are sometimes hidden inside what people resist.';
      const tension = second
        ? shorten(second, 88)
        : 'What looks negative on the surface may contain hidden creative direction.';

      const post1 = shorten(core, 220);
      const post2 = shorten(`Most people stop at the surface. ${twist}`, 220);
      const post3 = shorten(`That matters because ${lowerFirst(expansion)}`, 220);
      const post4 = shorten(`Ask not "How do I avoid this?" but "What is this reaction pointing at?"`, 220);
      const post5 = shorten(`Sometimes the next strong content idea is hidden inside the response you wanted to ignore.`, 220);

      return {
        title: makeTitle(core),
        tension: tension,
        posts: [post1, post2, post3, post4, post5]
      };
    }

    function renderThread(data) {
      threadList.innerHTML = '';

      data.posts.forEach((post, index) => {
        const card = document.createElement('div');
        card.className = 'result-card';

        const top = document.createElement('div');
        top.className = 'result-top';

        const label = document.createElement('div');
        label.className = 'result-label';
        label.textContent = `Post ${index + 1}`;

        const count = document.createElement('div');
        count.className = 'result-count';
        count.textContent = `${post.length} chars`;

        const text = document.createElement('p');
        text.className = 'result-text';
        text.textContent = post;

        top.appendChild(label);
        top.appendChild(count);
        card.appendChild(top);
        card.appendChild(text);
        threadList.appendChild(card);
      });

      threadTitle.textContent = data.title;
      threadTension.textContent = data.tension;
      resultWrap.style.display = 'flex';
      statusText.textContent = 'Thread generated';
    }

    function generateThread() {
      const value = hookInput.value.trim();

      if (!value) {
        resultWrap.style.display = 'none';
        statusText.textContent = 'Paste one hook first';
        return;
      }

      const result = buildThread(value);
      renderThread(result);
    }

    function clearAll() {
      hookInput.value = '';
      threadList.innerHTML = '';
      threadTitle.textContent = '';
      threadTension.textContent = '';
      resultWrap.style.display = 'none';
      statusText.textContent = 'Waiting for input';
    }

    function getResultText() {
      const posts = Array.from(document.querySelectorAll('.result-text'));
      if (!posts.length) return '';
      return posts.map((item, index) => `${index + 1}. ${item.textContent}`).join('\n\n');
    }

    async function copyResult() {
      const text = getResultText();

      if (!text) {
        statusText.textContent = 'Nothing to copy';
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        statusText.textContent = 'Copied';
      } catch (error) {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        statusText.textContent = 'Copied';
      }
    }

    generateBtn.addEventListener('click', generateThread);
    exampleBtn.addEventListener('click', () => {
      hookInput.value = exampleHook;
      generateThread();
    });
    copyBtn.addEventListener('click', copyResult);
    clearBtn.addEventListener('click', clearAll);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mutation Map</title>

<style>

body{
background:#0f1115;
color:#e8ecf1;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#171a21;
border:1px solid #2a3140;
border-radius:16px;
padding:16px;
margin-bottom:16px;
}

textarea{
width:100%;
min-height:120px;
background:#0f1115;
border:1px solid #333c4d;
border-radius:12px;
color:#e8ecf1;
padding:12px;
font-size:15px;
}

button{
background:#2b6cff;
border:none;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.map{
margin-top:20px;
display:flex;
flex-direction:column;
align-items:center;
gap:20px;
}

.node{
background:#0f1115;
border:1px solid #33405a;
border-radius:12px;
padding:12px 16px;
text-align:center;
}

.row{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.pill{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#222938;
border:1px solid #33405a;
margin:4px;
}

</style>
</head>

<body>

<div class="container">

<h1>Mutation Map</h1>

<div class="card">

<textarea id="input">I feel stuck and cannot decide what to build next.</textarea>

<button onclick="runMap()">Generate map</button>

</div>

<div class="card">

<h3>Thought Map</h3>

<div id="map"></div>

</div>

</div>

<script>

const mutations=[
"Next Step Finder",
"Problem → Options",
"Constraint → Action",
"Problem → Root Causes",
"Thought Map",
"Tool Factory"
];

function randomMutation(){
return mutations[Math.floor(Math.random()*mutations.length)];
}

function runMap(){

let input=document.getElementById("input").value;

let a=randomMutation();
let b=randomMutation();
let c=randomMutation();

let html="";

html+="<div class='map'>";

html+="<div class='node'><strong>Input</strong><br>"+input+"</div>";

html+="<div class='row'>";
html+="<div class='node'>"+a+"</div>";
html+="<div class='node'>"+b+"</div>";
html+="<div class='node'>"+c+"</div>";
html+="</div>";

html+="</div>";

document.getElementById("map").innerHTML=html;

}

</script>

</body>
</html>

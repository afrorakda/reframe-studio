<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thought Collision</title>
  <style>
    :root{
      --bg:#070b16;
      --panel:#12182a;
      --panel-2:#182038;
      --card:#0d1324;
      --line:#283252;
      --line-soft:#34406a;
      --text:#eef2ff;
      --muted:#9aa6d1;
      --soft:#cfd7f6;
      --button:#243055;
      --shadow:0 14px 40px rgba(0,0,0,.34);
      --radius-xl:28px;
      --radius-lg:22px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at top, #10183a 0%, #070b16 48%, #060913 100%);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      min-height:100%;
      line-height:1.45;
    }

    body{padding:28px 14px 44px}
    .wrap{max-width:820px;margin:0 auto}

    .back{
      display:inline-block;
      margin-bottom:18px;
      color:var(--muted);
      text-decoration:none;
      font-size:13px;
      padding:4px 2px;
      border-bottom:1px solid transparent;
      transition:color .15s ease, border-color .15s ease;
    }

    .back:hover{
      color:var(--text);
      border-color:rgba(162,176,230,.34);
    }

    .shell{
      background:linear-gradient(180deg, rgba(28,36,62,.96), rgba(17,24,42,.98));
      border:1px solid rgba(95,112,172,.28);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow);
      padding:26px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      min-height:44px;
      padding:0 18px;
      border-radius:999px;
      border:1px solid rgba(114,103,255,.5);
      color:#c7c8ff;
      font-size:15px;
      margin-bottom:18px;
      background:rgba(96,89,235,.08);
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
      color:var(--text);
    }

    .sub{
      margin:14px 0 0;
      font-size:15px;
      color:var(--muted);
    }

    .input-grid{
      margin-top:26px;
      display:grid;
      gap:16px;
    }

    .input-box,.result-box{
      background:rgba(7,12,26,.72);
      border:1px solid var(--line);
      border-radius:var(--radius-lg);
      padding:18px;
    }

    .input-label{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:12px;
    }

    textarea{
      width:100%;
      min-height:160px;
      border:none;
      outline:none;
      resize:vertical;
      background:transparent;
      color:var(--text);
      font-size:17px;
      line-height:1.55;
      font-family:inherit;
    }

    textarea::placeholder{color:var(--muted)}

    .actions{
      margin-top:18px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:16px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      border-radius:20px;
      min-height:76px;
      padding:18px 14px;
      background:linear-gradient(180deg, rgba(53,67,117,.88), rgba(40,52,91,.94));
      color:var(--text);
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      border:1px solid rgba(116,132,193,.22);
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .result-box{margin-top:26px;min-height:260px}
    .result-box.empty{display:flex;align-items:center}
    .empty-text{color:var(--muted);font-size:17px}
    .cards{display:grid;gap:16px}

    .card{
      background:rgba(18,26,48,.86);
      border:1px solid var(--line-soft);
      border-radius:22px;
      padding:18px;
    }

    .card-label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      margin-bottom:12px;
    }

    .block{margin-top:14px;padding-top:14px;border-top:1px solid rgba(110,126,182,.18)}
    .block:first-of-type{margin-top:0;padding-top:0;border-top:none}
    .block-title{
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.16em;
      margin-bottom:8px;
    }

    .block-text{
      color:var(--soft);
      font-size:17px;
      line-height:1.62;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .tiny{margin-top:16px;color:#808bb0;font-size:12px}

    @media (max-width:640px){
      body{padding:18px 10px 32px}
      .shell{padding:18px;border-radius:24px}
      .title{font-size:28px}
      .input-box,.result-box{padding:16px;border-radius:20px}
      textarea{min-height:140px;font-size:16px}
      button{min-height:66px;font-size:16px;border-radius:18px}
      .card{border-radius:20px;padding:16px}
      .block-text{font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./unknown-mutation.html">← Back</a>

    <main class="shell">
      <div class="eyebrow">Thinking OS layer</div>
      <h1 class="title">Thought Collision</h1>
      <p class="sub">Drop two thoughts.</p>

      <section class="input-grid">
        <div class="input-box">
          <div class="input-label">Thought A</div>
          <textarea id="inputA" placeholder="People say my ideas are too abstract."></textarea>
        </div>

        <div class="input-box">
          <div class="input-label">Thought B</div>
          <textarea id="inputB" placeholder="People want simple answers."></textarea>
        </div>
      </section>

      <section class="actions">
        <button id="generateBtn">Collide</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </section>

      <section id="result" class="result-box empty">
        <div class="empty-text">3 collisions appear here.</div>
      </section>

      <div class="tiny">No login. No tracking. Browser only.</div>
    </main>
  </div>

  <script>
    const inputA = document.getElementById('inputA');
    const inputB = document.getElementById('inputB');
    const result = document.getElementById('result');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');

    const exampleA = 'People say my ideas are too abstract.';
    const exampleB = 'People want simple answers.';

    const frictionPool = [
      'open thought vs safe shape',
      'slow meaning vs fast comfort',
      'new idea vs old frame',
      'rough signal vs clean answer',
      'change vs control',
      'drift vs certainty',
      'alive thought vs easy read',
      'risk vs safety',
      'forming shape vs finished shape',
      'friction vs habit'
    ];

    const anglePool = [
      'People do not always reject the idea. Sometimes they reject the feeling around it.',
      'A rough thought can feel harder than it is.',
      'The reply often protects the old shape first.',
      'Simple answers calm people. Open thoughts move them.',
      'Pushback often begins where control starts to slip.',
      'Some reactions are really about keeping the world easy to hold.',
      'The faster the room wants certainty, the harder a live idea lands.',
      'A thought can be good and still arrive at the wrong speed.',
      'What looks weak at first may just be unfinished.',
      'People often ask for clarity when they really want safety.'
    ];

    const seedPool = [
      'Write about why people trust simple shapes first.',
      'Write about how pushback often protects comfort.',
      'Write about what happens when a thought arrives before the room is ready.',
      'Write about easy answers vs alive ideas.',
      'Write about why rough thoughts get mistaken for weak ones.',
      'Write about how control changes the way people read.',
      'Write about fear wearing a quick voice.',
      'Write about the moment a new idea stops feeling safe.',
      'Write about how fast judgment hides slow fear.',
      'Write about why simple takes win first.'
    ];

    const linePool = [
      'Maybe the friction is the point.',
      'That tension may be the angle.',
      'Stay with the clash a little longer.',
      'This may be where the thought opens.',
      'That may be the live wire.',
      'Let that be the first line.',
      'This may be the deeper path.',
      'Write from that collision.',
      'That is where the energy is.',
      'That may be the real signal.'
    ];

    function clean(t){
      return String(t || '').trim();
    }

    function buildCards(a, b){
      const cards = [];
      for(let i = 0; i < 3; i++){
        cards.push({
          friction: frictionPool[Math.floor(Math.random() * frictionPool.length)],
          angle: anglePool[Math.floor(Math.random() * anglePool.length)],
          seed: seedPool[Math.floor(Math.random() * seedPool.length)],
          line: linePool[Math.floor(Math.random() * linePool.length)],
          a,
          b
        });
      }
      return cards;
    }

    function renderCards(cards){
      result.className = 'result-box';
      result.innerHTML = '';

      const wrap = document.createElement('div');
      wrap.className = 'cards';

      cards.forEach((cardData, i) => {
        const card = document.createElement('article');
        card.className = 'card';

        const label = document.createElement('div');
        label.className = 'card-label';
        label.textContent = `${i + 1}. collision`;

        const sections = [
          ['Thought A', cardData.a],
          ['Thought B', cardData.b],
          ['Friction', cardData.friction],
          ['Angle', cardData.angle],
          ['Content seed', cardData.seed],
          ['Line', cardData.line]
        ];

        card.appendChild(label);

        sections.forEach(([title, text]) => {
          const block = document.createElement('div');
          block.className = 'block';

          const blockTitle = document.createElement('div');
          blockTitle.className = 'block-title';
          blockTitle.textContent = title;

          const blockText = document.createElement('div');
          blockText.className = 'block-text';
          blockText.textContent = text;

          block.appendChild(blockTitle);
          block.appendChild(blockText);
          card.appendChild(block);
        });

        wrap.appendChild(card);
      });

      result.appendChild(wrap);
    }

    function setEmpty(){
      result.className = 'result-box empty';
      result.innerHTML = '<div class="empty-text">3 collisions appear here.</div>';
    }

    function generate(){
      const a = clean(inputA.value);
      const b = clean(inputB.value);
      if (!a || !b) return;
      renderCards(buildCards(a, b));
    }

    function clearAll(){
      inputA.value = '';
      inputB.value = '';
      setEmpty();
    }

    function copyResult(){
      const cards = Array.from(result.querySelectorAll('.card'));
      if (!cards.length) return;

      const text = cards.map(card => {
        const pieces = [];
        const label = card.querySelector('.card-label')?.textContent || '';
        pieces.push(label);

        const blocks = Array.from(card.querySelectorAll('.block'));
        blocks.forEach(block => {
          const title = block.querySelector('.block-title')?.textContent || '';
          const body = block.querySelector('.block-text')?.textContent || '';
          pieces.push(`${title}\n${body}`);
        });

        return pieces.join('\n\n');
      }).join('\n\n--------------------\n\n');

      navigator.clipboard.writeText(text).then(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copied';
        setTimeout(() => copyBtn.textContent = old, 1200);
      }).catch(() => {
        const old = copyBtn.textContent;
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => copyBtn.textContent = old, 1200);
      });
    }

    generateBtn.addEventListener('click', generate);
    exampleBtn.addEventListener('click', () => {
      inputA.value = exampleA;
      inputB.value = exampleB;
    });
    clearBtn.addEventListener('click', clearAll);
    copyBtn.addEventListener('click', copyResult);

    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) inputA.value = q;

    setEmpty();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction → Opposite</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
padding:24px;
background:#0f1117;
color:#e6edf3;
}

.container{
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:12px;
background:#161b22;
border:1px solid #333;
border-radius:8px;
color:white;
}

button{
margin-top:12px;
padding:10px 16px;
background:#238636;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
white-space:pre-wrap;
background:#161b22;
padding:16px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back</a>

<h1>Reaction → Opposite</h1>

<p>Turn reactions into opposite content ideas.</p>

<textarea id="input" placeholder="Example: People react to my posts but I don't know how to turn that into ideas"></textarea>

<br>

<button onclick="generate()">Generate</button>

<button onclick="example()">Try example</button>

<button onclick="clearAll()">Clear</button>

<div id="result" class="result"></div>

</div>

<script>

function example(){
document.getElementById("input").value =
"People react to my posts but I don't know how to turn those reactions into new ideas.";
}

function clearAll(){
document.getElementById("input").value="";
document.getElementById("result").textContent="";
}

function generate(){

const text=document.getElementById("input").value;

const output=
"Opposite Angles\n\n"+
"• Ignore reactions completely\n"+
"• Why reactions can be misleading\n"+
"• The danger of listening to your audience\n"+
"• Building ideas without feedback\n\n"+
"Next Mutations\n"+
"Hook\nThread\nMetaphor\nDebate";

document.getElementById("result").textContent=output;

}

</script>

</body>
</html>

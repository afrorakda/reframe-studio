<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Universe v2</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
color:white;
background:
radial-gradient(circle at 20% 10%,#1b2a5a,transparent 40%),
radial-gradient(circle at 80% 20%,#3c1b5a,transparent 40%),
linear-gradient(180deg,#020617,#020617);
min-height:100vh;
}

.wrap{
max-width:1000px;
margin:auto;
padding:20px;
}

h1{
font-size:34px;
margin:0 0 10px;
}

.desc{
color:#a5b4fc;
margin-bottom:20px;
}

.back{
color:#9ca3af;
text-decoration:none;
display:inline-block;
margin-bottom:20px;
}

.panel{
border:1px solid rgba(120,140,255,.2);
border-radius:24px;
padding:20px;
background:rgba(10,15,40,.6);
}

.space{
position:relative;
height:600px;
border-radius:20px;
border:1px solid rgba(120,140,255,.15);
overflow:hidden;
background:
radial-gradient(circle at center,#0f1c44,#020617);
}

.star{
position:absolute;
transform:translate(-50%,-50%);
cursor:pointer;
text-align:center;
}

.starCore{
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
background:linear-gradient(180deg,#3b82f6,#1e40af);
box-shadow:0 0 20px rgba(80,120,255,.6);
}

.star.middle .starCore{
background:linear-gradient(180deg,#a855f7,#581c87);
}

.star.deep .starCore{
background:linear-gradient(180deg,#22d3ee,#155e75);
}

.starLabel{
font-size:12px;
color:#c7d2fe;
margin-top:6px;
max-width:120px;
}

svg{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<div class="wrap">

<a class="back" href="./index.html">← Back to REFRAME Studio</a>

<h1>Thought Universe v2</h1>

<div class="desc">
Stars with the same thought type connect into a network.
</div>

<div class="panel">

<div class="space" id="space">

<svg id="lines"></svg>

</div>

</div>

</div>

<script>

const STORAGE_KEYS = [
"reframe-thinking-ocean-v2",
"reframe-ocean"
]

function loadFragments(){

for(let key of STORAGE_KEYS){

try{

let raw = localStorage.getItem(key)

if(!raw) continue

let data = JSON.parse(raw)

if(Array.isArray(data)) return data

}catch(e){}

}

return[]

}

function shortText(t){

if(!t) return ""

return t.length>24 ? t.slice(0,24)+"…" : t

}

function positionStars(stars){

let positions=[
[20,20],
[50,15],
[80,20],
[25,40],
[60,35],
[15,65],
[50,55],
[85,60],
[35,80],
[70,85]
]

return stars.map((s,i)=>{

let p=positions[i%positions.length]

return{
...s,
x:p[0],
y:p[1]
}

})

}

function drawLines(stars){

let svg=document.getElementById("lines")

svg.innerHTML=""

for(let i=0;i<stars.length;i++){

for(let j=i+1;j<stars.length;j++){

if(stars[i].type===stars[j].type){

let line=document.createElementNS("http://www.w3.org/2000/svg","line")

line.setAttribute("x1",stars[i].x+"%")
line.setAttribute("y1",stars[i].y+"%")
line.setAttribute("x2",stars[j].x+"%")
line.setAttribute("y2",stars[j].y+"%")

line.setAttribute("stroke","#647cff")
line.setAttribute("stroke-width","1")
line.setAttribute("opacity",".6")

svg.appendChild(line)

}

}

}

}

function render(){

let data=loadFragments()

let space=document.getElementById("space")

if(!data.length){

space.innerHTML="<div style='padding:20px;color:#94a3b8'>Add fragments in Thinking Ocean first.</div>"

return

}

let stars=positionStars(data)

drawLines(stars)

for(let s of stars){

let el=document.createElement("a")

el.className="star "+(s.depth||"surface")

el.style.left=s.x+"%"

el.style.top=s.y+"%"

el.href="./thought-galaxy-router.html?fragment="+encodeURIComponent(s.text||"")

el.innerHTML=`
<div class="starCore">✦</div>
<div class="starLabel">${shortText(s.text)}</div>
`

space.appendChild(el)

}

}

render()

</script>

</body>
</html>

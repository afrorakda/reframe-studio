<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Fermentation</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:#0b0f1a;
color:#e6edf3;
margin:0;
padding:20px;
}

.container{
max-width:720px;
margin:auto;
}

a{
color:#8ab4ff;
text-decoration:none;
font-size:14px;
}

h1{
margin-top:12px;
font-size:30px;
}

p{
opacity:0.8;
}

textarea{
width:100%;
padding:14px;
margin-top:14px;
border-radius:10px;
border:1px solid #30363d;
background:#111827;
color:white;
font-size:16px;
resize:vertical;
min-height:90px;
}

button{
margin-top:14px;
padding:12px 16px;
border-radius:10px;
border:none;
background:#7c3aed;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#6d28d9;
}

.result{
margin-top:20px;
padding:18px;
border-radius:12px;
background:#111827;
border:1px solid #30363d;
min-height:70px;
white-space:pre-line;
}

footer{
margin-top:40px;
font-size:13px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back to REFRAME Studio</a>

<h1>Idea Fermentation</h1>

<p>Drop a fragment and let it ferment into something unexpected.</p>

<textarea id="fragment" placeholder="Example: People say my ideas are too abstract."></textarea>

<button onclick="ferment()">Ferment idea</button>

<div class="result" id="result"></div>

<footer>
No login · No tracking · Runs entirely in your browser
</footer>

</div>

<script>

function ferment(){

let text=document.getElementById("fragment").value.trim()

if(!text){
document.getElementById("result").innerText="Drop a fragment first."
return
}

const fermentations=[

"Maybe this fragment hides a tool idea waiting to be built.",

"What if this is not a problem but a signal pointing somewhere new?",

"Turn this fragment into a metaphor and see what appears.",

"What would the opposite version of this thought look like?",

"If this thought aged for a year, what new meaning might it gain?",

"What kind of person would love this idea instead of resisting it?",

"Maybe this fragment belongs to a bigger pattern you haven't seen yet.",

"What small experiment could grow from this fragment?"

]

let f=fermentations[Math.floor(Math.random()*fermentations.length)]

document.getElementById("result").innerText=
"Fragment:\n"+text+"\n\nFermented idea:\n"+f

}

</script>

</body>
</html>

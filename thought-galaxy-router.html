<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thought Galaxy Router</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #040816;
      --panel: #0b1430;
      --panel-2: #101d42;
      --line: rgba(115, 151, 255, 0.22);
      --line-strong: rgba(140, 164, 255, 0.42);
      --text: #f4f7ff;
      --muted: #9eb0d8;
      --blue: #66b6ff;
      --purple: #9a72ff;
      --cyan: #70f0ff;
      --glow-blue: 0 0 0 1px rgba(102, 182, 255, 0.18), 0 0 28px rgba(70, 120, 255, 0.18);
      --glow-purple: 0 0 0 1px rgba(154, 114, 255, 0.18), 0 0 28px rgba(154, 114, 255, 0.18);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 20% 0%, rgba(102, 182, 255, 0.16), transparent 30%),
        radial-gradient(circle at 85% 10%, rgba(154, 114, 255, 0.16), transparent 30%),
        radial-gradient(circle at 50% 120%, rgba(60, 120, 255, 0.12), transparent 40%),
        linear-gradient(180deg, #050914 0%, #071024 45%, #040816 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.45;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.65;
      background-image:
        radial-gradient(2px 2px at 8% 14%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 18% 32%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(2px 2px at 28% 76%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 37% 18%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(2px 2px at 45% 56%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(1.5px 1.5px at 54% 8%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(2px 2px at 63% 34%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 72% 68%, rgba(255,255,255,0.55), transparent 60%),
        radial-gradient(2px 2px at 84% 22%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 92% 82%, rgba(255,255,255,0.55), transparent 60%);
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 18px 16px 42px;
    }

    .shell {
      border: 1px solid var(--line);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(8, 15, 36, 0.92), rgba(7, 13, 28, 0.9));
      box-shadow:
        0 0 0 1px rgba(120, 145, 255, 0.08),
        0 24px 60px rgba(0, 0, 0, 0.35),
        inset 0 1px 0 rgba(255, 255, 255, 0.03);
      overflow: hidden;
    }

    .top-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(135, 159, 255, 0.45), transparent);
    }

    .inner {
      padding: 22px 16px 26px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .desc {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 17px;
    }

    .panel {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(14, 27, 67, 0.88), rgba(10, 20, 49, 0.92));
      box-shadow: var(--glow-blue);
      overflow: hidden;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      padding: 22px 20px;
      border: 0;
      outline: none;
      resize: vertical;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 18px;
      line-height: 1.55;
    }

    textarea::placeholder {
      color: rgba(210, 221, 255, 0.5);
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      width: 100%;
      min-height: 58px;
      padding: 16px 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(12, 27, 67, 0.96), rgba(10, 23, 56, 0.96));
      color: var(--text);
      font: inherit;
      font-size: 17px;
      cursor: pointer;
      box-shadow: var(--glow-blue);
    }

    button.primary {
      border-color: rgba(153, 123, 255, 0.42);
      background: linear-gradient(180deg, rgba(70, 46, 139, 0.96), rgba(41, 31, 96, 0.96));
      box-shadow: var(--glow-purple);
    }

    .status {
      margin-top: 18px;
      color: var(--blue);
      font-size: 15px;
      min-height: 22px;
    }

    .galaxy {
      margin-top: 18px;
      padding: 18px 14px 22px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(9, 18, 45, 0.88), rgba(6, 13, 31, 0.94));
      box-shadow: var(--glow-blue);
    }

    .galaxy-head {
      margin-bottom: 14px;
    }

    .galaxy-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .galaxy-sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 16px;
    }

    .space {
      position: relative;
      min-height: 720px;
      overflow: hidden;
      border: 1px solid rgba(135, 159, 255, 0.14);
      border-radius: 26px;
      background:
        radial-gradient(circle at 50% 18%, rgba(70, 120, 255, 0.18), transparent 24%),
        radial-gradient(circle at 50% 58%, rgba(154, 114, 255, 0.10), transparent 30%),
        linear-gradient(180deg, rgba(2, 8, 24, 0.4), rgba(3, 8, 20, 0.55));
    }

    .space::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.7;
      background-image:
        radial-gradient(2px 2px at 10% 14%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 22% 27%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(2px 2px at 35% 10%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(1.5px 1.5px at 50% 18%, rgba(255,255,255,0.65), transparent 60%),
        radial-gradient(2px 2px at 68% 12%, rgba(255,255,255,0.75), transparent 60%),
        radial-gradient(1.5px 1.5px at 82% 23%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(2px 2px at 91% 15%, rgba(255,255,255,0.8), transparent 60%),
        radial-gradient(1.5px 1.5px at 16% 72%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(2px 2px at 34% 84%, rgba(255,255,255,0.7), transparent 60%),
        radial-gradient(1.5px 1.5px at 58% 78%, rgba(255,255,255,0.6), transparent 60%),
        radial-gradient(2px 2px at 77% 86%, rgba(255,255,255,0.75), transparent 60%);
    }

    .fragment-node {
      position: absolute;
      top: 48px;
      left: 50%;
      transform: translateX(-50%);
      width: min(82%, 420px);
      padding: 28px 22px;
      text-align: center;
      border-radius: 28px;
      border: 1px solid rgba(113, 149, 255, 0.42);
      background: linear-gradient(180deg, rgba(26, 45, 102, 0.96), rgba(18, 31, 72, 0.96));
      box-shadow: var(--glow-blue);
      z-index: 3;
    }

    .fragment-text {
      font-size: 20px;
      line-height: 1.4;
      font-weight: 600;
      word-break: break-word;
    }

    .route-labels {
      position: absolute;
      top: 228px;
      left: 50%;
      transform: translateX(-50%);
      width: min(92%, 720px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      z-index: 3;
    }

    .route-pill {
      text-align: center;
      padding: 12px 10px;
      border-radius: 999px;
      border: 1px solid rgba(113, 149, 255, 0.28);
      background: rgba(10, 20, 49, 0.82);
      color: var(--text);
      font-size: 17px;
      font-weight: 600;
      box-shadow: var(--glow-blue);
    }

    .tool-nodes {
      position: absolute;
      top: 320px;
      left: 50%;
      transform: translateX(-50%);
      width: min(96%, 760px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      z-index: 3;
    }

    .tool-node {
      position: relative;
      min-height: 290px;
      padding: 18px 16px 16px;
      border-radius: 24px;
      border: 1px solid rgba(146, 119, 255, 0.34);
      background: linear-gradient(180deg, rgba(42, 23, 79, 0.92), rgba(23, 20, 62, 0.94));
      box-shadow: var(--glow-purple);
    }

    .tool-node .mini {
      display: inline-block;
      margin-bottom: 12px;
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid rgba(146, 119, 255, 0.28);
      color: var(--muted);
      font-size: 13px;
      background: rgba(20, 14, 47, 0.7);
    }

    .tool-node h3 {
      margin: 0;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .tool-node p {
      margin: 12px 0 16px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      min-height: 90px;
    }

    .build-btn {
      display: block;
      width: 100%;
      padding: 14px 14px;
      border-radius: 18px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 16px;
      border: 1px solid rgba(113, 240, 255, 0.28);
      background: linear-gradient(180deg, rgba(37, 93, 108, 0.92), rgba(24, 62, 80, 0.96));
      box-shadow: 0 0 0 1px rgba(112, 240, 255, 0.12), 0 0 24px rgba(83, 202, 255, 0.12);
    }

    .lines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .space {
        min-height: auto;
        padding: 20px 14px 16px;
      }

      .fragment-node,
      .route-labels,
      .tool-nodes,
      .lines {
        position: static;
        transform: none;
        width: 100%;
      }

      .fragment-node {
        margin-bottom: 14px;
      }

      .route-labels {
        margin-bottom: 14px;
      }

      .tool-nodes {
        display: grid;
        grid-template-columns: 1fr;
      }

      .tool-node p {
        min-height: 0;
      }

      .lines {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .inner {
        padding: 18px 14px 22px;
      }

      h1 {
        font-size: 28px;
      }

      .desc {
        font-size: 16px;
      }

      textarea {
        min-height: 144px;
        font-size: 17px;
      }

      button {
        min-height: 54px;
        font-size: 16px;
      }

      .buttons {
        grid-template-columns: 1fr 1fr;
      }

      .fragment-text {
        font-size: 18px;
      }

      .route-pill {
        font-size: 15px;
      }

      .tool-node h3 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="shell">
      <div class="top-line"></div>
      <div class="inner">
        <a class="back-link" href="./index.html">← Back to REFRAME Studio</a>

        <h1>Thought Galaxy Router</h1>
        <p class="desc">Drop a thought fragment. Watch it branch into possible routes.</p>

        <div class="panel">
          <textarea id="input" placeholder="Example:
I feel stuck and cannot decide what to build next.
People say my ideas are too abstract.
AI tools feel repetitive."></textarea>
        </div>

        <div class="buttons">
          <button class="primary" id="runBtn">Generate galaxy</button>
          <button id="exampleBtn">Try example</button>
          <button id="clearBtn">Clear</button>
          <button id="copyBtn">Copy result</button>
        </div>

        <div class="status" id="status"></div>

        <div class="galaxy">
          <div class="galaxy-head">
            <div class="galaxy-title">Galaxy View</div>
            <div class="galaxy-sub">Purple stars build. Blue stars open.</div>
          </div>

          <div class="space" id="space">
            <div class="empty" id="emptyState" style="color: var(--muted); padding: 8px 4px;">Your galaxy will appear here.</div>
          </div>
        </div>

        <div class="footer">No login. No tracking. Runs entirely in your browser.</div>
      </div>
    </div>
  </div>

  <script src="./mutation-map.js"></script>
  <script src="./fragment.js"></script>
  <script src="./router.js"></script>

  <script>
    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getMapZone(toolId) {
      if (
        typeof window !== "undefined" &&
        window.REFRAME_MUTATION_MAP &&
        window.REFRAME_MUTATION_MAP.helpers &&
        window.REFRAME_MUTATION_MAP.helpers.getContactZoneById
      ) {
        return window.REFRAME_MUTATION_MAP.helpers.getContactZoneById(toolId);
      }
      return null;
    }

    function toTitleCase(text) {
      return String(text || "")
        .replace(/-/g, " ")
        .replace(/\b\w/g, function (m) {
          return m.toUpperCase();
        });
    }

    function summarizeTransformation(tool) {
      var zone = getMapZone(tool.id);
      if (zone && zone.mutationProfile && Array.isArray(zone.mutationProfile.primary) && zone.mutationProfile.primary.length) {
        return toTitleCase(zone.mutationProfile.primary[0]);
      }
      return "Mutation";
    }

    function buildCopyText(fragment, tools) {
      var lines = [];
      lines.push("Fragment: " + fragment.text);
      lines.push("Detected type: " + fragment.sourceType);
      lines.push("");

      tools.forEach(function (tool, index) {
        lines.push("Route " + (index + 1) + ": " + tool.title);
        lines.push("Transformation: " + summarizeTransformation(tool));
        lines.push("File: " + tool.file);
        lines.push("Note: " + tool.note);
        lines.push("");
      });

      return lines.join("\n").trim();
    }

    function renderGalaxy(fragment, tools) {
      var space = document.getElementById("space");
      var status = document.getElementById("status");

      if (!tools || !tools.length) {
        space.innerHTML = '<div class="empty" style="color: var(--muted); padding: 8px 4px;">No routes found.</div>';
        status.textContent = "No routes found.";
        delete space.dataset.copyText;
        return;
      }

      status.textContent = "Generated " + tools.length + " galaxy routes in Stable mode.";

      var html = '';

      html += '<svg class="lines" viewBox="0 0 760 720" preserveAspectRatio="none" aria-hidden="true">';
      html += '<line x1="380" y1="118" x2="128" y2="294" stroke="rgba(102,182,255,0.55)" stroke-width="3"/>';
      html += '<line x1="380" y1="118" x2="380" y2="294" stroke="rgba(102,182,255,0.55)" stroke-width="3"/>';
      html += '<line x1="380" y1="118" x2="632" y2="294" stroke="rgba(154,114,255,0.55)" stroke-width="3"/>';
      html += '</svg>';

      html += '<div class="fragment-node">';
      html += '<div class="fragment-text">' + escapeHtml(fragment.text) + '</div>';
      html += '</div>';

      html += '<div class="route-labels">';
      tools.forEach(function (tool, index) {
        html += '<div class="route-pill">Route ' + (index + 1) + '</div>';
      });
      while (tools.length < 3) {
        html += '<div class="route-pill">Route</div>';
        tools.push(null);
      }
      html += '</div>';

      html += '<div class="tool-nodes">';
      tools.slice(0, 3).forEach(function (tool, index) {
        if (!tool) {
          html += '<div class="tool-node"><div class="mini">Empty</div><h3>Open route</h3><p>Add another mutation later.</p></div>';
          return;
        }

        html += '<div class="tool-node">';
        html += '<div class="mini">' + escapeHtml(summarizeTransformation(tool)) + '</div>';
        html += '<h3>' + escapeHtml(tool.title) + '</h3>';
        html += '<p>' + escapeHtml(tool.note) + '</p>';
        html += '<a class="build-btn" href="./' + escapeHtml(tool.file) + '">Build route ' + (index + 1) + '</a>';
        html += '</div>';
      });
      html += '</div>';

      space.innerHTML = html;
      space.dataset.copyText = buildCopyText(fragment, tools.filter(Boolean));
    }

    function runTool() {
      var text = document.getElementById("input").value.trim();

      if (!text) {
        alert("Enter something first.");
        return;
      }

      var sourceType = window.detectSourceType(text);
      var fragment = window.createFragment(text, sourceType, "stable");
      var tools = window.getNextTools(fragment).slice(0, 3);

      renderGalaxy(fragment, tools);
    }

    function tryExample() {
      document.getElementById("input").value = "I feel stuck and cannot decide what to build next.";
      document.getElementById("space").innerHTML = '<div class="empty" style="color: var(--muted); padding: 8px 4px;">Your galaxy will appear here.</div>';
      document.getElementById("status").textContent = "";
      delete document.getElementById("space").dataset.copyText;
    }

    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("space").innerHTML = '<div class="empty" style="color: var(--muted); padding: 8px 4px;">Your galaxy will appear here.</div>';
      document.getElementById("status").textContent = "";
      delete document.getElementById("space").dataset.copyText;
    }

    async function copyResult() {
      var space = document.getElementById("space");
      var text = space.dataset.copyText || "";

      if (!text) {
        alert("Nothing to copy yet.");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert("Copied.");
      } catch (error) {
        alert("Copy failed.");
      }
    }

    document.getElementById("runBtn").addEventListener("click", runTool);
    document.getElementById("exampleBtn").addEventListener("click", tryExample);
    document.getElementById("clearBtn").addEventListener("click", clearAll);
    document.getElementById("copyBtn").addEventListener("click", copyResult);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stuck → Best Tool</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #14161f;
      --muted: #6c7280;
      --line: #e7e9f0;
      --soft: #f2f4f8;
      --accent: #1f6fff;
      --accent-pressed: #1659cf;
      --shadow: 0 10px 30px rgba(20, 22, 31, 0.06);
      --radius: 18px;
      --radius-sm: 14px;
      --tap: 48px;
      --max: 760px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      padding: max(16px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
    }

    .app {
      max-width: var(--max);
      margin: 0 auto;
    }

    .header {
      margin-bottom: 14px;
      padding: 4px 2px 10px;
    }

    .title {
      margin: 0 0 8px;
      font-size: clamp(28px, 6vw, 36px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 800;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .input-wrap {
      display: grid;
      gap: 12px;
    }

    .textarea {
      width: 100%;
      min-height: 172px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      line-height: 1.5;
      resize: vertical;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .textarea:focus {
      border-color: rgba(31, 111, 255, 0.5);
      box-shadow: 0 0 0 4px rgba(31, 111, 255, 0.10);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button, a.card-btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      min-height: var(--tap);
      padding: 12px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.08s ease, background 0.18s ease, opacity 0.18s ease, box-shadow 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active, a.card-btn:active {
      transform: scale(0.99);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      width: 100%;
      box-shadow: 0 8px 20px rgba(31, 111, 255, 0.22);
    }

    .primary:hover { background: var(--accent-pressed); }

    .secondary {
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--line);
      flex: 1 1 220px;
    }

    .secondary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 22px;
    }

    .lang-pill {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      white-space: nowrap;
    }

    .stage {
      margin: 18px 2px 10px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .results {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .empty {
      background: transparent;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 18px 16px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      text-align: center;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
    }

    .card-top {
      display: grid;
      gap: 6px;
    }

    .card-name {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 800;
    }

    .card-desc {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .card-btn {
      width: 100%;
      background: var(--soft);
      color: var(--text);
      border: 1px solid var(--line);
      font-weight: 800;
    }

    .footer-space {
      height: 12px;
    }

    @media (min-width: 640px) {
      .panel {
        padding: 16px;
      }

      .actions {
        grid-template-columns: 1fr auto;
        align-items: center;
      }

      .primary {
        width: auto;
        min-width: 180px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1 class="title">Stuck → Best Tool</h1>
      <p class="desc">Describe where you're stuck. This tool suggests which REFRAME Studio tools may help next.</p>
    </header>

    <section class="panel input-wrap">
      <div class="meta">
        <span class="lang-pill" id="langPill">Detected: English</span>
      </div>

      <textarea
        id="input"
        class="textarea"
        placeholder="I have an idea but I can't explain it clearly.
アイデアはあるけど、うまく説明できない。"
        aria-label="Describe where you are stuck"
      ></textarea>

      <div class="actions">
        <button id="suggestBtn" class="primary" type="button">Suggest tools</button>
        <div class="row">
          <button id="exampleBtn" class="secondary" type="button">Try example</button>
          <button id="anotherBtn" class="secondary" type="button" disabled>Try another suggestion</button>
        </div>
      </div>
    </section>

    <div class="stage" id="stageLabel"></div>
    <section class="results" id="results"></section>
    <div class="footer-space"></div>
  </main>

  <script>
    (function () {
      const inputEl = document.getElementById('input');
      const suggestBtn = document.getElementById('suggestBtn');
      const exampleBtn = document.getElementById('exampleBtn');
      const anotherBtn = document.getElementById('anotherBtn');
      const resultsEl = document.getElementById('results');
      const stageLabelEl = document.getElementById('stageLabel');
      const langPillEl = document.getElementById('langPill');

      const EXAMPLE_TEXT = "I have an idea but I can't explain it clearly.";

      const TOOL_DATA = {
        "Idea → 3 Angles": {
          file: "idea-to-post-angles.html",
          en: "Generate multiple post angles from one idea.",
          ja: "1つのアイデアから複数の切り口を出します。"
        },
        "Idea → Assumptions": {
          file: "idea-to-opposite.html",
          en: "Explore the opposite side or hidden tension in an idea.",
          ja: "アイデアの反対側や隠れた緊張感を探ります。"
        },
        "Idea → Test Plan": {
          file: "next-step-finder.html",
          en: "Turn uncertainty into a practical next step.",
          ja: "曖昧さを実行できる次の一歩に変えます。"
        },
        "Draft → Shorter": {
          file: "draft-fixer.html",
          en: "Clean up and improve a rough draft.",
          ja: "荒い下書きを整えて改善します。"
        },
        "Hook Generator": {
          file: "hook-generator.html",
          en: "Generate hook options from a topic.",
          ja: "テーマからフック案を出します。"
        },
        "Tweet Polisher": {
          file: "tweet-polisher.html",
          en: "Sharpen a rough social post.",
          ja: "ラフな投稿文を磨きます。"
        },
        "Confusion → Better Question": {
          file: "confusion-to-question.html",
          en: "Turn confusion into a clearer question.",
          ja: "混乱をより明確な問いに変えます。"
        },
        "Problem → Options": {
          file: "problem-to-options.html",
          en: "Turn a problem into possible options.",
          ja: "問題を選択肢に変えます。"
        },
        "Problem → Root Causes": {
          file: "thought-to-structure.html",
          en: "Organize messy thoughts around what may be causing the issue.",
          ja: "何が原因かもしれないかを整理します。"
        },
        "Problem → Constraints": {
          file: "thought-to-structure.html",
          en: "Clarify what is blocking progress right now.",
          ja: "今の前進を止めている要因を明確にします。"
        },
        "Emotion → Action": {
          file: "emotion-to-action.html",
          en: "Turn emotion into one useful action.",
          ja: "感情を1つの有効な行動に変えます。"
        },
        "Overthinking Breaker": {
          file: "overthinking-breaker.html",
          en: "Break a mental loop into movement.",
          ja: "思考のループを動きに変えます。"
        },
        "Next Step Finder": {
          file: "next-step-finder.html",
          en: "Find one practical next step.",
          ja: "現実的な次の一歩を見つけます。"
        }
      };

      const KEYWORDS = {
        idea: ["idea", "concept", "thought", "アイデア", "考え"],
        writing: ["draft", "post", "tweet", "write", "文章", "投稿", "書けない"],
        confusion: ["confused", "unclear", "stuck", "messy", "わからない", "混乱", "整理できない"],
        problem: ["problem", "issue", "challenge", "problematic", "問題", "課題", "うまくいかない"],
        emotion: ["overwhelmed", "anxious", "stress", "tired", "不安", "疲れた", "しんどい", "圧倒されている"]
      };

      const SUGGESTION_SETS = {
        idea: [
          ["Idea → 3 Angles", "Idea → Assumptions", "Idea → Test Plan"],
          ["Idea → Assumptions", "Idea → 3 Angles", "Confusion → Better Question"],
          ["Idea → Test Plan", "Problem → Options", "Idea → 3 Angles"]
        ],
        writing: [
          ["Draft → Shorter", "Hook Generator", "Tweet Polisher"],
          ["Hook Generator", "Draft → Shorter", "Next Step Finder"],
          ["Tweet Polisher", "Hook Generator", "Draft → Shorter"]
        ],
        confusion: [
          ["Confusion → Better Question", "Problem → Options", "Idea → 3 Angles"],
          ["Problem → Root Causes", "Confusion → Better Question", "Problem → Options"],
          ["Idea → 3 Angles", "Confusion → Better Question", "Next Step Finder"]
        ],
        problem: [
          ["Problem → Options", "Problem → Root Causes", "Problem → Constraints"],
          ["Problem → Constraints", "Problem → Options", "Next Step Finder"],
          ["Problem → Root Causes", "Problem → Constraints", "Problem → Options"]
        ],
        emotion: [
          ["Emotion → Action", "Overthinking Breaker", "Next Step Finder"],
          ["Overthinking Breaker", "Emotion → Action", "Problem → Constraints"],
          ["Next Step Finder", "Emotion → Action", "Confusion → Better Question"]
        ],
        fallback: [
          ["Confusion → Better Question", "Idea → 3 Angles", "Problem → Options"],
          ["Problem → Options", "Confusion → Better Question", "Next Step Finder"],
          ["Idea → 3 Angles", "Problem → Options", "Overthinking Breaker"]
        ]
      };

      const STAGE_LABELS = {
        idea: { en: "You may be stuck at: Clarity", ja: "詰まっている可能性のある場所: 整理" },
        writing: { en: "You may be stuck at: Expression", ja: "詰まっている可能性のある場所: 表現" },
        confusion: { en: "You may be stuck at: Clarity", ja: "詰まっている可能性のある場所: 整理" },
        problem: { en: "You may be stuck at: Structure", ja: "詰まっている可能性のある場所: 構造" },
        emotion: { en: "You may be stuck at: Momentum", ja: "詰まっている可能性のある場所: 一歩" },
        fallback: { en: "You may be stuck at: Next Step", ja: "詰まっている可能性のある場所: 次の一歩" }
      };

      let currentCategory = null;
      let currentIndex = 0;
      let hasResults = false;

      function detectLanguage(text) {
        return /[\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff]/.test(text) ? "ja" : "en";
      }

      function normalize(text) {
        return (text || "").toLowerCase();
      }

      function countMatches(text, words) {
        return words.reduce((count, word) => count + (text.includes(word.toLowerCase()) ? 1 : 0), 0);
      }

      function categorize(text) {
        const normalized = normalize(text);
        const scores = {
          idea: countMatches(normalized, KEYWORDS.idea),
          writing: countMatches(normalized, KEYWORDS.writing),
          confusion: countMatches(normalized, KEYWORDS.confusion),
          problem: countMatches(normalized, KEYWORDS.problem),
          emotion: countMatches(normalized, KEYWORDS.emotion)
        };

        let best = "fallback";
        let max = 0;

        const priority = ["emotion", "problem", "writing", "idea", "confusion"];
        priority.forEach((key) => {
          if (scores[key] > max) {
            best = key;
            max = scores[key];
          }
        });

        if (max === 0) return "fallback";
        return best;
      }

      function getEmptyState(lang) {
        return lang === "ja"
          ? "何が詰まっているかを書いてください。"
          : "Describe what feels stuck.";
      }

      function getOpenLabel(lang) {
        return lang === "ja" ? "Open tool" : "Open tool";
      }

      function updateDetectedLanguage() {
        const lang = detectLanguage(inputEl.value.trim());
        langPillEl.textContent = lang === "ja" ? "Detected: Japanese" : "Detected: English";
        return lang;
      }

      function renderEmpty() {
        const lang = updateDetectedLanguage();
        stageLabelEl.textContent = "";
        resultsEl.innerHTML = '<div class="empty">' + escapeHtml(getEmptyState(lang)) + '</div>';
        anotherBtn.disabled = true;
        hasResults = false;
      }

      function getSuggestionSet(category, index) {
        const sets = SUGGESTION_SETS[category] || SUGGESTION_SETS.fallback;
        return sets[index % sets.length];
      }

      function renderCards(category, lang, index) {
        const names = getSuggestionSet(category, index);
        const stage = STAGE_LABELS[category] || STAGE_LABELS.fallback;
        stageLabelEl.textContent = lang === "ja" ? stage.ja : stage.en;

        resultsEl.innerHTML = names.map((name) => {
          const tool = TOOL_DATA[name];
          const desc = lang === "ja" ? tool.ja : tool.en;
          const btn = getOpenLabel(lang);
          return `
            <article class="card">
              <div class="card-top">
                <h3 class="card-name">${escapeHtml(name)}</h3>
                <p class="card-desc">${escapeHtml(desc)}</p>
              </div>
              <a class="card-btn" href="${escapeAttribute(tool.file)}">${escapeHtml(btn)}</a>
            </article>
          `;
        }).join("");

        anotherBtn.disabled = false;
        hasResults = true;
      }

      function suggest(resetRotation) {
        const text = inputEl.value.trim();
        const lang = updateDetectedLanguage();

        if (!text) {
          renderEmpty();
          return;
        }

        const category = categorize(text);

        if (resetRotation || currentCategory !== category) {
          currentCategory = category;
          currentIndex = 0;
        }

        renderCards(currentCategory, lang, currentIndex);
      }

      function rotateSuggestion() {
        if (!hasResults || !currentCategory) return;
        const lang = updateDetectedLanguage();
        currentIndex += 1;
        renderCards(currentCategory, lang, currentIndex);
      }

      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, function (m) {
          return ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;"
          })[m];
        });
      }

      function escapeAttribute(str) {
        return String(str).replace(/"/g, "&quot;");
      }

      suggestBtn.addEventListener("click", function () {
        suggest(true);
      });

      exampleBtn.addEventListener("click", function () {
        inputEl.value = EXAMPLE_TEXT;
        updateDetectedLanguage();
        suggest(true);
        inputEl.focus();
        inputEl.setSelectionRange(inputEl.value.length, inputEl.value.length);
      });

      anotherBtn.addEventListener("click", function () {
        rotateSuggestion();
      });

      inputEl.addEventListener("input", function () {
        updateDetectedLanguage();
        if (!inputEl.value.trim()) {
          renderEmpty();
        }
      });

      renderEmpty();
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Stuck → Best Tool</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #dfe3ea;
      --border-strong: #cfd6e2;
      --accent: #111827;
      --accent-soft: #eef2ff;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
      --radius: 18px;
      --radius-sm: 14px;
      --tap: 48px;
      --max: 760px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100vh;
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }

    .app {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      padding: 8px 0 28px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: var(--tap);
      padding: 10px 0;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
    }

    .hero,
    .input-card,
    .result-card,
    .footer {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 22px 18px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 36px);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    .desc {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .input-card {
      padding: 16px;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border: 1px solid var(--border-strong);
      border-radius: 16px;
      padding: 16px;
      font: inherit;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    textarea:focus {
      border-color: #9aa4b2;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.06);
    }

    textarea::placeholder {
      color: #9aa4b2;
      white-space: pre-line;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .secondary-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border-strong);
      border-radius: 14px;
      min-height: 52px;
      padding: 14px 16px;
      font: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.04s ease, background 0.2s ease, border-color 0.2s ease, opacity 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    button:active {
      transform: translateY(1px);
    }

    .primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .secondary {
      background: #fff;
      color: var(--text);
    }

    .secondary:hover,
    .secondary:focus-visible {
      background: #fafafa;
    }

    .primary:hover,
    .primary:focus-visible {
      opacity: 0.95;
    }

    .result-card {
      padding: 16px;
      margin-bottom: 14px;
    }

    .result-head {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .stage {
      display: inline-flex;
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
    }

    .empty {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      padding: 8px 2px 4px;
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .tool-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfcff 100%);
      padding: 14px;
    }

    .tool-top {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tool-name {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.3;
      letter-spacing: -0.01em;
      margin: 0;
    }

    .tool-copy {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .tool-actions {
      display: flex;
      justify-content: flex-start;
    }

    .open-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid var(--border-strong);
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      background: #fff;
    }

    .open-link:hover,
    .open-link:focus-visible {
      background: #f8fafc;
    }

    .footer {
      padding: 14px 16px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .hero,
      .input-card,
      .result-card,
      .footer {
        border-radius: 16px;
      }

      .secondary-actions {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 168px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <a class="back-link" href="index.html" aria-label="Back to REFRAME Studio">← Back to REFRAME Studio</a>

    <section class="hero">
      <h1>Stuck → Best Tool</h1>
      <p class="desc">Describe where you're stuck. This tool suggests which REFRAME Studio tools may help next.</p>
    </section>

    <section class="input-card">
      <textarea
        id="input"
        placeholder="I have an idea but I can't explain it clearly.
アイデアはあるけど、うまく説明できない。"
        aria-label="Describe where you're stuck"
      ></textarea>

      <div class="actions">
        <button id="suggestBtn" class="primary" type="button">Suggest tools</button>
        <div class="secondary-actions">
          <button id="exampleBtn" class="secondary" type="button">Try example</button>
          <button id="anotherBtn" class="secondary" type="button">Try another suggestion</button>
        </div>
      </div>
    </section>

    <section class="result-card" aria-live="polite">
      <div class="result-head">
        <div id="stageLabel" class="stage">You may be stuck at: Clarity</div>
      </div>
      <div id="resultArea">
        <div class="empty">Describe what feels stuck.<br>何が詰まっているかを書いてください。</div>
      </div>
    </section>

    <footer class="footer">
      REFRAME Studio · Best next-tool suggestions based on what feels stuck
    </footer>
  </main>

  <script>
    (function () {
      const input = document.getElementById('input');
      const suggestBtn = document.getElementById('suggestBtn');
      const exampleBtn = document.getElementById('exampleBtn');
      const anotherBtn = document.getElementById('anotherBtn');
      const resultArea = document.getElementById('resultArea');
      const stageLabel = document.getElementById('stageLabel');

      const exampleText = "I have an idea but I can't explain it clearly.";

      const TOOL_LIBRARY = {
        idea3: {
          name: "Idea → 3 Angles",
          href: "idea-to-3-angles.html",
          desc: {
            en: "Generate 3 angles from one idea.",
            ja: "1つのアイデアから3つの切り口を出します。"
          }
        },
        ideaAssumptions: {
          name: "Idea → Assumptions",
          href: "idea-to-assumptions.html",
          desc: {
            en: "Reveal hidden assumptions behind an idea.",
            ja: "アイデアの裏にある前提を見つけます。"
          }
        },
        ideaTestPlan: {
          name: "Idea → Test Plan",
          href: "idea-to-test-plan.html",
          desc: {
            en: "Turn an idea into a simple test plan.",
            ja: "アイデアをシンプルな検証プランに変えます。"
          }
        },
        draftShorter: {
          name: "Draft → Shorter",
          href: "draft-to-shorter.html",
          desc: {
            en: "Turn a draft into a shorter version.",
            ja: "下書きを短く整理します。"
          }
        },
        hookGenerator: {
          name: "Hook Generator",
          href: "hook-generator.html",
          desc: {
            en: "Generate hook options from a topic.",
            ja: "テーマからフック案を作ります。"
          }
        },
        tweetPolisher: {
          name: "Tweet Polisher",
          href: "tweet-polisher.html",
          desc: {
            en: "Improve and sharpen a rough post.",
            ja: "粗い投稿文を磨いて伝わりやすくします。"
          }
        },
        confusionQuestion: {
          name: "Confusion → Better Question",
          href: "confusion-to-better-question.html",
          desc: {
            en: "Turn vague confusion into a clearer question.",
            ja: "あいまいな混乱を、より明確な問いに変えます。"
          }
        },
        problemOptions: {
          name: "Problem → Options",
          href: "problem-to-options.html",
          desc: {
            en: "Turn a problem into possible options.",
            ja: "問題を、取りうる選択肢に変えます。"
          }
        },
        problemRoot: {
          name: "Problem → Root Causes",
          href: "problem-to-root-cause.html",
          desc: {
            en: "Turn a problem into possible root causes.",
            ja: "問題の根本原因を探ります。"
          }
        },
        problemConstraints: {
          name: "Problem → Constraints",
          href: "problem-to-constraints.html",
          desc: {
            en: "Find the constraints behind a problem.",
            ja: "問題の背後にある制約を見つけます。"
          }
        },
        emotionAction: {
          name: "Emotion → Action",
          href: "emotion-to-action.html",
          desc: {
            en: "Turn emotion into a small next action.",
            ja: "感情を小さな次の行動に変えます。"
          }
        },
        overthinking: {
          name: "Overthinking Breaker",
          href: "overthinking-breaker.html",
          desc: {
            en: "Break mental loops into movement.",
            ja: "考えすぎのループを動きに変えます。"
          }
        },
        nextStep: {
          name: "Next Step Finder",
          href: "next-step-finder.html",
          desc: {
            en: "Turn uncertainty into one next step.",
            ja: "不確実さを1つの次の一歩に変えます。"
          }
        }
      };

      const GROUPS = {
        idea: {
          stage: { en: "Clarity", ja: "整理" },
          base: ["idea3", "ideaAssumptions", "ideaTestPlan"],
          rotations: [
            ["idea3", "ideaAssumptions", "ideaTestPlan"],
            ["ideaAssumptions", "ideaTestPlan", "idea3"],
            ["ideaTestPlan", "idea3", "ideaAssumptions"]
          ]
        },
        writing: {
          stage: { en: "Writing", ja: "言語化" },
          base: ["draftShorter", "hookGenerator", "tweetPolisher"],
          rotations: [
            ["draftShorter", "hookGenerator", "tweetPolisher"],
            ["hookGenerator", "tweetPolisher", "draftShorter"],
            ["tweetPolisher", "draftShorter", "hookGenerator"]
          ]
        },
        confusion: {
          stage: { en: "Clarity", ja: "整理" },
          base: ["confusionQuestion", "problemOptions", "idea3"],
          rotations: [
            ["confusionQuestion", "problemOptions", "idea3"],
            ["problemOptions", "idea3", "confusionQuestion"],
            ["idea3", "confusionQuestion", "problemOptions"]
          ]
        },
        problem: {
          stage: { en: "Problem Framing", ja: "課題整理" },
          base: ["problemOptions", "problemRoot", "problemConstraints"],
          rotations: [
            ["problemOptions", "problemRoot", "problemConstraints"],
            ["problemRoot", "problemConstraints", "problemOptions"],
            ["problemConstraints", "problemOptions", "problemRoot"]
          ]
        },
        emotion: {
          stage: { en: "Movement", ja: "前進" },
          base: ["emotionAction", "overthinking", "nextStep"],
          rotations: [
            ["emotionAction", "overthinking", "nextStep"],
            ["overthinking", "nextStep", "emotionAction"],
            ["nextStep", "emotionAction", "overthinking"]
          ]
        },
        fallback: {
          stage: { en: "Clarity", ja: "整理" },
          base: ["confusionQuestion", "idea3", "problemOptions"],
          rotations: [
            ["confusionQuestion", "idea3", "problemOptions"],
            ["idea3", "problemOptions", "confusionQuestion"],
            ["problemOptions", "confusionQuestion", "idea3"]
          ]
        }
      };

      const KEYWORDS = {
        idea: ["idea", "concept", "thought", "アイデア", "考え"],
        writing: ["draft", "post", "tweet", "write", "文章", "投稿", "書けない"],
        confusion: ["confused", "unclear", "stuck", "messy", "わからない", "混乱", "整理できない"],
        problem: ["problem", "issue", "challenge", "problematic", "問題", "課題", "うまくいかない"],
        emotion: ["overwhelmed", "anxious", "stress", "tired", "不安", "疲れた", "しんどい", "圧倒されている"]
      };

      let lastGroupKey = "fallback";
      let rotationIndex = 0;

      function detectLanguage(text) {
        const hasJapanese = /[ぁ-んァ-ン一-龯]/.test(text);
        return hasJapanese ? "ja" : "en";
      }

      function normalize(text) {
        return text.toLowerCase();
      }

      function detectGroup(text) {
        const source = normalize(text || "");
        const counts = {
          idea: 0,
          writing: 0,
          confusion: 0,
          problem: 0,
          emotion: 0
        };

        for (const groupKey in KEYWORDS) {
          KEYWORDS[groupKey].forEach((word) => {
            if (source.includes(word.toLowerCase())) counts[groupKey] += 1;
          });
        }

        let best = "fallback";
        let bestScore = 0;

        const priority = ["emotion", "problem", "writing", "idea", "confusion"];
        priority.forEach((groupKey) => {
          if (counts[groupKey] > bestScore) {
            bestScore = counts[groupKey];
            best = groupKey;
          }
        });

        if (bestScore === 0) return "fallback";
        return best;
      }

      function stageText(lang, groupKey) {
        const stage = GROUPS[groupKey].stage[lang];
        return lang === "ja"
          ? "詰まっている可能性のある場所: " + stage
          : "You may be stuck at: " + stage;
      }

      function renderCards(toolIds, lang) {
        const cards = toolIds.map((id) => {
          const tool = TOOL_LIBRARY[id];
          const openLabel = lang === "ja" ? "Open tool" : "Open tool";
          return `
            <article class="tool-card">
              <div class="tool-top">
                <h3 class="tool-name">${escapeHtml(tool.name)}</h3>
                <p class="tool-copy">${escapeHtml(tool.desc[lang])}</p>
              </div>
              <div class="tool-actions">
                <a class="open-link" href="${escapeAttribute(tool.href)}">${openLabel}</a>
              </div>
            </article>
          `;
        }).join("");

        resultArea.innerHTML = `<div class="cards">${cards}</div>`;
      }

      function suggest(useAlternate) {
        const text = input.value.trim();
        const lang = detectLanguage(text);
        const groupKey = detectGroup(text);

        if (!text) {
          stageLabel.textContent = lang === "ja"
            ? "詰まっている可能性のある場所: 整理"
            : "You may be stuck at: Clarity";
          resultArea.innerHTML = lang === "ja"
            ? `<div class="empty">何が詰まっているかを書いてください。</div>`
            : `<div class="empty">Describe what feels stuck.</div>`;
          lastGroupKey = "fallback";
          rotationIndex = 0;
          return;
        }

        if (useAlternate && groupKey === lastGroupKey) {
          rotationIndex = (rotationIndex + 1) % GROUPS[groupKey].rotations.length;
        } else {
          rotationIndex = 0;
        }

        lastGroupKey = groupKey;
        stageLabel.textContent = stageText(lang, groupKey);
        renderCards(GROUPS[groupKey].rotations[rotationIndex], lang);
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function escapeAttribute(str) {
        return String(str).replace(/"/g, "&quot;");
      }

      suggestBtn.addEventListener("click", function () {
        suggest(false);
      });

      exampleBtn.addEventListener("click", function () {
        input.value = exampleText;
        suggest(false);
      });

      anotherBtn.addEventListener("click", function () {
        if (!input.value.trim()) {
          input.value = exampleText;
          suggest(false);
          return;
        }
        suggest(true);
      });

      input.addEventListener("input", function () {
        const lang = detectLanguage(input.value.trim());
        if (!input.value.trim()) {
          stageLabel.textContent = "You may be stuck at: Clarity";
          resultArea.innerHTML = `<div class="empty">Describe what feels stuck.<br>何が詰まっているかを書いてください。</div>`;
          return;
        }

        const groupKey = detectGroup(input.value.trim());
        stageLabel.textContent = stageText(lang, groupKey);
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thinking Ocean</title>

<style>

body{
background:#030712;
color:white;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:120px;
background:#0b1220;
border:1px solid #1f2937;
border-radius:12px;
color:white;
padding:14px;
font-size:16px;
}

button{
margin-top:10px;
margin-right:8px;
padding:12px 16px;
border-radius:10px;
border:none;
cursor:pointer;
}

.primary{
background:#7c3aed;
color:white;
}

.card{
margin-top:20px;
padding:16px;
background:#0b1220;
border-radius:14px;
border:1px solid #1f2937;
}

.tag{
display:inline-block;
padding:4px 10px;
border-radius:999px;
background:#111827;
margin-right:6px;
font-size:12px;
}

.meta{
margin-top:10px;
font-size:14px;
color:#9ca3af;
}

.open{
margin-top:10px;
display:inline-block;
padding:10px 14px;
background:#14b8a6;
border-radius:10px;
color:white;
text-decoration:none;
}

.remove{
background:#1f2937;
color:white;
}

</style>

</head>

<body>

<div class="container">

<a href="./index.html">← Back to REFRAME Studio</a>

<h1>Thinking Ocean</h1>

<p>Drop fragments into your private thinking ocean.</p>

<textarea id="input" placeholder="Example:
People say my ideas are too abstract
I feel stuck and cannot decide what to build next"></textarea>

<br>

<button class="primary" onclick="addFragment()">Drop fragment</button>
<button onclick="example()">Try example</button>
<button onclick="clearInput()">Clear input</button>
<button onclick="clearOcean()">Clear ocean</button>

<h2 style="margin-top:40px">My Ocean</h2>

<div id="ocean"></div>

<p style="margin-top:40px;color:#6b7280">
No login. No tracking. Runs entirely in your browser.
</p>

</div>

<script src="./fragment.js"></script>
<script src="./router.js"></script>

<script>

/* =====================
STORAGE
===================== */

const STORAGE="reframe-ocean"


function loadOcean(){
return JSON.parse(localStorage.getItem(STORAGE)||"[]")
}

function saveOcean(data){
localStorage.setItem(STORAGE,JSON.stringify(data))
}


/* =====================
DRIFT ENGINE
===================== */

function driftFragments(list){

return list.map(f=>{

let score=f.score||0
let history=f.history?f.history.length:0
let drift=0

// gravity
if(score>=6)drift++

// friction
if(history<=1)drift--

// noise
if(Math.random()<0.25){
drift+=Math.random()<0.5?1:-1
}

let depth=f.depth||"surface"

if(drift>0){
if(depth==="surface")depth="middle"
else if(depth==="middle")depth="deep"
}

if(drift<0){
if(depth==="deep")depth="middle"
else if(depth==="middle")depth="surface"
}

f.depth=depth

return f
})

}


/* =====================
UTIL
===================== */

function score(text){
return Math.min(Math.ceil(text.length/30)+1,7)
}

function depthFromScore(s){
if(s>=6)return"deep"
if(s>=4)return"middle"
return"surface"
}


/* =====================
ADD
===================== */

function addFragment(){

let input=document.getElementById("input")
let text=input.value.trim()

if(!text)return alert("Enter something")

let type=detectSourceType?detectSourceType(text):"idea"

let fragment={
id:Date.now(),
text,
sourceType:type,
history:["Drop",type],
score:score(text),
depth:depthFromScore(score(text))
}

let ocean=loadOcean()

ocean.unshift(fragment)

saveOcean(ocean)

input.value=""

render()

}


/* =====================
REMOVE
===================== */

function removeFragment(id){

let ocean=loadOcean()

ocean=ocean.filter(f=>f.id!=id)

saveOcean(ocean)

render()

}


/* =====================
RENDER
===================== */

function render(){

let ocean=loadOcean()

ocean=driftFragments(ocean)

saveOcean(ocean)

let el=document.getElementById("ocean")

if(!ocean.length){

el.innerHTML="<p style='color:#6b7280'>Your fragments will appear here.</p>"
return
}

let html=""

ocean.forEach(f=>{

html+=`

<div class="card">

<div>

<span class="tag">${f.sourceType}</span>
<span class="tag">${f.depth}</span>

</div>

<h3>${f.text}</h3>

<div class="meta">
Mutation potential ${f.score}
</div>

<div class="meta">
History: ${f.history.join(" → ")}
</div>

<a class="open" href="./thought-galaxy-router.html?fragment=${encodeURIComponent(f.text)}">
Open galaxy
</a>

<button class="remove" onclick="removeFragment(${f.id})">
Remove
</button>

</div>

`

})

el.innerHTML=html

}


/* =====================
HELPERS
===================== */

function example(){
document.getElementById("input").value="People say my ideas are too abstract"
}

function clearInput(){
document.getElementById("input").value=""
}

function clearOcean(){
localStorage.removeItem(STORAGE)
render()
}


/* =====================
INIT
===================== */

render()

</script>

</body>
</html>

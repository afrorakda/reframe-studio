<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fragment Drop</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0b0f1a;
color:white;
margin:0;
padding:24px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
font-size:34px;
margin-bottom:8px;
}

p{
opacity:0.7;
margin-bottom:24px;
}

textarea{
width:100%;
height:140px;
background:#111827;
border:1px solid #2a3348;
border-radius:12px;
padding:16px;
color:white;
font-size:16px;
resize:none;
}

button{
margin-top:20px;
padding:14px 22px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:#4f46e5;
color:white;
}

button:hover{
opacity:0.9;
}

.result{
margin-top:30px;
background:#111827;
border-radius:12px;
padding:20px;
display:none;
}

.tool{
margin-top:10px;
padding:12px;
background:#0b1222;
border-radius:10px;
}

a{
color:#7aa2ff;
text-decoration:none;
}

.back{
margin-bottom:20px;
display:inline-block;
}

.footer{
margin-top:40px;
opacity:0.6;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<a class="back" href="./index.html">← Back to REFRAME Studio</a>

<h1>Fragment Drop</h1>

<p>Drop a thought fragment. We'll suggest the best mutation.</p>

<textarea id="fragment"
placeholder="Example: People say my ideas are too abstract."></textarea>

<br>

<button onclick="dropFragment()">Drop fragment</button>

<div id="result" class="result"></div>

<div class="footer">
No login · No tracking · Runs entirely in your browser
</div>

</div>

<script>

function dropFragment(){

const text=document.getElementById("fragment").value.trim()

if(!text){
alert("Drop a fragment first.")
return
}

const tools=[
{
name:"Fragment Collision",
file:"fragment-collision.html",
desc:"Combine two fragments into a strange mutation."
},
{
name:"Idea Fermentation",
file:"idea-fermentation.html",
desc:"Let the thought age and evolve."
},
{
name:"Thought → Structure",
file:"thought-to-structure.html",
desc:"Turn a vague thought into structure."
},
{
name:"Problem → Options",
file:"problem-to-options.html",
desc:"Generate possible directions."
},
{
name:"Next Step Finder",
file:"next-step-finder.html",
desc:"Turn the thought into action."
}
]

const tool=tools[Math.floor(Math.random()*tools.length)]

const result=document.getElementById("result")

result.style.display="block"

result.innerHTML=`

<b>Fragment:</b><br>
${text}

<br><br>

<b>Suggested mutation:</b>

<div class="tool">

<b>${tool.name}</b><br>
${tool.desc}<br><br>

<a href="./${tool.file}?fragment=${encodeURIComponent(text)}">
Open tool →
</a>

</div>

`

}

</script>

</body>
</html>

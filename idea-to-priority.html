<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Idea → Priority</title>
  <meta name="description" content="Turn many ideas into one priority." />
  <meta name="reframe:title" content="Idea → Priority" />
  <meta name="reframe:description" content="Turn many ideas into one priority." />
  <meta name="reframe:category" content="Idea" />
  <meta name="reframe:state" content="active" />
  <meta name="reframe:generator" content="tool-generator-v2" />
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --line:#dbe4f1;
      --text:#172033;
      --muted:#65748b;
      --primary:#121a2f;
      --primary-2:#0d1426;
      --soft:#eef3fb;
      --radius:22px;
      --shadow:0 16px 36px rgba(16,24,40,.08);
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:linear-gradient(180deg,#f6f9fd 0%,#edf3fa 100%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .app{
      min-height:100%;
      max-width:860px;
      margin:0 auto;
      padding:calc(14px + var(--safe-top)) 14px calc(18px + var(--safe-bottom));
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--text);
      text-decoration:none;
      font-size:14px;
      font-weight:600;
      margin-bottom:16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      padding:22px 16px;
    }

    h1{
      margin:0 0 10px;
      font-size:30px;
      line-height:1.05;
      letter-spacing:-0.03em;
    }

    .desc{
      margin:0 0 18px;
      color:var(--muted);
      font-size:15px;
      line-height:1.65;
    }

    .label{
      display:block;
      margin:0 0 10px;
      font-size:13px;
      font-weight:700;
      color:#334155;
    }

    textarea,
    .result{
      width:100%;
      border-radius:22px;
      border:1px solid var(--line);
      background:#fbfdff;
      color:var(--text);
      padding:16px;
      font:inherit;
      font-size:16px;
      line-height:1.6;
    }

    textarea{
      min-height:220px;
      resize:vertical;
      outline:none;
    }

    textarea:focus{
      border-color:#b8c7e0;
      box-shadow:0 0 0 4px rgba(91,124,255,.10);
    }

    textarea::placeholder{
      white-space:pre-line;
      color:#94a3b8;
    }

    .actions{
      display:grid;
      gap:12px;
      margin:16px 0 18px;
    }

    button{
      appearance:none;
      border:none;
      border-radius:20px;
      min-height:58px;
      padding:14px 18px;
      font:inherit;
      font-size:17px;
      font-weight:800;
      cursor:pointer;
    }

    .primary{
      background:linear-gradient(180deg,var(--primary) 0%,var(--primary-2) 100%);
      color:#fff;
    }

    .secondary{
      background:var(--soft);
      color:var(--text);
      border:1px solid var(--line);
    }

    .copy{
      background:#f3f6fb;
      color:var(--text);
      border:1px solid var(--line);
    }

    .result{
      min-height:220px;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .result.empty{
      color:#94a3b8;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    @media (min-width:768px){
      .app{padding:calc(18px + var(--safe-top)) 18px calc(22px + var(--safe-bottom))}
      .card{padding:26px 20px}
      h1{font-size:36px}
    }
  </style>
</head>
<body>
  <div class="app">
    <a class="back" href="./index.html">← Back to REFRAME Studio</a>

    <main class="card">
      <h1>Idea → Priority</h1>
      <p class="desc">Turn many ideas into one priority.</p>

      <label class="label" for="input">Input</label>
      <textarea id="input" spellcheck="false" placeholder="I have too many ideas and don't know what to do first.
アイデアが多すぎて何からやるべきか分からない。"></textarea>

      <div class="actions">
        <button id="mainBtn" class="primary" type="button">Find priority</button>
        <button id="exampleBtn" class="secondary" type="button">Try example</button>
        <button id="copyBtn" class="copy" type="button">Copy result</button>
      </div>

      <label class="label" for="result">Result</label>
      <div id="result" class="result empty">Your result will appear here.</div>
    </main>

    <div class="footer">REFRAME Studio — one tool, one friction point.</div>
  </div>

  <script>
    (function () {
      const inputEl = document.getElementById('input');
      const resultEl = document.getElementById('result');
      const mainBtn = document.getElementById('mainBtn');
      const exampleBtn = document.getElementById('exampleBtn');
      const copyBtn = document.getElementById('copyBtn');
      const exampleText = "I have too many ideas and don't know what to do first.";

      function detectLanguage(text) {
        return /[\u3040-\u30ff\u4e00-\u9fff]/.test(text) ? 'ja' : 'en';
      }

      function normalize(text) {
        return String(text || '').replace(/\s+/g, ' ').trim();
      }


      const EN_OUTPUTS = [
        'Most urgent right now',
        'Most reusable next',
        'Most likely to unlock momentum'
      ];

      const JA_OUTPUTS = [
        '今いちばん緊急度が高いもの',
        '次に使い回しやすいもの',
        '勢いを生みやすいもの'
      ];

      function buildResult(text) {
        const cleaned = normalize(text);
        if (!cleaned) return '';
        const isJa = detectLanguage(cleaned) === 'ja';
        const label = isJa ? '優先候補:' : 'Priority options:';
        const items = isJa ? JA_OUTPUTS : EN_OUTPUTS;
        return label + '\n' + items.map(item => '- ' + item).join('\n');
      }

      function renderResult(text) {
        if (!text) {
          resultEl.classList.add('empty');
          resultEl.textContent = 'Your result will appear here.';
          return;
        }
        resultEl.classList.remove('empty');
        resultEl.textContent = text;
      }

      function run() {
        renderResult(buildResult(inputEl.value));
      }

      function useExample() {
        inputEl.value = exampleText;
        run();
      }

      async function copyResult() {
        const text = resultEl.textContent.trim();
        if (!text || resultEl.classList.contains('empty')) return;
        try {
          await navigator.clipboard.writeText(text);
          const original = copyBtn.textContent;
          copyBtn.textContent = 'Copied';
          setTimeout(() => copyBtn.textContent = original, 1200);
        } catch (_) {
          const original = copyBtn.textContent;
          copyBtn.textContent = 'Copy failed';
          setTimeout(() => copyBtn.textContent = original, 1200);
        }
      }

      mainBtn.addEventListener('click', run);
      exampleBtn.addEventListener('click', useExample);
      copyBtn.addEventListener('click', copyResult);

      inputEl.addEventListener('keydown', function (e) {
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') run();
      });
    })();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shift</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
margin:0;
background:#0b0f18;
color:#e8edf7;
}

.container{
max-width:720px;
margin:auto;
padding:20px;
}

h1{
font-size:22px;
margin-bottom:6px;
}

.sub{
font-size:14px;
color:#8a94a8;
margin-bottom:20px;
}

textarea{
width:100%;
min-height:120px;
background:#121725;
border:1px solid #1f2738;
border-radius:10px;
padding:12px;
color:#fff;
font-size:15px;
}

.buttons{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
background:#1b2335;
border:1px solid #2a3550;
color:#fff;
padding:10px 14px;
border-radius:8px;
font-size:14px;
cursor:pointer;
}

button:hover{
background:#242f49;
}

.results{
margin-top:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#121725;
border:1px solid #1f2738;
border-radius:10px;
padding:14px;
}

.copy{
margin-top:8px;
font-size:12px;
color:#9aa4ba;
cursor:pointer;
}

.copy:hover{
color:#fff;
}

.footer{
margin-top:40px;
font-size:12px;
color:#59627a;
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>Shift</h1>
<div class="sub">Let the sentence move.</div>

<textarea id="input" placeholder="Drop a line."></textarea>

<div class="buttons">
<button onclick="generate()">Shift</button>
<button onclick="example()">Try example</button>
<button onclick="clearText()">Clear</button>
<button onclick="copyAll()">Copy result</button>
</div>

<div class="results" id="results"></div>

<div class="footer">No login · No tracking · Runs in your browser</div>

</div>

<script>

const examples=[
"Your posts are boring",
"Who cares",
"This makes no sense",
"Nobody asked",
"Too abstract"
];

const fragments=[
"Maybe the sentence is quiet, not empty.",
"Boredom sometimes hides slow interest.",
"The boredom may belong to the reader.",
"Contempt is attention wearing armor.",
"Silence rarely writes comments.",
"The idea may still be looking for ground.",
"Some thoughts arrive before their shape.",
"The sentence may not be the event.",
"The reader may be the weather.",
"Meaning sometimes hides behind irritation.",
"This thought refuses to sit still.",
"The sentence is smaller than the pressure.",
"Dismissal is attention pretending to leave.",
"Interest sometimes arrives disguised as boredom."
];

function randomFragment(){
return fragments[Math.floor(Math.random()*fragments.length)];
}

function generate(){

const input=document.getElementById("input").value.trim();

if(!input){
return;
}

const results=document.getElementById("results");

results.innerHTML="";

for(let i=0;i<3;i++){

let text=randomFragment();

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div>${text}</div>
<div class="copy" onclick="copyText('${text.replace(/'/g,"")}')">copy</div>
`;

results.appendChild(card);
}

}

function example(){
document.getElementById("input").value=
examples[Math.floor(Math.random()*examples.length)];
}

function clearText(){
document.getElementById("input").value="";
document.getElementById("results").innerHTML="";
}

function copyText(text){
navigator.clipboard.writeText(text);
}

function copyAll(){

const cards=document.querySelectorAll(".card div:first-child");

let text="";

cards.forEach(c=>{
text+=c.innerText+"\n\n";
});

navigator.clipboard.writeText(text);

}

</script>

</body>
</html>

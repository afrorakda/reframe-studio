<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Shift</title>
  <style>
    :root{
      --bg:#04101f;
      --bg2:#081833;
      --panel:rgba(16,31,58,.78);
      --panel-deep:rgba(7,16,32,.58);
      --line:rgba(173,207,255,.12);
      --line-2:rgba(173,207,255,.08);
      --text:#eaf2ff;
      --muted:#95a8c5;
      --soft:#c7d8f7;
      --shadow:0 20px 60px rgba(0,0,0,.34);
      --radius:22px;
      --radius-sm:16px;
      --max:720px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(87,137,228,.16), transparent 30%),
        radial-gradient(circle at 85% 15%, rgba(118,180,255,.08), transparent 24%),
        linear-gradient(180deg,var(--bg2),var(--bg));
      letter-spacing:.01em;
    }

    .wrap{
      width:min(var(--max),calc(100% - 24px));
      margin:0 auto;
      padding:20px 0 28px;
    }

    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      overflow:hidden;
    }

    .top{
      padding:18px 18px 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .back{
      color:var(--muted);
      text-decoration:none;
      font-size:.82rem;
      padding:6px 2px;
    }

    .back:hover{color:var(--soft)}

    .tiny{
      color:var(--muted);
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:lowercase;
    }

    .hero{
      padding:4px 18px 12px;
    }

    h1{
      margin:0;
      font-size:1.48rem;
      line-height:1.08;
      font-weight:700;
      letter-spacing:.01em;
    }

    .sub{
      margin-top:8px;
      color:var(--muted);
      font-size:.93rem;
      line-height:1.35;
    }

    .input-area{
      padding:0 18px 10px;
    }

    textarea{
      width:100%;
      min-height:140px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:18px;
      background:rgba(6,14,28,.72);
      color:var(--text);
      padding:14px 14px 15px;
      font:inherit;
      line-height:1.5;
      border:1px solid var(--line);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
    }

    textarea::placeholder{
      color:#88a0c4;
    }

    .controls{
      padding:6px 18px 6px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    button{
      appearance:none;
      border:none;
      outline:none;
      width:100%;
      min-height:48px;
      border-radius:16px;
      background:rgba(113,154,225,.11);
      border:1px solid var(--line);
      color:var(--text);
      font:inherit;
      font-weight:600;
      cursor:pointer;
      transition:transform .12s ease, background .12s ease, border-color .12s ease;
      padding:12px 14px;
    }

    button:hover{
      background:rgba(113,154,225,.15);
      border-color:rgba(173,207,255,.22);
    }

    button:active{transform:scale(.985)}

    .meta{
      padding:0 18px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .status{
      color:var(--muted);
      font-size:.82rem;
      min-height:1.2em;
    }

    .results{
      padding:0 12px 12px;
    }

    .empty{
      margin:0 6px 6px;
      padding:16px 14px;
      border-radius:18px;
      border:1px dashed var(--line);
      color:var(--muted);
      font-size:.92rem;
      line-height:1.45;
      background:rgba(6,14,28,.28);
    }

    .card{
      margin:0 6px 10px;
      padding:14px 14px 13px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(6,14,28,.5);
    }

    .card-line{
      font-size:1rem;
      line-height:1.58;
      color:var(--text);
      white-space:pre-wrap;
    }

    .card-meta{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .chip{
      font-size:.73rem;
      color:var(--muted);
      border:1px solid var(--line-2);
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.02);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:70%;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .mini{
      min-height:36px;
      padding:8px 12px;
      font-size:.8rem;
      border-radius:12px;
      background:rgba(255,255,255,.03);
      font-weight:500;
    }

    .quiet{
      padding:2px 18px 14px;
      color:var(--muted);
      font-size:.8rem;
      min-height:1.2em;
    }

    footer{
      padding:10px 18px 0;
      color:var(--muted);
      font-size:.8rem;
      text-align:center;
    }

    @media (min-width:700px){
      .wrap{padding-top:28px}
      .top{padding:20px 22px 10px}
      .hero{padding:4px 22px 12px}
      .input-area{padding:0 22px 10px}
      .controls{padding:6px 22px 6px; grid-template-columns:repeat(4,minmax(0,1fr))}
      .meta{padding:0 22px 14px}
      .results{padding:0 16px 14px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <a class="back" href="./unknown-mutation.html">unknown</a>
        <div class="tiny">shift</div>
      </div>

      <div class="hero">
        <h1>Shift</h1>
        <div class="sub">Let the sentence move.</div>
      </div>

      <div class="input-area">
        <textarea id="input" placeholder="Drop a line.

Example:
Your posts are boring.
Who cares.
This makes no sense.
Nobody asked.
Too abstract."></textarea>
      </div>

      <div class="controls">
        <button id="generateBtn">Shift</button>
        <button id="exampleBtn">Try example</button>
        <button id="clearBtn">Clear</button>
        <button id="copyBtn">Copy result</button>
      </div>

      <div class="meta">
        <div class="status" id="status">Loading pool...</div>
      </div>

      <div class="results" id="results">
        <div class="empty">Leave one line here. Take back three shifts.</div>
      </div>

      <div class="quiet" id="quiet"></div>
    </section>

    <footer>No login. No tracking. Browser only.</footer>
  </main>

  <script>
    const inputEl = document.getElementById('input');
    const resultsEl = document.getElementById('results');
    const statusEl = document.getElementById('status');
    const quietEl = document.getElementById('quiet');

    const examples = [
      "Your posts are boring.",
      "Who cares.",
      "This makes no sense.",
      "Nobody asked.",
      "Too abstract.",
      "Trying too hard.",
      "This is cringe.",
      "You sound confused."
    ];

    const quietPool = [
      "",
      "Drift as long as you like.",
      "Some lights are faint on purpose.",
      "The next line may come from nearby.",
      "A small shift is still a shift.",
      "Not every useful line arrives clearly."
    ];

    const NEXT_TOOLS = [
      "misread.html",
      "opposite.html",
      "metaphor.html"
    ];

    const POOL_FILES = [
      "./fragment-pool.json",
      "./fragment-pack-1.json",
      "./fragment-pack-2.json"
    ];

    let FRAGMENT_POOL = [];
    let POOL_READY = false;

    const signalMap = [
      { key: "boredom", test: /\bboring\b|\bdull\b|\bflat\b|\bbland\b|\bsleepy\b/i, boost: ["boring","boredom","dull","flat","attention","slow","quiet"] },
      { key: "dismissal", test: /\bwho cares\b|\bnobody asked\b|\bwho asked\b|\bnobody cares\b|\bgive it a rest\b/i, boost: ["dismiss","dismissal","care","indifference","reply","attention","leave"] },
      { key: "confusion", test: /\bmakes no sense\b|\bconfus|\bunclear\b|\bwhat are you saying\b|\bmumble\b|\bnonsense\b/i, boost: ["confusion","unclear","meaning","sense","entry","signal","shape"] },
      { key: "abstract", test: /\babstract\b|\bvague\b|\bairy\b|\btheory\b|\ball over the place\b/i, boost: ["abstract","altitude","ground","mist","shape","landing","theory"] },
      { key: "effort", test: /\btrying too hard\b|\btry hard\b|\bpretentious\b|\bperforming\b|\bdesperate\b/i, boost: ["effort","trying","performance","ambition","fingerprints","visible"] },
      { key: "cringe", test: /\bcringe\b|\bembarrassing\b|\bawkward\b|\bidiot\b/i, boost: ["cringe","shame","earnest","sincerity","awkward","armor"] },
      { key: "tone", test: /\barrogant\b|\bsmug\b|\bannoying\b|\brude\b|\bcondescending\b/i, boost: ["tone","voice","posture","position","hierarchy","edge"] },
      { key: "length", test: /\btoo long\b|\bwall of text\b|\bessay\b|\byapping\b/i, boost: ["length","time","attention","compression","pace"] }
    ];

    function normalizeText(str){
      return String(str || "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function tokenize(str){
      return normalizeText(str)
        .toLowerCase()
        .replace(/[^a-z0-9\s'-]/g, " ")
        .split(/\s+/)
        .filter(Boolean);
    }

    function uniq(arr){
      return [...new Set(arr)];
    }

    function shuffle(arr){
      const copy = [...arr];
      for(let i = copy.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function pick(arr){
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function safeArray(value){
      return Array.isArray(value) ? value : [];
    }

    function extractStrings(value, depth = 0){
      if(depth > 6) return [];
      if(typeof value === "string"){
        const text = normalizeText(value);
        return text ? [text] : [];
      }
      if(Array.isArray(value)){
        return value.flatMap(item => extractStrings(item, depth + 1));
      }
      if(value && typeof value === "object"){
        let out = [];
        const preferred = ["text","line","fragment","content","value","body","sentence","output"];
        for(const key of preferred){
          if(key in value) out = out.concat(extractStrings(value[key], depth + 1));
        }
        if(out.length) return out;
        for(const key of Object.keys(value)){
          out = out.concat(extractStrings(value[key], depth + 1));
        }
        return out;
      }
      return [];
    }

    function buildFragmentObjects(raw, sourceName){
      const strings = extractStrings(raw);
      const clean = [];
      const seen = new Set();

      for(const text of strings){
        const normalized = normalizeText(text);
        if(!normalized) continue;
        if(normalized.length < 8) continue;
        if(seen.has(normalized)) continue;
        seen.add(normalized);

        clean.push({
          text: normalized,
          source: sourceName,
          tags: inferTags(normalized)
        });
      }

      return clean;
    }

    function inferTags(text){
      const lower = text.toLowerCase();
      const tags = [];

      if(/\bboring\b|\bboredom\b|\bquiet\b|\bslow\b|\bdull\b/.test(lower)) tags.push("boredom");
      if(/\bcare\b|\bindifference\b|\bdismiss\b|\bleave\b|\breply\b/.test(lower)) tags.push("dismissal");
      if(/\bconfusion\b|\bmeaning\b|\bsense\b|\bunclear\b|\bsignal\b/.test(lower)) tags.push("confusion");
      if(/\babstract\b|\bmist\b|\bground\b|\bland\b|\baltitude\b|\bshape\b/.test(lower)) tags.push("abstract");
      if(/\beffort\b|\btrying\b|\bambition\b|\bfingerprint\b|\bvisible\b/.test(lower)) tags.push("effort");
      if(/\bcringe\b|\bshame\b|\bearnest\b|\bsincerity\b|\bawkward\b/.test(lower)) tags.push("cringe");
      if(/\btone\b|\bvoice\b|\bposture\b|\bposition\b|\bhierarchy\b/.test(lower)) tags.push("tone");
      if(/\blength\b|\btime\b|\battention\b|\bcompression\b|\bpace\b/.test(lower)) tags.push("length");

      if(/\bweather\b|\bwater\b|\btide\b|\bunderwater\b|\bdrift\b/.test(lower)) tags.push("drift");
      if(/\bmirror\b|\bpressure\b|\barmor\b|\bmask\b|\bbruise\b/.test(lower)) tags.push("sharp");
      if(/\bmaybe\b|\bsometimes\b|\bmay\b|\bstill\b/.test(lower)) tags.push("clear");
      if(/\brefuses\b|\brefuse\b|\bescaped\b|\boutlive\b|\bwalks in circles\b/.test(lower)) tags.push("weird");

      return uniq(tags);
    }

    async function loadJsonFile(path){
      const response = await fetch(path, { cache: "no-store" });
      if(!response.ok) throw new Error(`Failed to load ${path}`);
      return response.json();
    }

    async function loadPool(){
      const loaded = [];
      const seen = new Set();

      for(const path of POOL_FILES){
        try{
          const json = await loadJsonFile(path);
          const items = buildFragmentObjects(json, path.split("/").pop());

          for(const item of items){
            if(seen.has(item.text)) continue;
            seen.add(item.text);
            loaded.push(item);
          }
        }catch(err){
          // stay silent, keep trying next file
        }
      }

      FRAGMENT_POOL = loaded;
      POOL_READY = loaded.length > 0;

      if(POOL_READY){
        statusEl.textContent = `${loaded.length} pooled fragments ready.`;
      }else{
        statusEl.textContent = "Pool not found.";
      }
    }

    function extractSignals(input){
      const lower = input.toLowerCase();
      let tags = [];
      for(const item of signalMap){
        if(item.test.test(lower)){
          tags.push(item.key, ...item.boost);
        }
      }
      tags = tags.concat(tokenize(input));
      return uniq(tags);
    }

    function scoreFragment(fragment, signals){
      const text = fragment.text.toLowerCase();
      const words = tokenize(text);
      const set = new Set(words);

      let score = 0;

      for(const signal of signals){
        if(!signal) continue;
        const s = signal.toLowerCase();

        if(text.includes(s)) score += 6;
        if(set.has(s)) score += 5;
        if(fragment.tags.includes(s)) score += 8;

        if(s === "boredom" && /\bboring\b|\bboredom\b|\bquiet\b|\bslow\b/.test(text)) score += 4;
        if(s === "dismissal" && /\bcare\b|\bindifference\b|\bdismiss\b|\breply\b/.test(text)) score += 4;
        if(s === "confusion" && /\bmeaning\b|\bsense\b|\bsignal\b|\bentry\b/.test(text)) score += 4;
        if(s === "abstract" && /\bground\b|\bmist\b|\bshape\b|\baltitude\b/.test(text)) score += 4;
        if(s === "effort" && /\beffort\b|\btrying\b|\bambition\b|\bfingerprint\b/.test(text)) score += 4;
        if(s === "cringe" && /\bshame\b|\bearnest\b|\bawkward\b|\barmor\b/.test(text)) score += 4;
        if(s === "tone" && /\bvoice\b|\bposture\b|\bposition\b|\bedge\b/.test(text)) score += 4;
      }

      if(fragment.tags.includes("clear")) score += 1;
      if(fragment.tags.includes("sharp")) score += 1;
      if(fragment.tags.includes("weird")) score += 1;

      return score;
    }

    function classifyStyle(text){
      const lower = text.toLowerCase();

      if(/\bmaybe\b|\bsometimes\b|\bmay\b|\bstill\b/.test(lower)) return "clear";
      if(/\bweather\b|\btide\b|\bwater\b|\bunderwater\b|\bmirror\b|\bdrift\b/.test(lower)) return "drift";
      return "sharp";
    }

    function chooseThree(input){
      const signals = extractSignals(input);
      const scored = FRAGMENT_POOL
        .map(fragment => ({
          ...fragment,
          score: scoreFragment(fragment, signals),
          style: classifyStyle(fragment.text)
        }))
        .sort((a, b) => b.score - a.score);

      const strong = scored.filter(item => item.score > 0);
      const base = strong.length >= 8 ? strong : scored.slice(0, Math.min(24, scored.length));

      const clear = shuffle(base.filter(item => item.style === "clear"));
      const drift = shuffle(base.filter(item => item.style === "drift"));
      const sharp = shuffle(base.filter(item => item.style === "sharp"));

      const chosen = [];
      const used = new Set();

      function takeFrom(bucket){
        while(bucket.length){
          const item = bucket.shift();
          if(used.has(item.text)) continue;
          used.add(item.text);
          chosen.push(item);
          return;
        }
      }

      takeFrom(clear);
      takeFrom(drift);
      takeFrom(sharp);

      const fallback = shuffle(base);
      while(chosen.length < 3 && fallback.length){
        const item = fallback.shift();
        if(used.has(item.text)) continue;
        used.add(item.text);
        chosen.push(item);
      }

      const finalFallback = shuffle(scored);
      while(chosen.length < 3 && finalFallback.length){
        const item = finalFallback.shift();
        if(used.has(item.text)) continue;
        used.add(item.text);
        chosen.push(item);
      }

      return chosen.slice(0, 3);
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function renderCards(cards){
      if(!cards.length){
        resultsEl.innerHTML = `<div class="empty">No fragment found yet.</div>`;
        return;
      }

      resultsEl.innerHTML = cards.map((card, i) => `
        <article class="card">
          <div class="card-line">${escapeHtml(card.text)}</div>
          <div class="card-meta">
            <div class="chip">${escapeHtml(card.source || "pool")}</div>
            <div class="actions">
              <button class="mini" type="button" onclick="copyCard(${i})">Copy</button>
              <button class="mini" type="button" onclick="goNext(${i})">→</button>
            </div>
          </div>
        </article>
      `).join("");
    }

    let CURRENT_CARDS = [];

    function getExcerpt(text){
      const cleaned = normalizeText(text);
      return cleaned.length > 80 ? cleaned.slice(0, 77).trim() + "..." : cleaned;
    }

    function generate(){
      const input = normalizeText(inputEl.value);

      if(!input){
        resultsEl.innerHTML = `<div class="empty">Leave one line here. Take back three shifts.</div>`;
        statusEl.textContent = "Drop one line first.";
        quietEl.textContent = "";
        return;
      }

      if(!POOL_READY || FRAGMENT_POOL.length === 0){
        statusEl.textContent = "Pool not ready.";
        return;
      }

      CURRENT_CARDS = chooseThree(input);
      renderCards(CURRENT_CARDS);
      statusEl.textContent = `Read from: “${getExcerpt(input)}”`;
      quietEl.textContent = pick(quietPool);
    }

    function example(){
      inputEl.value = pick(examples);
      generate();
    }

    function clearAll(){
      inputEl.value = "";
      CURRENT_CARDS = [];
      resultsEl.innerHTML = `<div class="empty">Leave one line here. Take back three shifts.</div>`;
      statusEl.textContent = POOL_READY ? `${FRAGMENT_POOL.length} pooled fragments ready.` : "Loading pool...";
      quietEl.textContent = "";
      inputEl.focus();
    }

    async function copyCard(index){
      const item = CURRENT_CARDS[index];
      if(!item) return;
      try{
        await navigator.clipboard.writeText(item.text);
        statusEl.textContent = "Copied.";
      }catch(err){
        statusEl.textContent = "Copy failed.";
      }
    }

    async function copyAll(){
      if(!CURRENT_CARDS.length){
        statusEl.textContent = "Nothing to copy yet.";
        return;
      }

      const text = CURRENT_CARDS.map(item => item.text).join("\n\n");

      try{
        await navigator.clipboard.writeText(text);
        statusEl.textContent = "Copied.";
      }catch(err){
        statusEl.textContent = "Copy failed.";
      }
    }

    function pickNextTool(){
      return pick(NEXT_TOOLS);
    }

    function goNext(index){
      const item = CURRENT_CARDS[index];
      if(!item) return;

      const next = pickNextTool();
      const params = new URLSearchParams();
      params.set("fragment", item.text);
      params.set("from", "shift");

      window.location.href = `${next}?${params.toString()}`;
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('exampleBtn').addEventListener('click', example);
    document.getElementById('clearBtn').addEventListener('click', clearAll);
    document.getElementById('copyBtn').addEventListener('click', copyAll);

    inputEl.addEventListener('keydown', (e) => {
      if((e.metaKey || e.ctrlKey) && e.key === 'Enter'){
        generate();
      }
    });

    loadPool();
  </script>
</body>
</html>

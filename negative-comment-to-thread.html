<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Negative Comment → Thread</title>
  <meta name="description" content="Turn a negative comment into a thread outline." />
  <meta name="reframe:title" content="Negative Comment → Thread" />
  <meta name="reframe:description" content="Turn a negative comment into a thread outline." />
  <meta name="reframe:category" content="Emotion" />
  <meta name="reframe:state" content="active" />
  <meta name="reframe:generator" content="manual" />
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#1a1a1a;
      --muted:#6b7280;
      --accent:#2563eb;
      --soft:#e5e7eb;
      --line:#e5e7eb;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .container{
      max-width:720px;
      margin:auto;
      padding:20px;
    }

    .back{
      display:inline-block;
      margin-bottom:16px;
      text-decoration:none;
      color:var(--muted);
      font-size:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:20px;
      box-shadow:0 8px 24px rgba(0,0,0,0.06);
    }

    h1{
      margin:0 0 12px;
      font-size:28px;
      line-height:1.15;
    }

    .description{
      color:var(--muted);
      font-size:16px;
      line-height:1.5;
      margin:0 0 18px;
    }

    textarea{
      width:100%;
      min-height:150px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      font-size:16px;
      line-height:1.5;
      resize:vertical;
      outline:none;
      background:#fff;
      color:var(--text);
    }

    textarea:focus{
      border-color:#bfd3ff;
      box-shadow:0 0 0 4px rgba(37,99,235,0.10);
    }

    textarea::placeholder{
      color:#9ca3af;
      white-space:pre-line;
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:14px;
    }

    button{
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:15px;
      cursor:pointer;
      min-height:48px;
    }

    .generate{
      background:var(--accent);
      color:#fff;
    }

    .example{
      background:#eef2ff;
      color:#1d4ed8;
    }

    .clear{
      background:#f3f4f6;
      color:#374151;
    }

    .copy{
      background:var(--soft);
      color:#2563eb;
    }

    .result-wrap{
      margin-top:20px;
    }

    .result-label{
      display:block;
      font-size:14px;
      font-weight:700;
      margin:0 0 8px;
      color:#374151;
    }

    .result{
      min-height:180px;
      padding:16px;
      background:#fafafa;
      border-radius:14px;
      border:1px solid var(--line);
      white-space:pre-wrap;
      line-height:1.6;
      font-size:16px;
    }

    .footer{
      margin-top:18px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
    }

    @media (max-width: 480px){
      .container{padding:16px}
      h1{font-size:26px}
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="./index.html">← Back to REFRAME Studio</a>

    <div class="card">
      <h1>Negative Comment → Thread</h1>
      <p class="description">Turn a negative comment into a thread outline.</p>

      <textarea
        id="input"
        spellcheck="false"
        placeholder="Paste a negative comment.

Example:
Your ideas are stupid and nobody cares.

否定的なコメントを貼ってください。

例:
お前の発信なんて誰も求めてない。"
      ></textarea>

      <div class="buttons">
        <button class="generate" type="button" onclick="generateResult()">Generate</button>
        <button class="example" type="button" onclick="useExample()">Try example</button>
        <button class="clear" type="button" onclick="clearAll()">Clear</button>
        <button class="copy" type="button" onclick="copyResult()">Copy result</button>
      </div>

      <div class="result-wrap">
        <span class="result-label">Result</span>
        <div id="result" class="result">Result will appear here.</div>
      </div>
    </div>

    <div class="footer">REFRAME Studio — criticism into structure.</div>
  </div>

  <script>
    function detectLanguage(text){
      return /[ぁ-んァ-ン一-龥]/.test(text) ? "ja" : "en";
    }

    function useExample(){
      const example = "Your ideas are stupid and nobody cares.";
      document.getElementById("input").value = example;
      generateResult();
    }

    function clearAll(){
      document.getElementById("input").value = "";
      document.getElementById("result").innerText = "Result will appear here.";
    }

    function buildEnglishResult(){
      return `Thread outline

1. Hook
Why negative comments are rarely about the actual idea

2. Problem
People often attack the person when they cannot engage the argument

3. Reframe
A harsh comment can reveal fear, insecurity, or resistance

4. Insight
Criticism often says more about the commenter than the content

5. Useful takeaway
Instead of reacting emotionally, extract the pattern underneath

6. Closing
The internet gets clearer when we learn to decode attacks instead of absorbing them`;
    }

    function buildJapaneseResult(){
      return `スレッド構成

1. フック
否定コメントは中身より感情を表していることが多い

2. 問題提起
議論できないとき、人は内容ではなく人を攻撃しやすい

3. リフレーム
強い否定の裏には不安や抵抗が隠れていることがある

4. 洞察
批判は内容より、相手の心理を映している場合がある

5. 使える学び
感情で受け取るより、下にあるパターンを読む方が有益

6. 締め
攻撃をそのまま飲み込まず、構造として読むと世界はかなり変わる`;
    }

    function generateResult(){
      const text = document.getElementById("input").value.trim();
      if(!text) return;
      const lang = detectLanguage(text);
      const output = lang === "ja" ? buildJapaneseResult() : buildEnglishResult();
      document.getElementById("result").innerText = output;
    }

    async function copyResult(){
      const text = document.getElementById("result").innerText;
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){}
    }
  </script>
</body>
</html>

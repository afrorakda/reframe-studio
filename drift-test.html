<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REFRAME Drift Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #f5f7fb;
      line-height: 1.6;
    }

    .wrap {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: #9fb4ff;
      text-decoration: none;
      font-size: 14px;
    }

    .back:hover {
      text-decoration: underline;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .sub {
      margin: 0 0 24px;
      color: #aeb7c6;
      font-size: 15px;
    }

    .panel,
    .card {
      background: #171a21;
      border: 1px solid #2a3140;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #d9e0ea;
    }

    textarea,
    select {
      width: 100%;
      background: #0f1115;
      color: #f5f7fb;
      border: 1px solid #333c4d;
      border-radius: 12px;
      padding: 12px;
      font: inherit;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
      margin-top: 12px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font: inherit;
      cursor: pointer;
      background: #2b6cff;
      color: white;
    }

    button.secondary {
      background: #2a3140;
      color: #e7ecf5;
    }

    button:hover {
      opacity: 0.95;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .muted {
      color: #aeb7c6;
      font-size: 14px;
    }

    .small {
      font-size: 13px;
      color: #aeb7c6;
    }

    .empty {
      color: #8f98a8;
      font-size: 14px;
    }

    .score {
      display: inline-block;
      margin-left: 8px;
      font-size: 12px;
      color: #9fb4ff;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #222938;
      border: 1px solid #33405a;
      font-size: 13px;
      color: #dbe5ff;
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .triple {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .zone-block {
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #283041;
    }

    .zone-block:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: 0;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      background: #0f1115;
      border: 1px solid #2b3344;
      border-radius: 12px;
      padding: 12px;
      color: #dbe5ff;
      overflow: auto;
    }

    @media (min-width: 760px) {
      .row {
        grid-template-columns: 1fr 180px 140px;
      }

      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 980px) {
      .triple {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="./index.html">← Back to REFRAME Studio</a>

    <h1>Drift Test</h1>
    <p class="sub">Test Router + Drift Engine across Stable, Drift, and Chaos.</p>

    <div class="panel">
      <label for="inputText">Input</label>
      <textarea id="inputText" placeholder="Example:
I feel stuck and cannot decide what to build next.

例:
アイデアはあるのにツールの形にできない。"></textarea>

      <div class="row">
        <div>
          <label for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="stable">Stable</option>
            <option value="drift">Drift</option>
            <option value="chaos">Chaos</option>
          </select>
        </div>
        <div>
          <label for="limitSelect">Results</label>
          <select id="limitSelect">
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
        </div>
        <div>
          <label for="compareSelect">Compare All</label>
          <select id="compareSelect">
            <option value="no">No</option>
            <option value="yes">Yes</option>
          </select>
        </div>
      </div>

      <div class="buttons">
        <button id="runBtn">Run drift</button>
        <button id="example1Btn" class="secondary">Example 1</button>
        <button id="example2Btn" class="secondary">Example 2</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Field Read Before Drift</h2>
        <div id="beforeField" class="empty">No result yet.</div>
      </div>

      <div class="card">
        <h2>Field Read After Drift</h2>
        <div id="afterField" class="empty">No result yet.</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Drift Summary</h2>
        <div id="driftSummary" class="empty">No result yet.</div>
      </div>

      <div class="card">
        <h2>Top Zones</h2>
        <div id="topZones" class="empty">No result yet.</div>
      </div>
    </div>

    <div class="card">
      <h2>Mode Compare</h2>
      <div id="modeCompare" class="empty">Compare is off.</div>
    </div>

    <div class="card">
      <h2>Debug JSON</h2>
      <pre id="debugJson">No result yet.</pre>
    </div>
  </div>

  <script src="./mutation-map.js"></script>
  <script src="./router-v2.js"></script>
  <script src="./drift-engine.js"></script>
  <script>
    (function () {
      "use strict";

      var inputText = document.getElementById("inputText");
      var modeSelect = document.getElementById("modeSelect");
      var limitSelect = document.getElementById("limitSelect");
      var compareSelect = document.getElementById("compareSelect");

      var runBtn = document.getElementById("runBtn");
      var example1Btn = document.getElementById("example1Btn");
      var example2Btn = document.getElementById("example2Btn");
      var clearBtn = document.getElementById("clearBtn");

      var beforeFieldEl = document.getElementById("beforeField");
      var afterFieldEl = document.getElementById("afterField");
      var driftSummaryEl = document.getElementById("driftSummary");
      var topZonesEl = document.getElementById("topZones");
      var modeCompareEl = document.getElementById("modeCompare");
      var debugJsonEl = document.getElementById("debugJson");

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function topItems(bucket, limit) {
        return Object.keys(bucket)
          .map(function (key) {
            return { key: key, score: bucket[key] };
          })
          .filter(function (item) {
            return item.score > 0;
          })
          .sort(function (a, b) {
            return b.score - a.score;
          })
          .slice(0, limit || 4);
      }

      function makePills(items) {
        if (!items.length) return '<div class="empty">None</div>';

        return '<div class="pill-list">' +
          items.map(function (item) {
            return '<span class="pill">' + escapeHtml(item) + '</span>';
          }).join("") +
          '</div>';
      }

      function renderField(el, fieldState) {
        if (!fieldState) {
          el.innerHTML = '<div class="empty">No field data.</div>';
          return;
        }

        var topFriction = topItems(fieldState.friction, 4);
        var topMutation = topItems(fieldState.mutation, 4);
        var topExpression = topItems(fieldState.expression, 4);

        el.innerHTML =
          '<h3>Friction</h3>' +
          makePills(topFriction.map(function (item) {
            return item.key + ' ' + item.score.toFixed(2);
          })) +
          '<h3 style="margin-top:14px;">Mutation</h3>' +
          makePills(topMutation.map(function (item) {
            return item.key + ' ' + item.score.toFixed(2);
          })) +
          '<h3 style="margin-top:14px;">Expression</h3>' +
          makePills(topExpression.map(function (item) {
            return item.key + ' ' + item.score.toFixed(2);
          }));
      }

      function renderTopZones(zones) {
        if (!zones || !zones.length) {
          topZonesEl.innerHTML = '<div class="empty">No zones found.</div>';
          return;
        }

        topZonesEl.innerHTML = zones.map(function (zone) {
          return (
            '<div class="zone-block">' +
              '<h3>' + escapeHtml(zone.title) +
              '<span class="score">score ' + zone.score + '</span></h3>' +
              '<div class="muted">' + escapeHtml(zone.cluster) + '</div>' +
              '<p class="small">' + escapeHtml(zone.role) + '</p>' +
              '<div class="small">Next openings</div>' +
              makePills(zone.nextOpenings) +
            '</div>'
          );
        }).join("");
      }

      function renderDriftSummary(summary) {
        if (!summary) {
          driftSummaryEl.innerHTML = '<div class="empty">No summary.</div>';
          return;
        }

        driftSummaryEl.innerHTML =
          '<h3>' + escapeHtml(summary.mode) + '</h3>' +
          '<p>' + escapeHtml(summary.text) + '</p>' +
          '<div class="small">Top friction</div>' +
          makePills(summary.topFriction || []) +
          '<div class="small" style="margin-top:12px;">Top mutation</div>' +
          makePills(summary.topMutation || []) +
          '<div class="small" style="margin-top:12px;">Top expression</div>' +
          makePills(summary.topExpression || []);
      }

      function renderModeCompare(input, limit) {
        if (compareSelect.value !== "yes") {
          modeCompareEl.innerHTML = '<div class="empty">Compare is off.</div>';
          return;
        }

        var modes = ["stable", "drift", "chaos"];

        var blocks = modes.map(function (mode) {
          var baseField = window.REFRAME_ROUTER_V2.estimateFieldState(input, "stable");
          var result = window.REFRAME_DRIFT_ENGINE.driftAndRank(baseField, {
            mode: mode,
            limit: limit
          });

          var top = result.rankedZones[0];

          return (
            '<div class="card" style="margin:0;">' +
              '<h3>' + escapeHtml(mode) + '</h3>' +
              (
                top
                  ? '<p><strong>' + escapeHtml(top.title) + '</strong><span class="score">score ' + top.score + '</span></p>' +
                    '<div class="muted">' + escapeHtml(top.cluster) + '</div>' +
                    '<p class="small">' + escapeHtml(result.driftSummary.text) + '</p>' +
                    '<div class="small">Next openings</div>' +
                    makePills(top.nextOpenings)
                  : '<div class="empty">No result.</div>'
              ) +
            '</div>'
          );
        }).join("");

        modeCompareEl.innerHTML = '<div class="triple">' + blocks + '</div>';
      }

      function runDrift() {
        if (!window.REFRAME_ROUTER_V2 || !window.REFRAME_DRIFT_ENGINE) {
          beforeFieldEl.innerHTML = '<div class="empty">Missing router or drift engine.</div>';
          afterFieldEl.innerHTML = '';
          driftSummaryEl.innerHTML = '';
          topZonesEl.innerHTML = '';
          modeCompareEl.innerHTML = '';
          debugJsonEl.textContent = 'router-v2.js or drift-engine.js is missing.';
          return;
        }

        try {
          var input = inputText.value;
          var mode = modeSelect.value;
          var limit = Number(limitSelect.value);

          var baseField = window.REFRAME_ROUTER_V2.estimateFieldState(input, "stable");
          var driftResult = window.REFRAME_DRIFT_ENGINE.driftAndRank(baseField, {
            mode: mode,
            limit: limit
          });

          renderField(beforeFieldEl, baseField);
          renderField(afterFieldEl, driftResult.driftedFieldState);
          renderDriftSummary(driftResult.driftSummary);
          renderTopZones(driftResult.rankedZones);
          renderModeCompare(input, limit);

          debugJsonEl.textContent = JSON.stringify({
            input: input,
            mode: mode,
            baseField: baseField,
            driftResult: driftResult
          }, null, 2);
        } catch (error) {
          beforeFieldEl.innerHTML = '<div class="empty">Error: ' + escapeHtml(error.message) + '</div>';
          afterFieldEl.innerHTML = '';
          driftSummaryEl.innerHTML = '';
          topZonesEl.innerHTML = '';
          modeCompareEl.innerHTML = '';
          debugJsonEl.textContent = String(error && error.stack ? error.stack : error);
        }
      }

      example1Btn.addEventListener("click", function () {
        inputText.value = "I feel stuck and cannot decide what to build next.";
        modeSelect.value = "stable";
        limitSelect.value = "3";
        compareSelect.value = "yes";
        runDrift();
      });

      example2Btn.addEventListener("click", function () {
        inputText.value = "アイデアはあるのにツールの形にできない。";
        modeSelect.value = "drift";
        limitSelect.value = "3";
        compareSelect.value = "yes";
        runDrift();
      });

      clearBtn.addEventListener("click", function () {
        inputText.value = "";
        modeSelect.value = "stable";
        limitSelect.value = "3";
        compareSelect.value = "no";
        beforeFieldEl.innerHTML = '<div class="empty">No result yet.</div>';
        afterFieldEl.innerHTML = '<div class="empty">No result yet.</div>';
        driftSummaryEl.innerHTML = '<div class="empty">No result yet.</div>';
        topZonesEl.innerHTML = '<div class="empty">No result yet.</div>';
        modeCompareEl.innerHTML = '<div class="empty">Compare is off.</div>';
        debugJsonEl.textContent = 'No result yet.';
      });

      runBtn.addEventListener("click", runDrift);
    })();
  </script>
</body>
</html>

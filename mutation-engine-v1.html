<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mutation Engine v1</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:#131a2e;
      --panel-2:#18213b;
      --line:#2a355a;
      --text:#eef2ff;
      --muted:#aeb8d6;
      --soft:#8fa1d1;
      --accent:#9b8cff;
      --accent-2:#5eead4;
      --danger:#ff8aa1;
      --shadow:0 10px 30px rgba(0,0,0,.28);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:
        radial-gradient(circle at top left, rgba(155,140,255,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(94,234,212,.12), transparent 28%),
        linear-gradient(180deg, #09101d 0%, #0b1020 100%);
      color:var(--text);
      min-height:100vh;
      line-height:1.5;
    }

    a{color:var(--text);text-decoration:none}
    .wrap{
      width:min(100%, 880px);
      margin:0 auto;
      padding:18px 14px 42px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:var(--muted);
      margin-bottom:14px;
    }

    .hero{
      background:linear-gradient(180deg, rgba(19,26,46,.96), rgba(19,26,46,.88));
      border:1px solid var(--line);
      border-radius:24px;
      padding:22px 18px;
      box-shadow:var(--shadow);
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent-2);
      margin-bottom:10px;
    }

    h1{
      margin:0;
      font-size:30px;
      line-height:1.1;
      letter-spacing:-0.03em;
    }

    .sub{
      margin:10px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .principles{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-top:18px;
    }

    .pill{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:999px;
      padding:10px 12px;
      color:var(--soft);
      font-size:12px;
      text-align:center;
    }

    .section{
      margin-top:16px;
      background:rgba(19,26,46,.92);
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .label{
      font-size:13px;
      color:var(--soft);
      margin-bottom:8px;
    }

    textarea{
      width:100%;
      min-height:150px;
      resize:vertical;
      background:var(--panel-2);
      color:var(--text);
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      font:inherit;
      outline:none;
    }

    textarea::placeholder{
      color:#8d97b7;
    }

    .modes{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:14px;
    }

    .mode-btn{
      appearance:none;
      border:1px solid var(--line);
      background:var(--panel-2);
      color:var(--text);
      border-radius:16px;
      padding:12px 10px;
      text-align:left;
      cursor:pointer;
      transition:.18s ease;
      min-height:78px;
    }

    .mode-btn strong{
      display:block;
      font-size:15px;
      margin-bottom:4px;
    }

    .mode-btn span{
      display:block;
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reaction → Misunderstanding</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
padding:24px;
background:#0f1117;
color:#e6edf3;
}

.container{
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:12px;
background:#161b22;
border:1px solid #333;
border-radius:8px;
color:white;
}

button{
margin-top:12px;
margin-right:8px;
padding:10px 16px;
background:#238636;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
white-space:pre-wrap;
background:#161b22;
padding:16px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<a href="./index.html">← Back</a>

<h1>Reaction → Misunderstanding</h1>

<p>Turn misunderstandings into new ideas.</p>

<textarea id="input" placeholder="Example: People misunderstood my post and reacted in unexpected ways"></textarea>

<br>

<button onclick="generate()">Generate</button>
<button onclick="example()">Try example</button>
<button onclick="clearAll()">Clear</button>

<div id="result" class="result"></div>

</div>

<script>

function example(){
document.getElementById("input").value =
"People misunderstood my post and reacted to something I didn't mean.";
}

function clearAll(){
document.getElementById("input").value="";
document.getElementById("result").textContent="";
}

function generate(){

const ideas = [

"The misunderstanding might reveal what people expected you to say.",

"Your audience may be reacting to a hidden assumption in your message.",

"The wrong interpretation could actually be a better idea than the original.",

"The misunderstanding may expose a conflict between your intention and their belief.",

"People might be revealing the question they really want answered.",

"The reaction might show what people fear your idea implies.",

"The misunderstanding could reveal the real tension behind the topic.",

"The comment that 'missed the point' may actually point to a new topic."

];

let output = "Misunderstanding Ideas\n\n";

ideas.forEach(i=>{
output += "• " + i + "\n";
});

output += "\nNext Mutations\n";
output += "Hook\nThread\nDebate\nReframe";

document.getElementById("result").textContent = output;

}

</script>

</body>
</html>

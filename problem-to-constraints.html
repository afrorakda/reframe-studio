<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Problem → Constraints</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:#f5f7fb;
color:#1a1f2b;
}

.container{
max-width:720px;
margin:auto;
padding:20px;
}

.back{
display:inline-block;
margin-bottom:16px;
text-decoration:none;
color:#6b7280;
font-size:14px;
}

.card{
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,0.06);
}

h1{
margin-top:0;
font-size:28px;
}

.desc{
color:#6b7280;
margin-bottom:16px;
}

textarea{
width:100%;
min-height:140px;
padding:14px;
border-radius:12px;
border:1px solid #e5e7eb;
font-size:16px;
resize:vertical;
}

.controls{
margin-top:12px;
display:flex;
flex-wrap:wrap;
gap:8px;
}

button{
border:none;
border-radius:10px;
padding:12px 16px;
font-size:15px;
cursor:pointer;
}

.primary{
background:#2563eb;
color:white;
}

.secondary{
background:#eef2ff;
}

.copy{
background:#f3f4f6;
}

.result{
margin-top:16px;
border:1px solid #e5e7eb;
border-radius:12px;
padding:14px;
min-height:120px;
white-space:pre-wrap;
}

.footer{
text-align:center;
font-size:12px;
margin-top:14px;
color:#6b7280;
}
</style>
</head>

<body>

<div class="container">

<a class="back" href="./index.html">← Back to REFRAME Studio</a>

<div class="card">

<h1>Problem → Constraints</h1>

<p class="desc">
Find the key constraints blocking progress.
</p>

<textarea id="input"
placeholder="I want to make more tools, but progress is slow.
もっとツールを作りたいのに進みが遅い。"></textarea>

<div class="controls">
<button class="primary" onclick="run()">Find constraints</button>
<button class="secondary" onclick="example()">Try example</button>
<button class="copy" onclick="copyResult()">Copy result</button>
</div>

<div id="result" class="result">
Your result will appear here.
</div>

</div>

<div class="footer">
REFRAME Studio — bottlenecks before advice
</div>

</div>

<script>

function detectLang(text){
return /[ぁ-んァ-ン一-龯]/.test(text) ? "ja":"en";
}

function run(){

let input=document.getElementById("input").value.trim();

if(!input){
return;
}

let lang=detectLang(input);

let result="";

if(lang==="ja"){

result=
"制約の可能性:\n"+
"- テンプレートが固定されていない\n"+
"- 判断回数が多すぎる\n"+
"- 優先順位が曖昧\n"+
"- 作業の流れが安定していない";

}else{

result=
"Possible constraints:\n"+
"- No fixed template\n"+
"- Too many decisions\n"+
"- Unclear priorities\n"+
"- Inconsistent workflow";

}

document.getElementById("result").textContent=result;

}

function example(){

let lang=navigator.language.startsWith("ja");

document.getElementById("input").value=
lang ?
"もっとツールを作りたいのに進みが遅い。" :
"I want to make more tools, but progress is slow.";

run();

}

function copyResult(){

let text=document.getElementById("result").textContent;

navigator.clipboard.writeText(text);

}

</script>

</body>
</html>

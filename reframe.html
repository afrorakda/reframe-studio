<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reframe | REFRAME Studio</title>
  <meta name="description" content="Turn one bad reply into a clearer frame. No login. No tracking. Runs entirely in your browser." />
  <style>
    :root{
      --bg-top:#081331;
      --bg-mid:#0b1f4f;
      --bg-bottom:#07112b;
      --card-outer:rgba(35,55,122,0.55);
      --card-outer-line:rgba(122,145,255,0.18);
      --card-inner:rgba(4,11,40,0.92);
      --card-inner-line:rgba(103,129,255,0.14);
      --text:#f4f7ff;
      --muted:#b7c2f0;
      --soft:#96a5df;
      --pill-bg:rgba(74,62,163,0.24);
      --pill-line:rgba(124,108,255,0.45);
      --textarea-bg:#02081f;
      --textarea-line:rgba(93,116,236,0.2);
      --button:#ffffff;
      --button-text:#081331;
      --button-soft:rgba(255,255,255,0.08);
      --button-soft-text:#eef2ff;
      --button-line:rgba(255,255,255,0.1);
      --result-card:rgba(255,255,255,0.04);
      --result-line:rgba(255,255,255,0.08);
      --radius-outer:26px;
      --radius-inner:20px;
      --radius-textarea:16px;
      --shadow:0 20px 56px rgba(0,0,0,0.28);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(53,94,255,0.24), transparent 30%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .page{
      width:min(760px, calc(100% - 22px));
      margin:0 auto;
      padding:16px 0 24px;
    }

    .back-link{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:15px;
      line-height:1.4;
      color:var(--muted);
      margin-bottom:12px;
      opacity:0.95;
    }

    .shell{
      background:var(--card-outer);
      border:1px solid var(--card-outer-line);
      border-radius:var(--radius-outer);
      padding:16px 10px 10px;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
      -webkit-backdrop-filter:blur(6px);
    }

    .pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:38px;
      padding:0 14px;
      border-radius:999px;
      background:var(--pill-bg);
      border:1px solid var(--pill-line);
      color:#e8ddff;
      font-size:14px;
      letter-spacing:-0.01em;
      margin-bottom:12px;
    }

    .hero-title{
      margin:0 0 4px 0;
      font-size:34px;
      line-height:1;
      letter-spacing:-0.05em;
      font-weight:800;
    }

    .hero-desc{
      margin:0 0 12px 0;
      font-size:15px;
      line-height:1.45;
      color:var(--muted);
    }

    .inner{
      background:var(--card-inner);
      border:1px solid var(--card-inner-line);
      border-radius:var(--radius-inner);
      padding:16px 10px 12px;
    }

    .mutation-title{
      margin:0 0 6px 0;
      font-size:27px;
      line-height:1.03;
      letter-spacing:-0.04em;
      font-weight:800;
    }

    .mutation-desc{
      margin:0 0 12px 0;
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
    }

    .label{
      display:block;
      margin:0 0 7px 0;
      font-size:14px;
      line-height:1.35;
      font-weight:700;
      color:var(--text);
    }

    textarea{
      width:100%;
      min-height:118px;
      resize:vertical;
      border:none;
      outline:none;
      border-radius:var(--radius-textarea);
      background:var(--textarea-bg);
      border:1px solid var(--textarea-line);
      color:var(--text);
      padding:14px;
      font:inherit;
      font-size:15px;
      line-height:1.5;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    textarea::placeholder{
      color:var(--soft);
    }

    .button-stack{
      display:flex;
      flex-direction:column;
      gap:7px;
      margin-top:10px;
    }

    button{
      appearance:none;
      border:none;
      width:100%;
      min-height:46px;
      border-radius:14px;
      font:inherit;
      font-size:15px;
      font-weight:800;
      letter-spacing:-0.02em;
      cursor:pointer;
      transition:transform .05s ease, opacity .18s ease, background .18s ease;
    }

    button:active{
      transform:translateY(1px);
    }

    .btn-primary{
      background:var(--button);
      color:var(--button-text);
    }

    .btn-soft{
      background:var(--button-soft);
      color:var(--button-soft-text);
      border:1px solid var(--button-line);
    }

    .subrow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:10px;
      min-height:18px;
    }

    .status{
      font-size:12px;
      line-height:1.4;
      color:var(--soft);
    }

    .deep-link{
      font-size:12px;
      line-height:1.4;
      color:var(--soft);
      opacity:0.78;
      white-space:nowrap;
    }

    .result{
      margin-top:12px;
      display:none;
      gap:8px;
      flex-direction:column;
    }

    .result-card{
      background:var(--result-card);
      border:1px solid var(--result-line);
      border-radius:14px;
      padding:10px;
    }

    .result-label{
      font-size:10px;
      line-height:1.4;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#d7deff;
      font-weight:800;
      margin-bottom:4px;
    }

    .result-text{
      margin:0;
      font-size:14px;
      line-height:1.5;
      color:var(--text);
      white-space:pre-wrap;
    }

    .routes{
      margin-top:8px;
      padding-top:8px;
      border-top:1px solid rgba(255,255,255,0.08);
      display:grid;
      gap:6px;
    }

    .route-link{
      font-size:13px;
      line-height:1.4;
      color:var(--muted);
    }

    .route-link strong{
      color:var(--text);
      font-weight:700;
    }

    .footer{
      margin-top:12px;
      font-size:12px;
      line-height:1.45;
      color:var(--soft);
      text-align:center;
    }

    @media (min-width: 761px){
      .page{
        width:min(860px, calc(100% - 40px));
        padding:28px 0 40px;
      }

      .back-link{
        font-size:22px;
        margin-bottom:24px;
      }

      .shell{
        padding:34px;
        border-radius:38px;
      }

      .pill{
        min-height:62px;
        padding:0 28px;
        font-size:22px;
        margin-bottom:28px;
      }

      .hero-title{
        font-size:74px;
        margin-bottom:12px;
      }

      .hero-desc{
        font-size:22px;
        margin-bottom:24px;
      }

      .inner{
        padding:30px;
        border-radius:30px;
      }

      .mutation-title{
        font-size:56px;
        margin-bottom:12px;
      }

      .mutation-desc{
        font-size:22px;
        margin-bottom:22px;
      }

      .label{
        font-size:21px;
        margin-bottom:14px;
      }

      textarea{
        min-height:210px;
        padding:24px 26px;
        font-size:24px;
        border-radius:24px;
      }

      .button-stack{
        gap:14px;
        margin-top:20px;
      }

      button{
        min-height:74px;
        border-radius:22px;
        font-size:24px;
      }

      .subrow{
        margin-top:16px;
      }

      .status,
      .deep-link{
        font-size:17px;
      }

      .result{
        margin-top:24px;
        gap:12px;
      }

      .result-card{
        border-radius:22px;
        padding:18px;
      }

      .result-label{
        font-size:13px;
        margin-bottom:6px;
      }

      .result-text{
        font-size:18px;
      }

      .routes{
        margin-top:14px;
        padding-top:14px;
        gap:10px;
      }

      .route-link{
        font-size:17px;
      }

      .footer{
        font-size:15px;
        margin-top:18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <a class="back-link" href="./mutation-router.html">← Back to Mutation Router</a>

    <section class="shell">
      <div class="pill">One mutation</div>

      <h1 class="hero-title">Reframe</h1>
      <p class="hero-desc">Take the hit. Change the frame.</p>

      <section class="inner">
        <h2 class="mutation-title">Criticism → New frame</h2>
        <p class="mutation-desc">Turn one bad reply into a clearer perspective.</p>

        <label class="label" for="inputText">Paste one bad reply</label>

        <textarea id="inputText" placeholder="Example:

This is too abstract.
Nobody needs this.
You always say vague things."></textarea>

        <div class="button-stack">
          <button class="btn-primary" id="generateBtn">Generate</button>
          <button class="btn-soft" id="exampleBtn">Try example</button>
          <button class="btn-soft" id="copyBtn">Copy result</button>
          <button class="btn-soft" id="clearBtn">Clear</button>
        </div>

        <div class="subrow">
          <div class="status" id="statusText">Waiting for input</div>
          <a class="deep-link" href="./mutation-router.html">go deeper</a>
        </div>

        <div class="result" id="resultWrap">
          <div class="result-card">
            <div class="result-label">New frame</div>
            <p class="result-text" id="resultText"></p>
          </div>

          <div class="routes">
            <a class="route-link" href="./hook-generator.html"><strong>hook</strong> →</a>
            <a class="route-link" href="./mutation-router.html"><strong>another route</strong> →</a>
          </div>
        </div>
      </section>
    </section>

    <div class="footer">No login · No tracking · Runs entirely in browser</div>
  </main>

  <script>
    const inputText = document.getElementById('inputText');
    const generateBtn = document.getElementById('generateBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearBtn = document.getElementById('clearBtn');
    const statusText = document.getElementById('statusText');
    const resultWrap = document.getElementById('resultWrap');
    const resultText = document.getElementById('resultText');

    const exampleReply = `This is too abstract.
Nobody needs this.
You always say vague things.`;

    function cleanText(text) {
      return text.replace(/\r/g, '').trim();
    }

    function shorten(text, maxLength) {
      const value = text.replace(/\s+/g, ' ').trim();
      if (value.length <= maxLength) return value;
      return value.slice(0, maxLength).trim().replace(/[.,;:!?-]*$/, '') + '…';
    }

    function pickFrame(text) {
      const lower = text.toLowerCase();

      if (lower.includes('abstract') || lower.includes('vague')) {
        return 'The reaction may be asking for a clearer example, not telling you to stop.';
      }

      if (lower.includes('nobody needs') || lower.includes('useless')) {
        return 'The attack may contain a demand for sharper relevance.';
      }

      if (lower.includes('too long') || lower.includes('boring')) {
        return 'The criticism may be pushing the idea toward a tighter form.';
      }

      if (lower.includes('wrong') || lower.includes('stupid')) {
        return 'Even a blunt attack can point at what needs more grounding.';
      }

      return 'Inside the criticism there may be a clue about what wants to become clearer.';
    }

    function generateResult() {
      const value = cleanText(inputText.value);

      if (!value) {
        resultWrap.style.display = 'none';
        statusText.textContent = 'Paste one bad reply first';
        return;
      }

      const frame = shorten(pickFrame(value), 220);
      resultText.textContent = frame;
      resultWrap.style.display = 'flex';
      statusText.textContent = 'Frame changed';
    }

    function clearAll() {
      inputText.value = '';
      resultText.textContent = '';
      resultWrap.style.display = 'none';
      statusText.textContent = 'Waiting for input';
    }

    async function copyResult() {
      const text = resultText.textContent.trim();

      if (!text) {
        statusText.textContent = 'Nothing to copy';
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        statusText.textContent = 'Copied';
      } catch (error) {
        const temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        statusText.textContent = 'Copied';
      }
    }

    generateBtn.addEventListener('click', generateResult);
    exampleBtn.addEventListener('click', () => {
      inputText.value = exampleReply;
      generateResult();
    });
    copyBtn.addEventListener('click', copyResult);
    clearBtn.addEventListener('click', clearAll);
  </script>
</body>
</html>

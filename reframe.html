<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reframe | REFRAME Studio</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
background:linear-gradient(180deg,#081331,#0b1f4f,#07112b);
color:#f4f7ff;
}

.page{
max-width:680px;
margin:auto;
padding:20px;
}

.back{
color:#b7c2f0;
text-decoration:none;
font-size:14px;
}

.card{
background:#0b163a;
border-radius:22px;
padding:20px;
margin-top:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.35);
}

h1{
margin:10px 0 4px;
font-size:34px;
}

h2{
margin:0 0 10px;
font-size:26px;
}

p{
color:#b7c2f0;
margin-top:0;
}

textarea{
width:100%;
height:120px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.08);
background:#02081f;
color:#fff;
padding:14px;
font-size:15px;
resize:none;
}

button{
width:100%;
margin-top:10px;
height:46px;
border-radius:14px;
border:none;
font-weight:700;
font-size:15px;
cursor:pointer;
}

.primary{
background:#fff;
color:#081331;
}

.soft{
background:rgba(255,255,255,0.08);
color:#fff;
}

.status{
font-size:12px;
color:#96a5df;
margin-top:10px;
display:flex;
justify-content:space-between;
}

.deeper{
display:none;
font-size:12px;
color:#96a5df;
text-decoration:none;
}

.result{
display:none;
margin-top:14px;
padding:12px;
border-radius:14px;
background:rgba(255,255,255,0.04);
}

.footer{
text-align:center;
font-size:12px;
margin-top:16px;
color:#96a5df;
}
</style>
</head>

<body>

<div class="page">

<a class="back" href="./mutation-router.html">← Back to Mutation Router</a>

<h1>Reframe</h1>
<p>Take the hit. Change the frame.</p>

<div class="card">

<h2>Criticism → New frame</h2>
<p>Turn one bad reply into a clearer perspective.</p>

<textarea id="input" placeholder="Example:

This is too abstract.
Nobody needs this.
You always say vague things."></textarea>

<button class="primary" onclick="generate()">Generate</button>
<button class="soft" onclick="example()">Try example</button>
<button class="soft" onclick="copy()">Copy result</button>
<button class="soft" onclick="clearAll()">Clear</button>

<div class="status">
<span id="status">Waiting for input</span>
<a id="deeper" class="deeper" href="./mutation-router.html">deeper</a>
</div>

<div id="result" class="result"></div>

</div>

<div class="footer">
No login · No tracking · Runs entirely in browser
</div>

</div>

<script>

const exampleText=`This is too abstract.
Nobody needs this.
You always say vague things.`

function generate(){

let input=document.getElementById("input").value.trim()

if(!input){
document.getElementById("status").innerText="Paste one bad reply first"
return
}

let frame="Inside the criticism there may be a clue about what wants to become clearer."

if(input.toLowerCase().includes("abstract") || input.toLowerCase().includes("vague")){
frame="The reaction may be asking for a clearer example, not telling you to stop."
}

if(input.toLowerCase().includes("nobody")){
frame="The attack may contain a demand for sharper relevance."
}

document.getElementById("result").style.display="block"
document.getElementById("result").innerText=frame
document.getElementById("status").innerText="Frame changed"

document.getElementById("deeper").style.display="inline"

}

function example(){
document.getElementById("input").value=exampleText
generate()
}

function copy(){
let text=document.getElementById("result").innerText

if(!text) return

navigator.clipboard.writeText(text)
document.getElementById("status").innerText="Copied"
}

function clearAll(){
document.getElementById("input").value=""
document.getElementById("result").style.display="none"
document.getElementById("status").innerText="Waiting for input"
document.getElementById("deeper").style.display="none"
}

</script>

</body>
</html>
